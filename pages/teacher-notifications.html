<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الإشعارات العامة للمدرس - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}
.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}
.header{display:flex;justify-content:space-between;align-items:center;gap:15px}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn,.save-btn,.danger-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}
.save-btn{background:linear-gradient(135deg,#16a34a,#22c55e)}
.danger-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}
input,select,textarea{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin:8px 0 14px;font-size:15px}
textarea{min-height:120px;resize:vertical}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.notification-card{padding:18px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);margin-top:14px}
.notification-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.badge{display:inline-block;padding:5px 10px;border-radius:10px;background:#7c3aed;font-size:13px}
.small{color:#d6d6d6;font-size:14px}
@media(max-width:900px){.grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<main class="page">

<header class="header">
<div>
<h1>🔔 الإشعارات العامة</h1>
<p>إرسال إشعارات عامة من المدرس للطلاب أو لمادة محددة أو لطالب معين.</p>
</div>
<div class="actions">
<button class="btn" onclick="location.href='teacher-dashboard.html'">🏠 لوحة المدرس</button>
<button class="btn" onclick="history.back()">← رجوع</button>
</div>
</header>

<section class="box">
<h2>إرسال إشعار جديد</h2>

<div class="grid">
<select id="targetType" onchange="toggleTargetInput()">
<option value="all">جميع الطلاب</option>
<option value="subject">مادة محددة</option>
<option value="student">طالب محدد</option>
</select>

<input id="targetName" placeholder="اسم المادة أو الطالب" style="display:none">

<select id="priority">
<option>عادي</option>
<option>مهم</option>
<option>عاجل</option>
</select>
</div>

<input id="notificationTitle" placeholder="عنوان الإشعار">
<textarea id="notificationText" placeholder="نص الإشعار"></textarea>

<button class="save-btn" onclick="addNotification()">📨 إرسال الإشعار</button>
</section>

<section class="box">
<h2>الإشعارات المرسلة</h2>
<input id="searchNotification" placeholder="🔍 بحث داخل الإشعارات" oninput="renderNotifications()">
<div id="notificationsList"></div>
</section>

</main>

<script>
let notifications = JSON.parse(localStorage.getItem("afaq_teacher_general_notifications")) || [];

function saveNotifications(){
localStorage.setItem("afaq_teacher_general_notifications", JSON.stringify(notifications));
}

function targetLabel(type,name){
if(type==="all") return "جميع الطلاب";
if(type==="subject") return "مادة: " + (name || "غير محدد");
return "طالب: " + (name || "غير محدد");
}

function toggleTargetInput(){
const type=document.getElementById("targetType").value;
const target=document.getElementById("targetName");
if(type==="all"){
target.style.display="none";
target.value="";
}else{
target.style.display="block";
target.placeholder = type==="subject" ? "اكتب اسم المادة" : "اكتب اسم الطالب";
}
}

function addNotification(){
const type=document.getElementById("targetType").value;
const target=document.getElementById("targetName").value.trim();
const priority=document.getElementById("priority").value;
const title=document.getElementById("notificationTitle").value.trim();
const text=document.getElementById("notificationText").value.trim();

if(!title || !text){
alert("يرجى إدخال عنوان الإشعار ونص الإشعار");
return;
}

if(type!=="all" && !target){
alert("يرجى إدخال اسم المادة أو الطالب");
return;
}

notifications.unshift({
type,
target,
priority,
title,
text,
date:new Date().toLocaleString("ar")
});

saveNotifications();
document.getElementById("notificationTitle").value="";
document.getElementById("notificationText").value="";
renderNotifications();
alert("تم إرسال الإشعار بنجاح");
}

function deleteNotification(index){
if(confirm("هل تريد حذف هذا الإشعار؟")){
notifications.splice(index,1);
saveNotifications();
renderNotifications();
}
}

function renderNotifications(){
const list=document.getElementById("notificationsList");
const search=document.getElementById("searchNotification").value.trim();

const filtered=notifications.filter(n =>
n.title.includes(search) ||
n.text.includes(search) ||
targetLabel(n.type,n.target).includes(search) ||
n.priority.includes(search)
);

if(filtered.length===0){
list.innerHTML="<p>لا توجد إشعارات حالياً</p>";
return;
}

list.innerHTML=filtered.map((n,i)=>{
const realIndex=notifications.indexOf(n);
return `
<div class="notification-card">
  <div class="notification-head">
    <div>
      <h3>${n.title}</h3>
      <span class="badge">${n.priority}</span>
      <span class="badge">${targetLabel(n.type,n.target)}</span>
    </div>
    <button class="danger-btn" onclick="deleteNotification(${realIndex})">حذف</button>
  </div>
  <p>${n.text}</p>
  <p class="small">تاريخ الإرسال: ${n.date}</p>
</div>
`;
}).join("");
}

toggleTargetInput();
renderNotifications();
</script>
</body>
</html>
