<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>سؤال الواجب</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-builder-final.css"></head><body><main class="afaq-mobile">
<section class="afaq-top"><h1 id="pageTitle">إضافة الأسئلة</h1><p>بعد الضغط على تم يختفي السؤال ويظهر نموذج السؤال التالي.</p><a class="afaq-btn gray" href="teacher-dashboard.html">رجوع</a></section>
<section class="card"><h3 id="meta"></h3><div class="q-list" id="listBox"></div></section>
<section class="card"><h3 id="qNumber">السؤال</h3><select id="type" onchange="renderType()"><option value="choice">اختيارات</option><option value="truefalse">صح وخطأ</option><option value="blank">فراغات</option><option value="essay">مقالي</option><option value="image">مسائل / صورة</option></select><input id="text" placeholder="نص السؤال"><input id="degree" type="number" placeholder="درجة هذا السؤال"><div id="typeBox"></div><button class="afaq-btn" onclick="saveQuestion()">تم / حفظ السؤال التالي</button></section>
<section class="card"><button class="afaq-btn" onclick="publish()">نشر للطلاب</button></section>
<section class="card"><h2>تصحيح يدوي</h2><div id="manualBox"></div></section>
</main><script src="../js/afaq-data.js"></script><script src="../js/afaq-exam-builder.js"></script><script>
const kind=localStorage.getItem('afaq_builder_kind')||'exam'; const maxQuestions=kind==='assignment'?1:999;
if(!AfaqExamBuilder.currentTeacher())location.href='teacher-login.html';
function qs(){try{return JSON.parse(localStorage.getItem('afaq_builder_questions'))||[]}catch(e){return[]}}
function saveQs(a){localStorage.setItem('afaq_builder_questions',JSON.stringify(a))}
function renderType(){if(type.value==='choice'){typeBox.innerHTML='<div class="qtype"><input id="c1" placeholder="الاختيار الأول"><input id="c2" placeholder="الاختيار الثاني"><input id="c3" placeholder="الاختيار الثالث"><input id="answer" placeholder="اكتب الخيار الصحيح كما كتبته"></div>'}else if(type.value==='truefalse'){typeBox.innerHTML='<div class="qtype"><select id="answer"><option>صح</option><option>خطأ</option></select></div>'}else if(type.value==='blank'){typeBox.innerHTML='<div class="qtype"><input id="answer" placeholder="الإجابة الصحيحة للفراغ"></div>'}else{typeBox.innerHTML='<div class="qtype"><p>هذا السؤال يصحح يدوياً من المدرس بعد إرسال الطالب.</p><input id="answer" type="hidden" value=""></div>'}}
function saveQuestion(){let a=qs(); if(a.length>=maxQuestions){alert('الواجب يسمح بسؤال واحد فقط');return} if(!text.value||!degree.value){alert('أدخل نص السؤال ودرجته');return} const q={type:type.value,text:text.value,degree:Number(degree.value||0),choices:[],answer:''}; if(type.value==='choice'){q.choices=[c1.value,c2.value,c3.value];q.answer=answer.value} else if(type.value==='truefalse'||type.value==='blank'){q.answer=answer.value} a.push(q); saveQs(a); text.value='';degree.value='';type.value='choice';renderType();render();}
function publish(){let a=qs(); if(!a.length){alert('أضف سؤالاً واحداً على الأقل');return} const title=localStorage.getItem('afaq_builder_title'); const deg=localStorage.getItem('afaq_builder_degree'); try{AfaqExamBuilder.publish(kind,title,deg,a); localStorage.removeItem('afaq_builder_title');localStorage.removeItem('afaq_builder_degree');localStorage.removeItem('afaq_builder_questions');alert('تم النشر والمزامنة مع الطلاب'); location.href=kind==='exam'?'teacher-exams.html':'teacher-assignments.html'}catch(e){alert(e.message)}}
function grade(id){let v=prompt('أدخل درجة الأسئلة المقالية/المسائل'); if(v===null)return; try{AfaqExamBuilder.grade(kind,id,v);render();alert('تم التصحيح وتجميع النتيجة للطالب')}catch(e){alert(e.message)}}
function render(){const a=qs(); pageTitle.textContent=kind==='exam'?'سؤال الواجب':'سؤال الواجب'; meta.textContent=(localStorage.getItem('afaq_builder_title')||'')+' | الدرجة النهائية: '+(localStorage.getItem('afaq_builder_degree')||''); qNumber.textContent='السؤال رقم '+(a.length+1); listBox.innerHTML=a.length?a.map((q,i)=>`<p>${i+1}. ${q.text} - ${q.degree} درجة - ${q.type}</p>`).join(''):'لم تتم إضافة أسئلة بعد'; const subs=AfaqExamBuilder.submissions(kind).filter(s=>s.needsManual&&s.status!=='مصحح'); manualBox.innerHTML=subs.length?subs.map(s=>`<div class="card"><h3>${s.studentName}</h3><p>${s.title}</p><p>التلقائي: ${s.autoScore}/${s.autoTotal}</p><p>اليدوي المطلوب: ${s.manualTotal}</p>${Object.values(s.answers||{}).map(v=>String(v).startsWith('data:image')?`<img class="preview-img" src="${v}">`:`<p>${v}</p>`).join('')}<button class="afaq-btn" onclick="grade('${s.id}')">تصحيح يدوي</button></div>`).join(''):'لا توجد إجابات تحتاج تصحيح يدوي'}
renderType();render();
</script></body></html>
