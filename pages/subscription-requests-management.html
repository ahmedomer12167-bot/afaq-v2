<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>طلبات الاشتراك</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-room.css"></head><body><main class="room"><section class="topbar"><div class="title"><h1>💳 طلبات الاشتراك</h1><p>تظهر للمدير مع إشعار.</p></div><a class="btn back" href="admin-dashboard.html">رجوع</a></section><section class="panel"><div id="box" class="cards"></div></section></main><script src="../js/afaq-data.js"></script><script>function approve(id){const st=AfaqData.approveSubscription(id);render();if(st)alert('تمت الموافقة. الكود: '+st.code)}function reject(id){AfaqData.update('subscriptionRequests',id,{status:'مرفوض'});render()}function render(){const arr=AfaqData.list('subscriptionRequests');box.innerHTML=arr.length?arr.map(r=>`<div class="card"><h3>${r.name}</h3><p>${r.grade}</p><span class="badge">${r.status}</span>${r.studentCode?`<p>الكود: ${r.studentCode}</p>`:""}<button class="btn ok" onclick="approve('${r.id}')">موافقة</button><button class="btn danger" onclick="reject('${r.id}')">رفض</button></div>`).join(''):"<div class='card'><h3>لا توجد طلبات</h3></div>"}render()</script></body></html>
