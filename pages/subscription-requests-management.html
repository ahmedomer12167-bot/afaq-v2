<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة طلبات الاشتراك</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-room.css">
</head>
<body>
<main class="room">
<section class="topbar">
<div class="title">
<h1>💳 طلبات الاشتراك</h1>
<p>المدير يوافق على الطلبات ويصدر كود الدخول.</p>
</div>
<a class="btn back" href="admin-dashboard.html">لوحة المدير</a>
</section>

<section class="panel">
<h2>الطلبات</h2>
<div id="box" class="cards"></div>
</section>
</main>

<script src="../js/afaq-data.js"></script>
<script>
function makeCode(){return "STD-" + Date.now().toString().slice(-6);}
function approve(id){
 const reqs = AfaqData.list("subscriptionRequests");
 const r = reqs.find(x=>x.id===id);
 if(!r) return;
 const code = makeCode();
 const student = AfaqData.upsertStudent({
   studentId:code,
   code,
   name:r.name,
   grade:r.grade,
   phone:r.phone,
   parentName:r.parentName,
   parentPhone:r.parentPhone,
   notes:r.notes,
   subscriptionStatus:"مفعل",
   subscriptionEnd:"غير محدد",
   subjects:[]
 });
 r.status = "تمت الموافقة";
 r.studentCode = code;
 AfaqData.save("subscriptionRequests", reqs);
 render();
 alert("تمت الموافقة. كود الطالب: " + code);
}
function reject(id){
 const reqs = AfaqData.list("subscriptionRequests");
 const r = reqs.find(x=>x.id===id);
 if(r) r.status = "مرفوض";
 AfaqData.save("subscriptionRequests", reqs);
 render();
}
function render(){
 const reqs = AfaqData.list("subscriptionRequests");
 if(!reqs.length){box.innerHTML='<div class="card"><h3>لا توجد طلبات</h3></div>';return;}
 box.innerHTML = reqs.map(r=>`
 <div class="card">
 <h3>${r.name}</h3>
 <p>المرحلة: ${r.grade}</p>
 <p>هاتف الطالب: ${r.phone || "-"}</p>
 <p>ولي الأمر: ${r.parentName || "-"}</p>
 <span class="badge">${r.status}</span>
 ${r.studentCode ? `<p>كود الطالب: <b>${r.studentCode}</b></p>` : ""}
 <button class="btn" onclick="approve('${r.id}')">موافقة</button>
 <button class="btn back" onclick="reject('${r.id}')">رفض</button>
 </div>`).join("");
}
render();
</script>
</body>
</html>
