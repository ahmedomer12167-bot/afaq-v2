<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>الحضور والغياب</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-badges.css"><link rel="stylesheet" href="../css/afaq-teacher-sync.css"></head><body><main class="afaq-mobile"><section class="afaq-top"><h1>✅ الحضور والغياب</h1><a class="afaq-btn gray" href="teacher-dashboard.html">رجوع</a></section><section class="sync-card"><input id="title" placeholder="عنوان الدرس/الحضور"><input id="minutes" type="number" placeholder="مدة التسجيل بالدقائق"><button class="afaq-btn" onclick="openAtt()">فتح تسجيل الحضور</button></section><section class="sync-card"><h2>جلسات الحضور</h2><div id="box"></div></section></main><script src="../js/afaq-data.js"></script><script src="../js/afaq-teacher-sync.js"></script><script src="../js/afaq-unified-counters.js"></script><script src="../js/afaq-badges.js"></script><script>if(!AfaqTeacherSync.currentTeacher())location.href='teacher-login.html';function openAtt(){try{AfaqTeacherSync.addAttendanceSession({title:title.value,minutes:minutes.value||10});title.value='';minutes.value='';render();alert('تم فتح الحضور وإرساله للطلاب')}catch(e){alert(e.message)}}function render(){const t=AfaqTeacherSync.currentTeacher();const list=AfaqTeacherSync.read('afaq_attendance_sessions').filter(x=>x.teacherCode===AfaqTeacherSync.teacherCode(t));box.innerHTML=list.length?list.map(x=>`<div class='sync-card'><h3>${x.title}</h3><p>المادة: ${x.subject}</p><p>ينتهي: ${new Date(x.endsAt).toLocaleString('ar')}</p></div>`).join(''):'<p>لا توجد جلسات</p>'}render();</script></body></html>
