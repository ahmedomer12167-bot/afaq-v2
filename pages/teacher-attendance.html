<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>✅ الحضور والغياب</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-room.css"></head><body><main class="room"><section class="topbar"><div class="title"><h1>✅ الحضور والغياب</h1><p>هذه البيانات موحدة وتظهر للطالب وولي الأمر والمدير.</p></div><a class="btn back" href="teacher-dashboard.html">لوحة المدرس</a></section>
<section class="panel"><h2>إضافة</h2><input id="teacherCode" placeholder="كود المدرس">
<select id="subject"><option>الأحياء</option><option>الكيمياء</option><option>الفيزياء</option></select>
<input id="studentId" placeholder="كود الطالب">
<input id="studentName" placeholder="اسم الطالب">
<select id="status"><option>حاضر</option><option>غائب</option></select>
<input id="date" type="date"><button class="btn ok" onclick="saveItem()">حفظ</button></section>
<section class="panel"><h2>القائمة</h2><div id="box" class="cards"></div></section></main><script src="../js/afaq-data.js"></script><script>
function val(id){return document.getElementById(id)?.value||""}
function saveItem(){
 const item={subject:val("subject"),teacherCode:val("teacherCode"),title:val("title"),description:val("description"),studentId:val("studentId"),studentName:val("studentName"),status:val("status"),score:val("score"),total:val("total"),date:val("date"),url:val("url"),type:val("type")};
 AfaqData.add("attendance",item);
 if(item.studentId) AfaqData.notifyStudent(item.studentId,"تحديث جديد","تمت إضافة بيانات في ✅ الحضور والغياب","✅ الحضور والغياب",item.subject);
 AfaqData.notifyAdmin("تحديث من المدرس","تمت إضافة عنصر في ✅ الحضور والغياب","✅ الحضور والغياب");
 render();
 alert("تم الحفظ");
}
function del(id){AfaqData.remove("attendance",id);render()}
function render(){const arr=AfaqData.list("attendance");box.innerHTML=arr.length?arr.map(x=>`<div class="card"><h3>${x.title||x.studentName||x.subject||"عنصر"}</h3><p>${x.description||x.status||x.score||""}</p><p><span class="badge">${x.subject||"عام"}</span></p>${x.url?`<button class="btn" onclick="window.open('${x.url}','_blank')">فتح الملف</button>`:""}<button class="btn danger" onclick="del('${x.id}')">حذف</button></div>`).join(""):"<div class='card'><h3>لا توجد بيانات</h3></div>"}render();
</script></body></html>
