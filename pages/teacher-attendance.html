<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>الحضور</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-sync-final.css"></head><body><main class="afaq-mobile"><section class="afaq-top"><h1>✅ الحضور</h1><a class="afaq-btn gray" href="teacher-dashboard.html">رجوع</a></section><section class="afaq-sync-card"><input id="title" placeholder="عنوان الحضور"><input id="minutes" type="number" placeholder="المدة بالدقائق"><button class="afaq-btn" onclick="openA()">فتح الحضور للطلاب</button></section><section class="afaq-sync-card"><h2>الجلسات</h2><div id="box"></div></section></main><script src="../js/afaq-data.js"></script><script src="../js/afaq-real-sync.js"></script><script>if(!AfaqRealSync.currentTeacher())location.href='teacher-login.html';function openA(){try{AfaqRealSync.addAttendance(title.value,minutes.value||10);title.value='';minutes.value='';render();alert('تم فتح الحضور للطلاب')}catch(e){alert(e.message)}}function render(){const t=AfaqRealSync.currentTeacher();const list=AfaqRealSync.list('attendanceSessions').filter(x=>x.teacherCode===AfaqRealSync.teacherCode(t));box.innerHTML=list.length?list.map(x=>`<div class="afaq-sync-card"><h3>${x.title}</h3><p>${x.subject}</p><p>ينتهي: ${new Date(x.endsAt).toLocaleString('ar')}</p></div>`).join(''):'<p>لا توجد جلسات</p>'}render()</script></body></html>
