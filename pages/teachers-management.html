<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة المدرسين - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-room.css">
</head>
<body>
<main class="room">

<section class="topbar">
  <div class="title">
    <h1>👨‍🏫 إدارة المدرسين</h1>
    <p>المدير فقط يضيف المدرس ويحدد له الصف والمادة وكود الدخول وكود المادة.</p>
  </div>
  <div class="actions">
    <a class="btn back" href="admin-dashboard.html">لوحة المدير</a>
  </div>
</section>

<section class="panel">
  <h2>إضافة مدرس</h2>

  <input id="fullName" placeholder="الاسم الثلاثي للمدرس">

  <select id="grade">
    <option value="">اختر الصف</option>
    <option>الأول متوسط</option>
    <option>الثاني متوسط</option>
    <option>الثالث متوسط</option>
    <option>الرابع العلمي</option>
    <option>الخامس العلمي</option>
    <option>السادس العلمي</option>
  </select>

  <select id="subject">
    <option value="">اختر المادة</option>
    <option>الأحياء</option>
    <option>الكيمياء</option>
    <option>الفيزياء</option>
    <option>الرياضيات</option>
    <option>الإنكليزي</option>
    <option>العربي</option>
    <option>الإسلامية</option>
  </select>

  <input id="teacherCode" placeholder="كود المدرس الخاص به">
  <input id="subjectCode" placeholder="كود المادة الخاص بهذا المدرس">
  <input id="phone" placeholder="رقم الهاتف اختياري">
  <textarea id="notes" placeholder="ملاحظات"></textarea>

  <button class="btn ok" onclick="saveTeacher()">حفظ المدرس</button>
</section>

<section class="panel">
  <h2>المدرسون المسجلون</h2>
  <div id="teachersBox" class="cards"></div>
</section>

</main>

<script src="../js/afaq-data.js"></script>
<script src="../js/afaq-teacher-auth.js"></script>
<script src="../js/afaq-auto-stats.js"></script>

<script>
function saveTeacher(){
  const data = {
    fullName: fullName.value.trim(),
    grade: grade.value,
    subject: subject.value,
    teacherCode: teacherCode.value.trim(),
    subjectCode: subjectCode.value.trim(),
    phone: phone.value.trim(),
    notes: notes.value.trim(),
    status: "مفعل"
  };

  if(!data.fullName || !data.grade || !data.subject || !data.teacherCode || !data.subjectCode){
    alert("يرجى إدخال الاسم والصف والمادة وكود المدرس وكود المادة");
    return;
  }

  AfaqTeacherAuth.upsertTeacher(data);

  if(window.AfaqData && AfaqData.addNotification){
    AfaqData.addNotification(
      "teacher",
      data.teacherCode,
      "تم إنشاء حسابك",
      "تمت إضافتك كمدرس لمادة " + data.subject + " للصف " + data.grade,
      "مدرس",
      data.subject
    );
  }

  fullName.value = "";
  teacherCode.value = "";
  subjectCode.value = "";
  phone.value = "";
  notes.value = "";

  renderTeachers();
  alert("تم حفظ المدرس وربطه بالمادة بنجاح");
}

function deleteTeacher(code){
  if(!confirm("هل تريد حذف هذا المدرس؟")) return;
  AfaqTeacherAuth.deleteTeacher(code);
  renderTeachers();
}

function renderTeachers(){
  const list = AfaqTeacherAuth.teachers().map(AfaqTeacherAuth.normalizeTeacher);
  if(!list.length){
    teachersBox.innerHTML = '<div class="card"><h3>لا يوجد مدرسون حالياً</h3></div>';
    return;
  }

  teachersBox.innerHTML = list.map(t => `
    <div class="card">
      <h3>${t.fullName}</h3>
      <p>الصف: ${t.grade}</p>
      <p>المادة: ${t.subject}</p>
      <p>كود المدرس: <b>${t.teacherCode}</b></p>
      <p>كود المادة: <b>${t.subjectCode}</b></p>
      <span class="badge">${t.status}</span>
      <button class="btn danger" onclick="deleteTeacher('${t.teacherCode}')">حذف</button>
    </div>
  `).join("");
}

renderTeachers();
</script>
</body>
</html>
