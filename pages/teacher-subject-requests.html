<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<title>طلبات الانضمام للمواد</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-room.css">

</head>
<body>
<main class="room">
<section class="topbar">
<div class="title"><h1>📚 طلبات الانضمام للمواد</h1><p>يقوم المدرس بالموافقة أو رفض دخول الطالب للمادة.</p></div>
<a class="btn back" href="teacher-dashboard.html">لوحة المدرس</a>
</section>

<section class="panel">
<h2>طلبات الطلاب</h2>
<div id="requestsBox" class="cards"></div>
</section>
</main>

<script src="../js/afaq-data.js"></script>
<script>
function read(k){try{return JSON.parse(localStorage.getItem(k))||[]}catch(e){return []}}
function write(k,v){localStorage.setItem(k,JSON.stringify(v))}
function approve(id){
 const reqs=read("afaq_subject_requests");
 const r=reqs.find(x=>x.id===id);
 if(!r)return;
 let students = window.AfaqData && AfaqData.allStudents ? AfaqData.allStudents() : read("afaq_students");
 const i=students.findIndex(s=>s.studentId===r.studentId || s.code===r.code);
 if(i>=0){
   students[i].subjects = students[i].subjects || [];
   if(!students[i].subjects.includes(r.subject)) students[i].subjects.push(r.subject);
   if(window.AfaqData && AfaqData.saveStudents) AfaqData.saveStudents(students);
   else write("afaq_students",students);
 }
 r.status="تمت الموافقة";
 write("afaq_subject_requests",reqs);
 render();
 alert("تمت الموافقة على دخول الطالب للمادة");
}
function reject(id){
 const reqs=read("afaq_subject_requests");
 const r=reqs.find(x=>x.id===id);
 if(r) r.status="مرفوض";
 write("afaq_subject_requests",reqs);
 render();
}
function render(){
 const reqs=read("afaq_subject_requests");
 if(!reqs.length){requestsBox.innerHTML='<div class="card"><h3>لا توجد طلبات حالياً</h3></div>';return;}
 requestsBox.innerHTML=reqs.map(r=>`
 <div class="card">
 <h3>${r.studentName}</h3>
 <p>المادة: ${r.subject}</p>
 <p>المرحلة: ${r.grade}</p>
 <p>${r.note || ""}</p>
 <span class="badge">${r.status}</span>
 <button class="btn" onclick="approve('${r.id}')">موافقة</button>
 <button class="btn back" onclick="reject('${r.id}')">رفض</button>
 </div>`).join("");
}
render();
</script>
</body>
</html>
