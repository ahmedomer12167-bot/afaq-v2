<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>طلبات المواد</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-room.css"></head><body>
<main class="room"><section class="topbar"><div class="title"><h1>📚 طلبات الانضمام للمواد</h1><p>تظهر للمدرس الطلبات الخاصة بالمواد المربوطة به من المدير.</p></div><a class="btn back" href="teacher-dashboard.html">لوحة المدرس</a></section><section class="panel"><input id="teacherCode" placeholder="كود المدرس لعرض طلباته" oninput="render()"><div id="box" class="cards"></div></section></main>
<script src="../js/afaq-data.js"></script>
<script>
function approve(id){AfaqData.approveSubjectRequest(id);render();alert("تمت الموافقة وتفعيل المادة للطالب")}
function reject(id){AfaqData.update("subjectRequests",id,{status:"مرفوض"});render();}
function render(){const c=teacherCode.value.trim();let arr=AfaqData.list("subjectRequests");if(c)arr=arr.filter(r=>r.teacherCode===c);box.innerHTML=arr.length?arr.map(r=>`<div class="card"><h3>${r.studentName}</h3><p>المادة: ${r.subject}</p><p>المرحلة: ${r.grade}</p><span class="badge">${r.status}</span><button class="btn ok" onclick="approve('${r.id}')">موافقة</button><button class="btn danger" onclick="reject('${r.id}')">رفض</button></div>`).join(""):"<div class='card'><h3>لا توجد طلبات</h3></div>"}render();
</script>
</body></html>
