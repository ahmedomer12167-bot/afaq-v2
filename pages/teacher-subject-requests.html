<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>طلبات دخول المادة</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-student-complete.css"></head><body><main class="afaq-mobile"><section class="afaq-top"><h1>📚 طلبات دخول المادة</h1><div style="margin-top:14px"><a class="afaq-btn gray" href="teacher-dashboard.html">رجوع</a><button class="afaq-btn" onclick="render()">تحديث</button></div></section><section class="cardx"><select id="status" onchange="render()"><option value="">كل الطلبات</option><option>قيد المراجعة</option><option>مقبول</option><option>مرفوض</option></select><div id="box"></div></section></main><script src="../js/afaq-data.js"></script><script src="../js/afaq-complete-sync.js"></script><script>if(!AfaqSync.currentTeacher())location.href='teacher-login.html'; function approve(id){try{AfaqSync.approve(id);render();alert('تم قبول الطالب ومزامنة كل اللوحات')}catch(e){alert(e.message)}} function rejectR(id){try{AfaqSync.reject(id,document.getElementById('note-'+id).value);render()}catch(e){alert(e.message)}} function render(){let list=AfaqSync.teacherRequests(); if(status.value)list=list.filter(r=>r.status===status.value); box.innerHTML=list.length?list.map(r=>`<div class="cardx"><h3>${r.studentName}</h3><p>ولي الأمر: ${r.parentName||'-'}</p><p>الصف: ${r.grade}</p><p>المادة: ${r.subject}</p><p>كود الطالب: ${r.studentCode}</p><span class="pill">${r.status}</span>${r.status==='قيد المراجعة'?`<input id="note-${r.id}" placeholder="ملاحظة الرفض"><button class="afaq-btn" onclick="approve('${r.id}')">قبول</button><button class="afaq-btn red" onclick="rejectR('${r.id}')">رفض</button>`:''}</div>`).join(''):'<div class="cardx"><h3>لا توجد طلبات</h3></div>'} render();</script></body></html>
