<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلبات دخول المواد</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-room.css">
</head>
<body>
<main class="room">
<section class="topbar">
<div class="title">
<h1>📚 طلبات دخول المواد</h1>
<p>المدرس يوافق على دخول الطالب للمادة.</p>
</div>
<a class="btn back" href="teacher-dashboard.html">لوحة المدرس</a>
</section>

<section class="panel">
<h2>طلبات الطلاب</h2>
<div id="box" class="cards"></div>
</section>
</main>

<script src="../js/afaq-data.js"></script>
<script>
function approve(id){
 const reqs = AfaqData.list("subjectRequests");
 const r = reqs.find(x=>x.id===id);
 if(!r) return;
 const students = AfaqData.allStudents();
 const i = students.findIndex(s=>s.studentId===r.studentId || s.code===r.code);
 if(i >= 0){
   students[i].subjects = students[i].subjects || [];
   if(!students[i].subjects.includes(r.subject)) students[i].subjects.push(r.subject);
   AfaqData.saveStudents(students);
 }
 r.status = "تمت الموافقة";
 AfaqData.save("subjectRequests", reqs);
 render();
 alert("تمت الموافقة على دخول الطالب للمادة.");
}
function reject(id){
 const reqs = AfaqData.list("subjectRequests");
 const r = reqs.find(x=>x.id===id);
 if(r) r.status = "مرفوض";
 AfaqData.save("subjectRequests", reqs);
 render();
}
function render(){
 const reqs = AfaqData.list("subjectRequests");
 if(!reqs.length){box.innerHTML='<div class="card"><h3>لا توجد طلبات</h3></div>';return;}
 box.innerHTML = reqs.map(r=>`
 <div class="card">
 <h3>${r.studentName}</h3>
 <p>المادة: ${r.subject}</p>
 <p>المرحلة: ${r.grade}</p>
 <p>${r.note || ""}</p>
 <span class="badge">${r.status}</span>
 <button class="btn" onclick="approve('${r.id}')">موافقة</button>
 <button class="btn back" onclick="reject('${r.id}')">رفض</button>
 </div>`).join("");
}
render();
</script>
</body>
</html>
