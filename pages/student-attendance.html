<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حضور الطالب - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn,.danger-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.danger-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:22px}.card{padding:20px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);text-align:center}.card strong{display:block;font-size:30px;margin-top:8px;color:#c084fc}input{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin:10px 0 15px}.table{width:100%;border-collapse:collapse;margin-top:15px}.table th,.table td{padding:13px;text-align:center;border-bottom:1px solid rgba(255,255,255,.12)}.table th{color:#c084fc}.present{color:#22c55e;font-weight:bold}.absent{color:#ef4444;font-weight:bold}.late{color:#facc15;font-weight:bold}@media(max-width:900px){.stats{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div>
<h1>✅ الحضور</h1>
<p>متابعة حضورك وغيابك في مادة الأحياء.</p>
</div>
<div class="actions">
<button class="btn" onclick="location.href='student-subject-page.html'">📚 صفحة المادة</button>
<button class="btn" onclick="location.href='student-dashboard.html'">🏠 لوحة الطالب</button>
<button class="btn" onclick="history.back()">← رجوع</button>
</div>
</header>
<section class="stats">
<div class="card">أيام الحضور<strong id="presentCount">0</strong></div>
<div class="card">أيام الغياب<strong id="absentCount">0</strong></div>
<div class="card">التأخير<strong id="lateCount">0</strong></div>
<div class="card">نسبة الحضور<strong id="rateCount">0%</strong></div>
</section>
<section class="box">
<h2>سجل الحضور</h2>
<input id="searchAttendance" placeholder="🔍 ابحث بالتاريخ أو الحالة" oninput="renderAttendance()">
<table class="table">
<thead>
<tr><th>التاريخ</th><th>المحاضرة</th><th>الحالة</th><th>ملاحظة</th></tr>
</thead>
<tbody id="attendanceBody"></tbody>
</table>
</section>
</main>
<script>
let attendance = JSON.parse(localStorage.getItem('afaq_student_attendance')) || [
{date:'2026-06-01',lesson:'محاضرة 1 - مقدمة',status:'حاضر',note:'تم تسجيل الحضور'},
{date:'2026-06-03',lesson:'محاضرة 2 - الجهاز العصبي',status:'غائب',note:'لم يتم الحضور'},
{date:'2026-06-05',lesson:'محاضرة 3 - المراجعة',status:'متأخر',note:'حضور متأخر'}
];
function saveAttendance(){localStorage.setItem('afaq_student_attendance',JSON.stringify(attendance));}
function statusClass(status){if(status==='حاضر')return 'present';if(status==='غائب')return 'absent';return 'late';}
function updateStats(){
let present=attendance.filter(a=>a.status==='حاضر').length;
let absent=attendance.filter(a=>a.status==='غائب').length;
let late=attendance.filter(a=>a.status==='متأخر').length;
let total=attendance.length;
let rate=total?Math.round((present/total)*100):0;
document.getElementById('presentCount').textContent=present;
document.getElementById('absentCount').textContent=absent;
document.getElementById('lateCount').textContent=late;
document.getElementById('rateCount').textContent=rate+'%';
}
function renderAttendance(){
const body=document.getElementById('attendanceBody');
const search=document.getElementById('searchAttendance').value.trim();
const list=attendance.filter(a=>a.date.includes(search)||a.status.includes(search)||a.lesson.includes(search));
if(list.length===0){body.innerHTML='<tr><td colspan="4">لا يوجد سجل حضور</td></tr>';return;}
body.innerHTML=list.map(a=>`<tr><td>${a.date}</td><td>${a.lesson}</td><td class="${statusClass(a.status)}">${a.status}</td><td>${a.note||'-'}</td></tr>`).join('');
updateStats();
}
saveAttendance();renderAttendance();
</script>
</body>
</html>
