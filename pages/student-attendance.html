<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>حضور المادة</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-badges.css"><link rel="stylesheet" href="../css/afaq-teacher-sync.css"></head><body><main class="afaq-mobile"><section class="afaq-top"><h1>✅ حضور المادة</h1><a class="afaq-btn gray" href="student-subject-room.html">رجوع</a></section><section id="box"></section></main><script src="../js/afaq-data.js"></script><script src="../js/afaq-teacher-sync.js"></script><script src="../js/afaq-unified-counters.js"></script><script src="../js/afaq-badges.js"></script><script>const sub=localStorage.getItem('afaq_current_subject')||'';function reg(id){try{const r=AfaqTeacherSync.registerAttendance(id);render();alert('تم تسجيلك: '+r.status)}catch(e){alert(e.message)}}function render(){const list=AfaqTeacherSync.studentItems('attendanceSessions',sub);box.innerHTML=list.length?list.map(x=>{const left=Math.max(0,Number(x.endsAt)-Date.now());return `<div class='sync-card'><h3>${x.title}</h3><p>المادة: ${x.subject}</p><p>الوقت المتبقي: ${Math.ceil(left/60000)} دقيقة</p><div class='timer-bar'><div class='timer-fill' style='width:${left>0?100:0}%'></div></div><button class='afaq-btn' onclick="reg('${x.id}')">تم / تسجيل الحضور</button></div>`}).join(''):'<div class="sync-card"><h3>لا توجد جلسة حضور حالياً</h3></div>'}render();setInterval(render,30000);</script></body></html>
