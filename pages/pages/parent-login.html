<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل دخول ولي الأمر - آفاق التعليمية</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

<section class="login-page">
  <div class="login-box">

    <a href="../index.html" class="back-link">
      ← الرجوع للرئيسية
    </a>

    <div class="login-icon">
      👨‍👩‍👦
    </div>

    <h1>تسجيل دخول ولي الأمر</h1>

    <p>
      أدخل بيانات ولي الأمر للوصول إلى لوحة المتابعة
    </p>

    <form>

      <label>اسم الطالب الثلاثي</label>
      <input
      type="text"
      placeholder="أدخل اسم الطالب الثلاثي">

      <label>رمز ولي الأمر</label>
      <input
      type="password"
      placeholder="أدخل رمز ولي الأمر">

      <button type="button">
        دخول ولي الأمر
      </button>

    </form>

  </div>
</section>

<script src="../js/app.js"></script>

</body>
</html>
