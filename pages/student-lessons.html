<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 الدروس - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-room.css">
</head>
<body>

<main class="room">
<section class="topbar"><div class="title"><h1>📖 الدروس</h1><p>غرفة مستقلة للدروس والملفات.</p></div><a class="btn back" href="student-dashboard.html">رجوع للوحة</a></section>
<section class="panel"><h2>المحتويات</h2><div id="box" class="cards"></div></section>
</main>
<script src="../js/afaq-data.js"></script>
<script>
function render(){const arr=window.AfaqData?AfaqData.list("lessons"):[];box.innerHTML=arr.length?arr.map(x=>`<div class="card"><h3>${x.title||x.studentName||"عنصر"}</h3><p>${x.description||x.status||x.score||x.message||"بيانات مرتبطة"}</p><span class="badge">${x.subject||"عام"}</span></div>`).join(""):'<div class="card"><h3>لا توجد بيانات حالياً</h3><p>ستظهر هنا بعد إضافة البيانات من لوحة المدرس أو المدير.</p></div>';}render();
</script>
</body>
</html>
