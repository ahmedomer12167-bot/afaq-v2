<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دروس الطالب - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}input,select{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin:8px 0 14px;font-size:15px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.lesson-card{padding:20px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);transition:.3s}.lesson-card:hover{transform:translateY(-6px);box-shadow:0 0 25px rgba(168,85,247,.3);border-color:#a855f7}.lesson-card span{font-size:34px;display:block;margin-bottom:10px}.badge{display:inline-block;padding:5px 10px;border-radius:10px;background:#7c3aed;font-size:13px;margin:4px 0}.open-btn{width:100%;margin-top:14px;border:none;padding:12px;border-radius:12px;color:white;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,#16a34a,#22c55e)}@media(max-width:900px){.grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div><h1>📖 دروس الأحياء</h1><p>هنا تظهر دروس المادة والملفات التعليمية الخاصة بالطالب.</p></div>
<div class="actions"><button class="btn" onclick="location.href='student-subject-page.html'">📚 صفحة المادة</button><button class="btn" onclick="location.href='student-dashboard.html'">🏠 لوحة الطالب</button></div>
</header>
<section class="box">
<h2>البحث في الدروس</h2>
<input id="searchLesson" placeholder="🔍 ابحث عن درس..." oninput="renderLessons()">
<select id="filterType" onchange="renderLessons()">
<option value="all">كل الأنواع</option>
<option value="PDF">PDF</option>
<option value="فيديو">فيديو</option>
<option value="صورة">صورة</option>
<option value="ملف">ملف</option>
</select>
</section>
<section class="box">
<h2>قائمة الدروس</h2>
<div class="grid" id="lessonsList"></div>
</section>
</main>
<script>
let lessons = JSON.parse(localStorage.getItem('afaq_teacher_lessons')) || [
{title:'مقدمة في الخلية',description:'شرح مبسط عن مكونات الخلية ووظائفها.',type:'PDF',status:'منشور',date:'2026-01-01'},
{title:'الجهاز العصبي',description:'درس فيديو عن الجهاز العصبي وأقسامه.',type:'فيديو',status:'منشور',date:'2026-01-02'},
{title:'الوراثة',description:'ملف توضيحي عن أساسيات الوراثة.',type:'ملف',status:'منشور',date:'2026-01-03'}
];
function iconByType(type){if(type==='PDF')return '📄'; if(type==='فيديو')return '🎥'; if(type==='صورة')return '🖼️'; return '📂';}
function renderLessons(){
const list=document.getElementById('lessonsList');
const s=document.getElementById('searchLesson').value.trim();
const t=document.getElementById('filterType').value;
const published=lessons.filter(l=>(!l.status||l.status==='منشور'));
const filtered=published.filter(l=>(l.title||'').includes(s) && (t==='all'||l.type===t));
if(filtered.length===0){list.innerHTML='<p>لا توجد دروس حالياً</p>';return;}
list.innerHTML=filtered.map(l=>`<div class="lesson-card"><span>${iconByType(l.type)}</span><h3>${l.title}</h3><p>${l.description||'لا يوجد وصف'}</p><div class="badge">${l.type||'درس'}</div><p>تاريخ الإضافة: ${l.date||'غير محدد'}</p><button class="open-btn" onclick="alert('سيتم ربط فتح الملفات لاحقاً عند ربط التخزين الحقيقي')">فتح الدرس</button></div>`).join('');
}
renderLessons();
</script>
</body>
</html>
