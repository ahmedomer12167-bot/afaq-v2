<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجل النشاطات - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:25px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.danger{background:linear-gradient(135deg,#dc2626,#ef4444)}.search{width:100%;padding:14px;border:none;border-radius:14px;outline:none;font-size:16px;margin-top:15px}.log-item{padding:15px;border-radius:16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);display:flex;justify-content:space-between;gap:12px;margin-top:12px;align-items:center}.log-title{font-weight:bold}.log-meta{color:#d8d8d8;font-size:13px;margin-top:6px}.tag{display:inline-block;padding:5px 10px;border-radius:10px;background:rgba(124,58,237,.7);font-size:12px;margin-top:8px}.mini-btn{border:none;padding:8px 12px;border-radius:10px;color:white;cursor:pointer;font-weight:bold;background:#ef4444}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:15px}.form-grid input,.form-grid select{padding:14px;border:none;border-radius:14px;outline:none}.empty{padding:18px;border-radius:16px;background:rgba(255,255,255,.06);text-align:center;color:#ddd}@media(max-width:900px){.header{flex-direction:column;align-items:flex-start}.form-grid{grid-template-columns:1fr}.log-item{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div>
<h1>📈 سجل النشاطات</h1>
<p>متابعة جميع العمليات التي تحدث داخل منصة آفاق التعليمية.</p>
</div>
<div class="actions">
<button class="btn" onclick="location.href='admin-dashboard.html'">🏠 لوحة المدير</button>
<button class="btn" onclick="history.back()">← رجوع</button>
<button class="btn danger" onclick="clearLogs()">حذف الكل</button>
</div>
</header>
<section class="box">
<h2>إضافة نشاط تجريبي</h2>
<p>هذا القسم مؤقت لحين ربط Firebase، ويمكنك اختبار السجل منه.</p>
<div class="form-grid">
<select id="logType">
<option>طالب</option><option>مدرس</option><option>مادة</option><option>اشتراك</option><option>إشعار</option><option>رسالة</option><option>تقويم</option><option>حذف</option>
</select>
<input id="logAction" type="text" placeholder="مثال: إضافة طالب جديد">
<input id="logUser" type="text" placeholder="بواسطة: المدير">
</div>
<button class="btn" style="margin-top:15px" onclick="addLog()">➕ إضافة النشاط</button>
</section>
<section class="box">
<h2>البحث في السجل</h2>
<input class="search" id="searchInput" type="text" placeholder="🔍 ابحث حسب النوع أو العملية أو المستخدم..." oninput="renderLogs()">
</section>
<section class="box">
<h2>النشاطات الأخيرة</h2>
<div id="logsList"></div>
</section>
</main>
<script>
let logs=JSON.parse(localStorage.getItem('afaq_activity_logs'))||[
{type:'نظام',action:'تم إنشاء سجل النشاطات',user:'المدير',date:new Date().toLocaleString('ar-IQ')}
];
function saveLogs(){localStorage.setItem('afaq_activity_logs',JSON.stringify(logs));}
function addLog(){const type=document.getElementById('logType').value;const action=document.getElementById('logAction').value.trim();const user=document.getElementById('logUser').value.trim()||'المدير';if(!action){alert('يرجى كتابة النشاط');return;}logs.unshift({type,action,user,date:new Date().toLocaleString('ar-IQ')});saveLogs();document.getElementById('logAction').value='';document.getElementById('logUser').value='';renderLogs();}
function deleteLog(i){if(confirm('هل تريد حذف هذا النشاط؟')){logs.splice(i,1);saveLogs();renderLogs();}}
function clearLogs(){if(confirm('سيتم حذف جميع النشاطات، هل أنت متأكد؟')){logs=[];saveLogs();renderLogs();}}
function renderLogs(){const list=document.getElementById('logsList');const q=(document.getElementById('searchInput')?.value||'').trim();const filtered=logs.filter(l=>l.type.includes(q)||l.action.includes(q)||l.user.includes(q)||l.date.includes(q));if(filtered.length===0){list.innerHTML='<div class="empty">لا توجد نشاطات مطابقة</div>';return;}list.innerHTML=filtered.map((l)=>{const realIndex=logs.indexOf(l);return `<div class="log-item"><div><div class="log-title">${l.action}</div><div class="log-meta">بواسطة: ${l.user} - ${l.date}</div><span class="tag">${l.type}</span></div><button class="mini-btn" onclick="deleteLog(${realIndex})">حذف</button></div>`}).join('');}
saveLogs();renderLogs();
</script>
</body>
</html>
