<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>النتائج النهائية</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-badges.css"><link rel="stylesheet" href="../css/afaq-teacher-sync.css"></head><body><main class="afaq-mobile"><section class="afaq-top"><h1>📊 النتائج النهائية</h1><a class="afaq-btn gray" href="teacher-dashboard.html">رجوع</a></section><section class="sync-card"><select id="student"></select><input id="score" type="number" placeholder="درجة الطالب"><input id="total" type="number" placeholder="الدرجة الكلية" value="100"><button class="afaq-btn" onclick="save()">حفظ النتيجة النهائية</button></section><section class="sync-card"><h2>النتائج</h2><div id="box"></div></section></main><script src="../js/afaq-data.js"></script><script src="../js/afaq-teacher-sync.js"></script><script src="../js/afaq-unified-counters.js"></script><script src="../js/afaq-badges.js"></script><script>if(!AfaqTeacherSync.currentTeacher())location.href='teacher-login.html';function init(){const ss=AfaqTeacherSync.teacherStudents();student.innerHTML=ss.map(s=>`<option value='${AfaqTeacherSync.studentId(s)}'>${s.name||s.studentName} - ${s.grade}</option>`).join('');render()}function save(){try{const t=AfaqTeacherSync.currentTeacher();AfaqTeacherSync.addFinalResult(student.value,t.subject,score.value,total.value);render();alert('تم حفظ النتيجة ومزامنتها للطالب وولي الأمر والمدير')}catch(e){alert(e.message)}}function render(){const t=AfaqTeacherSync.currentTeacher();const list=AfaqTeacherSync.read('afaq_results').filter(x=>x.subject===AfaqTeacherSync.normalizeSubject(t.subject)&&x.type==='نهائي');box.innerHTML=list.length?list.map(x=>`<div class='sync-card'><h3>${x.studentName}</h3><p>${x.subject}: <b>${x.score}/${x.total}</b></p></div>`).join(''):'<p>لا توجد نتائج</p>'}init();</script></body></html>
