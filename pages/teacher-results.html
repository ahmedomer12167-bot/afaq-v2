<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج المدرس</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-purple-mobile.css">
<link rel="stylesheet" href="../css/afaq-badges.css">
</head>
<body>
<main class="afaq-mobile">

<section class="afaq-top">
<h1>📊 نتائج المادة</h1>
<div style="margin-top:14px">
<a class="afaq-btn gray" href="teacher-dashboard.html">رجوع للمدرس</a>
</div>
</section>

<section class="afaq-stats">
<div class="afaq-stat"><div class="icon">📝</div><h3>اختبارات</h3><strong id="examCount">0</strong></div>
<div class="afaq-stat"><div class="icon">📋</div><h3>واجبات</h3><strong id="assignmentCount">0</strong></div>
<div class="afaq-stat"><div class="icon">📊</div><h3>كل النتائج</h3><strong id="totalCount">0</strong></div>
<div class="afaq-stat"><div class="icon">📈</div><h3>المعدل</h3><strong id="avgScore">0%</strong></div>
</section>

<section class="panel">
<h2>إضافة نتيجة نهائية يدوياً</h2>
<input id="studentId" placeholder="كود الطالب">
<input id="studentName" placeholder="اسم الطالب">
<input id="title" placeholder="عنوان النتيجة">
<input id="score" type="number" placeholder="الدرجة">
<input id="total" type="number" placeholder="من">
<button class="afaq-btn" onclick="addFinalResult()">إضافة النتيجة</button>
</section>

<section class="panel" style="margin-top:15px">
<h2>نتائج المادة</h2>
<div id="resultsBox" class="cards"></div>
</section>

</main>

<script src="../js/afaq-data.js"></script>
<script src="../js/afaq-teacher-auth.js"></script>
<script src="../js/afaq-auto-stats.js"></script>
<script src="../js/afaq-badges.js"></script>

<script>
function read(key){try{return JSON.parse(localStorage.getItem(key))||[]}catch(e){return[]}}
function write(key,val){localStorage.setItem(key,JSON.stringify(val));window.dispatchEvent(new Event("afaqDataUpdated"))}
const teacher = window.AfaqTeacherAuth && AfaqTeacherAuth.requireTeacher ? AfaqTeacherAuth.requireTeacher() : null;
function currentTeacher(){
 if(window.AfaqTeacherAuth && AfaqTeacherAuth.currentTeacher) return AfaqTeacherAuth.currentTeacher();
 try{return JSON.parse(localStorage.getItem("afaq_current_teacher"))||{}}catch(e){return{}}
}
function teacherResults(){
 const t=currentTeacher();
 return read("afaq_results").filter(r=>!t.teacherCode || r.teacherCode===t.teacherCode || r.subjectCode===t.subjectCode || r.subject===t.subject);
}
function addFinalResult(){
 const t=currentTeacher();
 if(!studentId.value || !title.value || !score.value){
   alert("أدخل كود الطالب والعنوان والدرجة");
   return;
 }
 const results=read("afaq_results");
 results.unshift({
   id:"result-"+Date.now(),
   studentId:studentId.value.trim(),
   studentName:studentName.value.trim(),
   title:title.value.trim(),
   score:Number(score.value||0),
   total:Number(total.value||100),
   subject:t.subject||"",
   teacherCode:t.teacherCode||"",
   teacherName:t.fullName||t.name||"",
   subjectCode:t.subjectCode||"",
   type:"نهائي",
   createdAt:new Date().toLocaleString("ar")
 });
 write("afaq_results",results);
 studentId.value=studentName.value=title.value=score.value=total.value="";
 render();
}
function render(){
 const results=teacherResults();
 const exams=results.filter(r=>r.type==="اختبار").length;
 const assignments=results.filter(r=>r.type==="واجب").length;
 const percents=results.map(r=>{const s=Number(r.score||0),t=Number(r.total||100);return t?Math.round((s/t)*100):0}).filter(v=>!isNaN(v));
 const avg=percents.length?Math.round(percents.reduce((a,b)=>a+b,0)/percents.length):0;
 examCount.textContent=exams;
 assignmentCount.textContent=assignments;
 totalCount.textContent=results.length;
 avgScore.textContent=avg+"%";
 resultsBox.innerHTML=results.length?results.map(r=>`
 <div class="card">
 <h3>${r.studentName||r.studentId}</h3>
 <p>${r.title||"نتيجة"}</p>
 <p>النوع: ${r.type||"-"}</p>
 <p>الدرجة: <b>${r.score||0} / ${r.total||100}</b></p>
 <span class="badge">${r.createdAt||""}</span>
 </div>`).join(""):"<div class='card'><h3>لا توجد نتائج</h3></div>";
}
render();
</script>
</body>
</html>
