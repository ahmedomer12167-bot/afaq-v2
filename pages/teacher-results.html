<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النتائج النهائية - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn,.save-btn,.danger-btn,.mini-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.save-btn{background:linear-gradient(135deg,#16a34a,#22c55e)}.danger-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}input,select{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin:8px 0 14px;font-size:15px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:15px}.stat{padding:18px;border-radius:18px;background:rgba(255,255,255,.07);text-align:center;border:1px solid rgba(255,255,255,.12)}.stat strong{display:block;font-size:26px;margin-top:8px}.table{width:100%;border-collapse:collapse;margin-top:15px}.table th,.table td{padding:13px;text-align:center;border-bottom:1px solid rgba(255,255,255,.12)}.table th{color:#c084fc}.badge{padding:5px 10px;border-radius:10px;background:#7c3aed;display:inline-block}.success{background:#16a34a}.fail{background:#dc2626}@media(max-width:900px){.grid,.stats{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}.table{font-size:13px}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div><h1>📊 النتائج النهائية</h1><p>إضافة وتعديل نتائج الطلاب النهائية حسب المادة.</p></div>
<div class="actions"><button class="btn" onclick="location.href='teacher-subject-page.html'">🏠 صفحة المادة</button><button class="btn" onclick="history.back()">← رجوع</button></div>
</header>
<section class="box">
<h2>إضافة نتيجة نهائية</h2>
<div class="grid">
<input id="studentName" placeholder="اسم الطالب الثلاثي">
<input id="subjectName" placeholder="المادة" value="الأحياء">
<input id="finalGrade" type="number" placeholder="الدرجة النهائية من 100">
<select id="resultStatus"><option>ناجح</option><option>راسب</option><option>قيد المراجعة</option></select>
</div>
<button class="save-btn" onclick="addResult()">💾 حفظ النتيجة</button>
</section>
<section class="box">
<h2>إحصائيات النتائج</h2>
<div class="stats">
<div class="stat">عدد النتائج <strong id="totalCount">0</strong></div>
<div class="stat">الناجحون <strong id="passCount">0</strong></div>
<div class="stat">الراسبون <strong id="failCount">0</strong></div>
<div class="stat">أعلى درجة <strong id="maxGrade">0</strong></div>
<div class="stat">المعدل العام <strong id="avgGrade">0</strong></div>
</div>
</section>
<section class="box">
<h2>قائمة النتائج</h2>
<input id="searchResult" placeholder="🔍 ابحث باسم الطالب أو المادة" oninput="renderResults()">
<table class="table">
<thead><tr><th>الطالب</th><th>المادة</th><th>الدرجة</th><th>التقدير</th><th>الحالة</th><th>إجراءات</th></tr></thead>
<tbody id="resultsBody"></tbody>
</table>
</section>
</main>
<script>
let results=JSON.parse(localStorage.getItem('afaq_teacher_results'))||[];
function saveAll(){localStorage.setItem('afaq_teacher_results',JSON.stringify(results));}
function gradeLabel(g){g=Number(g);if(g>=90)return 'ممتاز';if(g>=80)return 'جيد جداً';if(g>=70)return 'جيد';if(g>=50)return 'مقبول';return 'ضعيف';}
function addResult(){const student=studentName.value.trim();const subject=subjectName.value.trim();const grade=finalGrade.value.trim();const status=resultStatus.value;if(!student||!subject||grade===''){alert('يرجى ملء بيانات النتيجة');return;}if(Number(grade)<0||Number(grade)>100){alert('الدرجة يجب أن تكون بين 0 و 100');return;}results.unshift({student,subject,grade:Number(grade),label:gradeLabel(grade),status,date:new Date().toLocaleString('ar')});saveAll();studentName.value='';finalGrade.value='';resultStatus.value='ناجح';renderResults();}
function deleteResult(i){if(confirm('هل تريد حذف هذه النتيجة؟')){results.splice(i,1);saveAll();renderResults();}}
function editResult(i){const r=results[i];const newGrade=prompt('أدخل الدرجة الجديدة',r.grade);if(newGrade===null)return;if(newGrade===''||Number(newGrade)<0||Number(newGrade)>100){alert('درجة غير صحيحة');return;}r.grade=Number(newGrade);r.label=gradeLabel(newGrade);r.status=Number(newGrade)>=50?'ناجح':'راسب';saveAll();renderResults();}
function renderStats(list){totalCount.textContent=list.length;passCount.textContent=list.filter(r=>r.status==='ناجح'||r.grade>=50).length;failCount.textContent=list.filter(r=>r.status==='راسب'||r.grade<50).length;maxGrade.textContent=list.length?Math.max(...list.map(r=>Number(r.grade))):0;avgGrade.textContent=list.length?Math.round(list.reduce((s,r)=>s+Number(r.grade),0)/list.length):0;}
function renderResults(){const s=searchResult.value.trim();const list=results.filter(r=>r.student.includes(s)||r.subject.includes(s));renderStats(list);if(list.length===0){resultsBody.innerHTML='<tr><td colspan="6">لا توجد نتائج حالياً</td></tr>';return;}resultsBody.innerHTML=list.map((r,i)=>`<tr><td>${r.student}</td><td>${r.subject}</td><td>${r.grade}</td><td>${r.label}</td><td><span class="badge ${r.grade>=50?'success':'fail'}">${r.status}</span></td><td><button class="mini-btn" onclick="editResult(${i})">تعديل</button> <button class="danger-btn" onclick="deleteResult(${i})">حذف</button></td></tr>`).join('');}
renderResults();
</script>
</body>
</html>
