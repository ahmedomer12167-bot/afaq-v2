<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>📖 الدروس والملفات</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-room.css"></head><body><main class="room"><section class="topbar"><div class="title"><h1>📖 الدروس والملفات</h1><p>بيانات موحدة مرتبطة بإدخالات المدرس والمدير.</p></div><a class="btn back" href="parent-dashboard.html">رجوع</a></section><section class="panel"><div id="box" class="cards"></div></section></main><script src="../js/afaq-data.js"></script><script>
function render(){
 const st=AfaqData.getCurrentStudent();
 const arr=AfaqData.scoped("lessons",{studentId:st?.studentId||st?.code});
 box.innerHTML=arr.length?arr.map(x=>`<div class="card"><h3>${x.title||x.subject||"عنصر"}</h3><p>${x.description||x.status||""}</p>${x.score?`<p>الدرجة: ${x.score} / ${x.total||100}</p>`:""}<span class="badge">${x.subject||"عام"}</span>${x.url?`<button class="btn" onclick="window.open('${x.url}','_blank')">فتح الملف</button>`:""}</div>`).join(""):"<div class='card'><h3>لا توجد بيانات حالياً</h3></div>"
}render();
</script></body></html>
