<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>واجبات المادة</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-badges.css"><link rel="stylesheet" href="../css/afaq-teacher-sync.css"></head><body><main class="afaq-mobile"><section class="afaq-top"><h1>📋 واجبات المادة</h1><a class="afaq-btn gray" href="student-subject-room.html">رجوع</a></section><section id="box"></section></main><script src="../js/afaq-data.js"></script><script src="../js/afaq-teacher-sync.js"></script><script src="../js/afaq-unified-counters.js"></script><script src="../js/afaq-badges.js"></script><script>const sub=localStorage.getItem('afaq_current_subject')||'';function solve(id){const item=AfaqTeacherSync.read('afaq_assignments').find(x=>x.id===id);let ans={};(item.questions||[]).forEach((q,i)=>ans[i]=prompt(q.text||'السؤال '+(i+1))||'');try{AfaqTeacherSync.submitObjective('assignment',id,ans);render();alert('تم إرسال الحل وتصحيح الأسئلة الموضوعية')}catch(e){alert(e.message)}}function render(){const list=AfaqTeacherSync.studentItems('assignments',sub);box.innerHTML=list.length?list.map(x=>`<div class='sync-card'><h3>${x.title}</h3><p>المادة: ${x.subject}</p><p>عدد الأسئلة: ${(x.questions||[]).length}</p><button class='afaq-btn' onclick="solve('${x.id}')">حل الواجب</button></div>`).join(''):'<div class="sync-card"><h3>لا توجد واجبات</h3></div>'}render();</script></body></html>
