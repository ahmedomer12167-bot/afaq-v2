<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>حل الواجبات</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-builder-final.css"></head><body><main class="afaq-mobile"><section class="afaq-top"><h1 id="titlePage">حل الواجبات</h1><a class="afaq-btn gray" href="student-subject-room.html">رجوع</a></section><section id="itemsBox"></section></main><script src="../js/afaq-data.js"></script><script src="../js/afaq-exam-builder.js"></script><script>
const kind='assignment'; const subject=localStorage.getItem('afaq_current_subject')||''; if(!AfaqExamBuilder.currentStudent())location.href='student-login.html';
function itemHtml(item){const done=AfaqExamBuilder.hasSubmission(kind,item.id); return `<div class="card"><h3>${item.title}</h3><p>الدرجة النهائية: ${item.finalDegree}</p>${done?`<span class="pill">${done.status} - الدرجة ${done.totalScore}/${done.finalDegree}</span>`:`<form id="form-${item.id}">${(item.questions||[]).map((q,i)=>qHtml(q,i)).join('')}<button type="button" class="afaq-btn" onclick="submitItem('${item.id}')">إرسال الإجابات</button></form>`}</div>`}
function qHtml(q,i){if(q.type==='choice')return `<div class="answer-row"><h3>${q.text}</h3>${(q.choices||[]).map(c=>`<label><input type="radio" name="q${i}" value="${c}"> ${c}</label>`).join('')}</div>`; if(q.type==='truefalse')return `<div class="answer-row"><h3>${q.text}</h3><label><input type="radio" name="q${i}" value="صح"> صح</label><label><input type="radio" name="q${i}" value="خطأ"> خطأ</label></div>`; if(q.type==='blank')return `<div class="answer-row"><h3>${q.text}</h3><input name="q${i}" placeholder="اكتب الإجابة"></div>`; if(q.type==='essay')return `<div class="answer-row"><h3>${q.text}</h3><textarea name="q${i}" placeholder="اكتب الإجابة المقالية"></textarea></div>`; return `<div class="answer-row"><h3>${q.text}</h3><input type="file" accept="image/*" name="q${i}"><p>أرفق صورة حل المسألة من جهازك</p></div>`}
function val(form,i,q,cb){if(q.type==='choice'||q.type==='truefalse'){const e=form.querySelector(`[name="q${i}"]:checked`);cb(e?e.value:'')}else if(q.type==='image'){const f=form.querySelector(`[name="q${i}"]`).files[0]; if(f)AfaqExamBuilder.fileToBase64(f,cb); else cb('')}else{cb(form.querySelector(`[name="q${i}"]`).value||'')}}
function submitItem(id){const item=AfaqExamBuilder.read('afaq_assignments').find(x=>x.id===id);const form=document.getElementById('form-'+id);let answers={},i=0;function next(){if(i>=item.questions.length){try{AfaqExamBuilder.submit(kind,id,answers);render();alert('تم الإرسال. انتظر التصحيح اليدوي إن وجد.')}catch(e){alert(e.message)}return} val(form,i,item.questions[i],v=>{answers[i]=v;i++;next()})}next()}
function render(){const list=AfaqExamBuilder.studentItems(kind,subject);itemsBox.innerHTML=list.length?list.map(itemHtml).join(''):'<div class="card"><h3>لا توجد واجبات حالياً</h3></div>'}render();
</script></body></html>
