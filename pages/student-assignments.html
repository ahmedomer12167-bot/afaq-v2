<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>واجبات الطالب - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn,.submit-btn,.danger-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.submit-btn{background:linear-gradient(135deg,#16a34a,#22c55e)}.danger-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}input,select,textarea{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin:8px 0 14px;font-size:15px}textarea{min-height:90px;resize:vertical}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}.stat{padding:18px;border-radius:18px;background:rgba(255,255,255,.07);text-align:center}.stat strong{font-size:26px;display:block;margin-top:8px}.assignment-card{padding:18px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);margin-top:14px}.assignment-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.badge{display:inline-block;padding:6px 10px;border-radius:10px;background:#7c3aed;font-size:13px}.done{background:#16a34a}.late{background:#dc2626}.pending{background:#ca8a04}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}@media(max-width:900px){.stats,.grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div><h1>📋 واجبات الأحياء</h1><p>عرض الواجبات المنشورة وتسليم الحلول ومتابعة الدرجات.</p></div>
<div class="actions"><button class="btn" onclick="location.href='student-subject-page.html'">🏠 صفحة المادة</button><button class="btn" onclick="history.back()">← رجوع</button></div>
</header>
<section class="stats">
<div class="stat">كل الواجبات <strong id="totalCount">0</strong></div>
<div class="stat">المُسلَّمة <strong id="doneCount">0</strong></div>
<div class="stat">غير المُسلَّمة <strong id="pendingCount">0</strong></div>
<div class="stat">مجموع الدرجات <strong id="totalGrades">0</strong></div>
</section>
<section class="box">
<h2>🔍 البحث والتصفية</h2>
<div class="grid">
<input id="searchInput" placeholder="ابحث عن واجب..." oninput="renderAssignments()">
<select id="statusFilter" onchange="renderAssignments()">
<option value="all">كل الحالات</option>
<option value="غير مُسلَّم">غير مُسلَّم</option>
<option value="مُسلَّم">مُسلَّم</option>
<option value="متأخر">متأخر</option>
</select>
</div>
</section>
<section class="box">
<h2>📋 قائمة الواجبات</h2>
<div id="assignmentsList"></div>
</section>
</main>
<script>
let assignments=JSON.parse(localStorage.getItem('afaq_student_assignments'))||[
{title:'واجب الجهاز العصبي',desc:'حل أسئلة الفصل الأول من صفحة 12 إلى 15.',due:'2026-07-10',degree:10,status:'غير مُسلَّم',studentAnswer:'',note:'',grade:0},
{title:'واجب الخلية',desc:'اكتب ملخصاً قصيراً عن مكونات الخلية.',due:'2026-07-15',degree:10,status:'مُسلَّم',studentAnswer:'تم حل الواجب',note:'جيد جداً',grade:9}
];
function save(){localStorage.setItem('afaq_student_assignments',JSON.stringify(assignments));}
function badgeClass(status){return status==='مُسلَّم'?'done':status==='متأخر'?'late':'pending';}
function renderStats(){totalCount.textContent=assignments.length;doneCount.textContent=assignments.filter(a=>a.status==='مُسلَّم').length;pendingCount.textContent=assignments.filter(a=>a.status!=='مُسلَّم').length;totalGrades.textContent=assignments.reduce((s,a)=>s+(Number(a.grade)||0),0);}
function renderAssignments(){const q=searchInput.value.trim();const f=statusFilter.value;let list=assignments.filter(a=>(a.title.includes(q)||a.desc.includes(q))&&(f==='all'||a.status===f));const box=document.getElementById('assignmentsList');if(list.length===0){box.innerHTML='<p>لا توجد واجبات مطابقة.</p>';renderStats();return;}box.innerHTML=list.map((a,i)=>{const realIndex=assignments.indexOf(a);return `<div class="assignment-card"><div class="assignment-head"><div><h3>${a.title}</h3><span class="badge ${badgeClass(a.status)}">${a.status}</span></div><strong>${a.grade || 0}/${a.degree}</strong></div><p>${a.desc}</p><p>موعد التسليم: ${a.due}</p><p>ملاحظة المدرس: ${a.note || 'لا توجد ملاحظات'}</p><textarea id="answer_${realIndex}" placeholder="اكتب حل الواجب هنا أو ملاحظة التسليم">${a.studentAnswer || ''}</textarea><button class="submit-btn" onclick="submitAssignment(${realIndex})">تسليم الواجب</button></div>`}).join('');renderStats();}
function submitAssignment(i){const val=document.getElementById('answer_'+i).value.trim();if(!val){alert('يرجى كتابة الحل قبل التسليم');return;}assignments[i].studentAnswer=val;assignments[i].status='مُسلَّم';save();renderAssignments();alert('تم تسليم الواجب بنجاح');}
renderAssignments();
</script>
</body>
</html>
