<html lang="ar" dir="rtl">
<head>

<link rel="stylesheet" href="../css/main.css">

</head>
<body>
<div class="layout">
<aside class="sidebar">
<div class="brand"><div class="brand-icon">👨‍👩‍👦</div><div><h2>آفاق التعليمية</h2><p>لوحة ولي الأمر</p></div></div>
<nav class="nav"><a class="" href="parent-dashboard.html">🏠 الرئيسية</a>
<a class="" href="parent-student-info.html">👨‍🎓 معلومات الطالب</a>
<a class="" href="parent-results.html">📊 النتائج</a>

<a class="" href="parent-profile.html">👤 ملف ولي الأمر</a><a class="logout" href="../index.html">🚪 تسجيل خروج</a></nav>
</aside>
<main class="main">
<section class="hero"><div><h1>📝 اختبارات الطالب</h1><p>متابعة الاختبارات.</p></div><div class="actions"><button class="btn" onclick="history.back()">رجوع</button></div></section>
<section class="panel">
<h2>القائمة</h2>
<div id="listBox" class="cards"></div>
</section>
</main>
</div>
<script src="../js/afaq-data.js"></script>
<script>
function render(){
 let arr = [];
 if(window.AfaqData){
   arr = AfaqData.list("exams") || [];
 }
 const box=document.getElementById("listBox");
 if(!arr.length){
   box.innerHTML='<div class="card"><h3>لا توجد بيانات حالياً</h3><p>ستظهر البيانات هنا بعد إضافتها من لوحة المدرس أو المدير.</p></div>';
   return;
 }
 box.innerHTML = arr.map(x=>`
 <div class="card">
   <h3>${x.title || x.studentName || x.subject || "عنصر"}</h3>
   <p>${x.description || x.status || x.score || x.message || "بيانات مرتبطة"}</p>
   <p><span class="badge">${x.subject || "عام"}</span></p>
 </div>`).join("");
}
render();
</script>
</body>
</html>
