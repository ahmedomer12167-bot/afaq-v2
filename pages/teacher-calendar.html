<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقويم المادة - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn,.save-btn,.danger-btn,.mini-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.save-btn{background:linear-gradient(135deg,#16a34a,#22c55e)}.danger-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}input,select,textarea{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin:8px 0 14px;font-size:15px}textarea{min-height:90px;resize:vertical}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.stat-card,.event-card{padding:18px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12)}.stat-card strong{display:block;font-size:28px;margin-top:8px}.event-card{margin-top:12px}.event-head{display:flex;justify-content:space-between;align-items:center;gap:10px}.badge{display:inline-block;padding:5px 10px;border-radius:10px;background:#7c3aed;font-size:13px;margin-top:6px}.today{border-color:#22c55e;box-shadow:0 0 22px rgba(34,197,94,.25)}@media(max-width:900px){.grid,.stats{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div><h1>📅 تقويم المادة</h1><p>إدارة مواعيد الاختبارات والواجبات والمحاضرات والأحداث الخاصة بالمادة.</p></div>
<div class="actions"><button class="btn" onclick="location.href='teacher-dashboard.html'">🏠 لوحة المدرس</button><button class="btn" onclick="history.back()">← رجوع</button></div>
</header>
<section class="box">
<h2>إحصائيات التقويم</h2>
<div class="stats">
<div class="stat-card">كل الأحداث <strong id="totalEvents">0</strong></div>
<div class="stat-card">الاختبارات <strong id="examCount">0</strong></div>
<div class="stat-card">الواجبات <strong id="assignmentCount">0</strong></div>
<div class="stat-card">المحاضرات <strong id="lectureCount">0</strong></div>
</div>
</section>
<section class="box">
<h2>إضافة حدث جديد</h2>
<div class="grid">
<input id="eventTitle" placeholder="عنوان الحدث">
<select id="eventType"><option>اختبار</option><option>واجب</option><option>محاضرة</option><option>مراجعة</option><option>مناسبة</option><option>إعلان</option></select>
<input id="eventSubject" placeholder="اسم المادة" value="الأحياء">
<input id="eventDate" type="date">
<input id="eventTime" type="time">
<select id="eventStatus"><option>منشور</option><option>مخفي</option></select>
</div>
<textarea id="eventDescription" placeholder="وصف الحدث"></textarea>
<button class="save-btn" onclick="addEvent()">➕ إضافة الحدث</button>
</section>
<section class="box">
<h2>الأحداث المسجلة</h2>
<input id="searchEvent" placeholder="🔍 ابحث بعنوان الحدث أو نوعه أو المادة" oninput="renderEvents()">
<div id="eventsList"></div>
</section>
</main>
<script>
let events=JSON.parse(localStorage.getItem('afaq_teacher_calendar'))||[];
function saveEvents(){localStorage.setItem('afaq_teacher_calendar',JSON.stringify(events));}
function todayString(){return new Date().toISOString().slice(0,10);}
function addEvent(){
const title=eventTitle.value.trim(), type=eventType.value, subject=eventSubject.value.trim(), date=eventDate.value, time=eventTime.value, status=eventStatus.value, description=eventDescription.value.trim();
if(!title||!date||!time){alert('يرجى إدخال عنوان الحدث والتاريخ والوقت');return;}
events.unshift({title,type,subject,date,time,status,description,createdAt:new Date().toLocaleString('ar')});
saveEvents();
['eventTitle','eventDate','eventTime','eventDescription'].forEach(id=>document.getElementById(id).value='');
eventSubject.value='الأحياء';
renderEvents();
alert('تم إضافة الحدث بنجاح');
}
function deleteEvent(i){if(confirm('هل تريد حذف هذا الحدث؟')){events.splice(i,1);saveEvents();renderEvents();}}
function renderStats(list=events){
totalEvents.textContent=list.length;
examCount.textContent=list.filter(e=>e.type==='اختبار').length;
assignmentCount.textContent=list.filter(e=>e.type==='واجب').length;
lectureCount.textContent=list.filter(e=>e.type==='محاضرة').length;
}
function renderEvents(){
const s=searchEvent.value.trim();
const filtered=events.filter(e=>e.title.includes(s)||e.type.includes(s)||e.subject.includes(s));
renderStats(events);
if(filtered.length===0){eventsList.innerHTML='<p>لا توجد أحداث حالياً</p>';return;}
eventsList.innerHTML=filtered.map((e,i)=>`<div class="event-card ${e.date===todayString()?'today':''}"><div class="event-head"><div><h3>${e.title}</h3><span class="badge">${e.type}</span> <span class="badge">${e.status}</span></div><button class="danger-btn" onclick="deleteEvent(${events.indexOf(e)})">حذف</button></div><p>المادة: ${e.subject}</p><p>التاريخ: ${e.date} - الوقت: ${e.time}</p><p>${e.description||'لا يوجد وصف'}</p><small>تم الإنشاء: ${e.createdAt}</small></div>`).join('');
}
renderEvents();
</script>
</body>
</html>
