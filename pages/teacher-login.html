<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دخول المدرس - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-room.css">
</head>
<body>
<main class="room">

<section class="panel" style="max-width:540px;margin:auto">
  <h1>👨‍🏫 دخول المدرس</h1>
  <p>لا يمكن الدخول إلا إذا قام المدير بإضافة المدرس وربطه بالصف والمادة.</p>

  <input id="teacherCode" placeholder="كود المدرس">
  <input id="subjectCode" placeholder="كود المادة">

  <button class="btn ok" onclick="login()">دخول المدرس</button>
  <a class="btn back" href="../index.html">رجوع للرئيسية</a>

  <p id="msg"></p>
</section>

</main>

<script src="../js/afaq-teacher-auth.js"></script>
<script>
function login(){
  const teacher = AfaqTeacherAuth.loginTeacher(teacherCode.value, subjectCode.value);

  if(!teacher){
    msg.textContent = "الكود غير صحيح أو لم يتم تفعيل المدرس من المدير.";
    return;
  }

  location.href = "teacher-dashboard.html";
}
</script>
</body>
</html>
