<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل دخول المدرس - آفاق التعليمية</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>

<section class="login-page">
  <div class="login-box">
    <a href="../index.html" class="back-link">← الرجوع للرئيسية</a>

    <div class="login-icon">👨‍🏫</div>
    <h1>تسجيل دخول المدرس</h1>
    <p>أدخل بياناتك التي حددها المدير</p>

    <form>
      <label>الاسم الثلاثي</label>
      <input type="text" placeholder="مثال: أحمد محمد علي" />

      <label>الصف</label>
      <select>
        <option>الأول متوسط</option>
        <option>الثاني متوسط</option>
        <option>الثالث متوسط</option>
        <option>الرابع الإعدادي</option>
        <option>الخامس الإعدادي</option>
        <option>السادس الإعدادي</option>
      </select>

      <label>المادة</label>
      <select>
        <option>الأحياء</option>
        <option>الفيزياء</option>
        <option>الكيمياء</option>
        <option>الرياضيات</option>
        <option>الاجتماعيات</option>
        <option>العربي</option>
        <option>الإنكليزي</option>
        <option>الإسلامية</option>
      </select>

      <label>كود المدرس</label>
      <input type="password" placeholder="أدخل كود المدرس" />

      <button type="button">دخول المدرس</button>
    </form>
  </div>
</section>

<script src="../js/app.js"></script>
</body>
</html>
