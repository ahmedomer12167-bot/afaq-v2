<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول ولي الأمر - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
</head>
<body>

<section class="login-page">
<div class="login-box">

<a href="../index.html" class="back-link">← الرجوع للرئيسية</a>

<div class="login-icon">👨‍👩‍👦</div>

<h1>تسجيل دخول ولي الأمر</h1>

<p>أدخل اسم الطالب وكود الطالب/ولي الأمر للوصول إلى بيانات الطالب</p>

<form>
<label>اسم الطالب الثلاثي</label>
<input id="studentNameInput" type="text" placeholder="مثال: أحمد محمد علي">

<label>كود الطالب / رمز ولي الأمر</label>
<input id="parentCodeInput" type="password" placeholder="مثال: STD-2026-001">

<button type="button" onclick="loginParent()">دخول ولي الأمر</button>
</form>

</div>
</section>

<script src="../js/afaq-data.js"></script>
<script>
function loginParent(){
  const name = document.getElementById("studentNameInput").value.trim();
  const code = document.getElementById("parentCodeInput").value.trim();

  if(!name || !code){
    alert("يرجى إدخال اسم الطالب والكود");
    return;
  }

  const student = AfaqData.getStudentByNameAndParentCode(name, code);

  if(!student){
    alert("لم يتم العثور على طالب مطابق. تأكد من الاسم والكود.");
    return;
  }

  AfaqData.setCurrentStudent(student);
  window.location.href = "parent-dashboard.html";
}
</script>

</body>
</html>
