<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>الملف الشخصي</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-student-complete.css"></head><body><main class="afaq-mobile"><section class="afaq-top"><h1>👤 الملف الشخصي</h1><div style="margin-top:14px"><a class="afaq-btn gray" href="student-dashboard.html">رجوع</a></div></section><section class="cardx"><div class="profile-list" id="box"></div></section></main><script src="../js/afaq-data.js"></script><script src="../js/afaq-complete-sync.js"></script><script>const s=AfaqSync.currentStudent(); if(!s)location.href='student-login.html'; function safe(v){return v&&String(v).trim()?String(v).trim():'-'} box.innerHTML=`<div class="profile-item"><b>اسم الطالب الثلاثي</b><span>${safe(s.name||s.studentName||s.fullName)}</span></div><div class="profile-item"><b>كود الطالب</b><span>${safe(s.code||s.studentId||s.studentCode)}</span></div><div class="profile-item"><b>الصف</b><span>${safe(s.grade)}</span></div><div class="profile-item"><b>اسم ولي الأمر الثلاثي</b><span>${safe(s.parentName||s.guardianName)}</span></div><div class="profile-item"><b>حالة الاشتراك</b><span>${safe(s.subscriptionStatus)}</span></div><div class="profile-item"><b>المواد المسجل بها</b><span>${safe((s.subjects||[]).join('، '))}</span></div>`</script></body></html>
