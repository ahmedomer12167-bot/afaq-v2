<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الملف الشخصي للطالب</title>
<style>
body{font-family:Arial;background:#111827;color:#fff;margin:0;padding:20px}
.card{max-width:900px;margin:auto;background:#1f2937;padding:25px;border-radius:20px}
input,textarea{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none}
button{background:#7c3aed;color:white;border:none;padding:12px 18px;border-radius:10px;cursor:pointer}
.avatar{width:120px;height:120px;border-radius:50%;background:#374151;margin:auto;display:flex;align-items:center;justify-content:center;font-size:50px}
</style>
</head>
<body>
<div class="card">
<div class="avatar">👨‍🎓</div>
<h2>الملف الشخصي للطالب</h2>
<input placeholder="الاسم الثلاثي" value="أحمد محمد علي">
<input placeholder="المرحلة الدراسية" value="السادس العلمي">
<input placeholder="رقم الهاتف" value="07xxxxxxxxx">
<input placeholder="ولي الأمر" value="محمد علي">
<input placeholder="هاتف ولي الأمر" value="07xxxxxxxxx">
<textarea placeholder="ملاحظات الطالب"></textarea>
<button onclick="alert('تم حفظ التغييرات')">حفظ التغييرات</button>
</div>
</body>
</html>
