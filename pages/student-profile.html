<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الملف الشخصي للطالب - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}
.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}
.header{display:flex;justify-content:space-between;align-items:center;gap:15px}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn,.save-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}
.save-btn{background:linear-gradient(135deg,#16a34a,#22c55e);width:100%;margin-top:10px}
.profile-grid{display:grid;grid-template-columns:260px 1fr;gap:22px}
.avatar-box{text-align:center;padding:20px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12)}
.avatar{width:130px;height:130px;border-radius:50%;margin:0 auto 15px;background:linear-gradient(135deg,#7c3aed,#a855f7);display:flex;align-items:center;justify-content:center;font-size:56px}
input,select,textarea{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin:8px 0 14px;font-size:15px}
textarea{min-height:100px;resize:vertical}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
.subjects{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.badge{padding:7px 12px;border-radius:12px;background:#7c3aed}
@media(max-width:900px){.profile-grid,.form-grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<main class="page">

<header class="header">
<div>
<h1>👤 الملف الشخصي للطالب</h1>
<p>عرض وتعديل بيانات الطالب وولي الأمر.</p>
</div>
<div class="actions">
<button class="btn" onclick="location.href='student-dashboard.html'">🏠 لوحة الطالب</button>
<button class="btn" onclick="history.back()">← رجوع</button>
</div>
</header>

<section class="profile-grid">
<div class="avatar-box">
<div class="avatar">👨‍🎓</div>
<h2 id="previewName">أحمد محمد علي</h2>
<p id="previewGrade">السادس العلمي</p>
<div class="subjects">
<span class="badge">الأحياء</span>
<span class="badge">الكيمياء</span>
<span class="badge">الفيزياء</span>
</div>
</div>

<div class="box">
<h2>بيانات الطالب</h2>

<div class="form-grid">
<input id="studentName" placeholder="الاسم الثلاثي" value="أحمد محمد علي">
<select id="studentGrade">
<option>الأول متوسط</option>
<option>الثاني متوسط</option>
<option>الثالث متوسط</option>
<option>الرابع العلمي</option>
<option>الخامس العلمي</option>
<option selected>السادس العلمي</option>
</select>
<input id="studentPhone" placeholder="رقم هاتف الطالب" value="07xxxxxxxxx">
<input id="parentName" placeholder="اسم ولي الأمر" value="محمد علي">
<input id="parentPhone" placeholder="رقم هاتف ولي الأمر" value="07xxxxxxxxx">
<input id="studentCode" placeholder="كود الطالب" value="STD-2026">
</div>

<textarea id="notes" placeholder="ملاحظات إضافية عن الطالب"></textarea>

<button class="save-btn" onclick="saveProfile()">💾 حفظ التغييرات</button>
</div>
</section>

</main>

<script>
function saveProfile(){
const name=document.getElementById("studentName").value.trim();
const grade=document.getElementById("studentGrade").value;

document.getElementById("previewName").textContent=name || "طالب";
document.getElementById("previewGrade").textContent=grade;

localStorage.setItem("afaq_student_profile",JSON.stringify({
name,
grade,
phone:document.getElementById("studentPhone").value,
parentName:document.getElementById("parentName").value,
parentPhone:document.getElementById("parentPhone").value,
code:document.getElementById("studentCode").value,
notes:document.getElementById("notes").value
}));

alert("تم حفظ بيانات الطالب");
}

function loadProfile(){
const data=JSON.parse(localStorage.getItem("afaq_student_profile"));
if(!data)return;

studentName.value=data.name || "";
studentGrade.value=data.grade || "";
studentPhone.value=data.phone || "";
parentName.value=data.parentName || "";
parentPhone.value=data.parentPhone || "";
studentCode.value=data.code || "";
notes.value=data.notes || "";

document.getElementById("previewName").textContent=data.name || "طالب";
document.getElementById("previewGrade").textContent=data.grade || "";
}

loadProfile();
</script>
</body>
</html>
