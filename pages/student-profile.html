<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👤 الملف الشخصي - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-room.css">
</head>
<body>

<main class="room">
<section class="topbar"><div class="title"><h1>👤 الملف الشخصي</h1><p>غرفة مستقلة لبيانات الطالب.</p></div><div class="actions"><a class="btn back" href="student-dashboard.html">رجوع للوحة</a></div></section>
<section class="content">
<div class="panel">
<div class="hero-card"><img id="studentPhotoView" class="avatar"><div><h2 id="studentNameView">اسم الطالب</h2><p id="studentGradeView">المرحلة</p><div id="subjectsList"></div></div></div>
</div>
<div class="panel"><h2>البيانات</h2><div class="info-grid">
<div class="info"><strong>الاسم</strong><span id="studentNameInfo">-</span></div>
<div class="info"><strong>المرحلة</strong><span id="studentGradeInfo">-</span></div>
<div class="info"><strong>هاتف الطالب</strong><span id="studentPhoneInfo">-</span></div>
<div class="info"><strong>الكود</strong><span id="studentCodeInfo">-</span></div>
<div class="info"><strong>ولي الأمر</strong><span id="parentNameInfo">-</span></div>
<div class="info"><strong>هاتف ولي الأمر</strong><span id="parentPhoneInfo">-</span></div>
<div class="info"><strong>الاشتراك</strong><span id="subscriptionStatusInfo">-</span></div>
<div class="info"><strong>انتهاء الاشتراك</strong><span id="subscriptionEndInfo">-</span></div>
</div></div>
<div class="panel"><h2>ملاحظات</h2><p id="studentNotesInfo">-</p></div>
</section></main>
<script src="../js/afaq-data.js"></script>
<script>if(window.AfaqData){const st=AfaqData.renderCurrentStudent(); if(!st) location.href="student-login.html";}</script>
</body>
</html>
