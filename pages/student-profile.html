<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الملف الشخصي للطالب</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-purple-mobile.css">
<link rel="stylesheet" href="../css/afaq-badges.css">
<link rel="stylesheet" href="../css/afaq-student-clean.css">
</head>
<body>
<main class="afaq-mobile">

<section class="afaq-top">
<h1>👤 الملف الشخصي</h1>
<p>بيانات الطالب محفوظة ومثبتة من بيانات المدير والاشتراك.</p>
<div style="margin-top:14px">
<a class="afaq-btn gray" href="student-dashboard.html">رجوع للطالب</a>
</div>
</section>

<section class="profile-card">
<h3>معلومات الطالب</h3>
<div class="profile-list" id="profileBox"></div>
</section>

</main>

<script src="../js/afaq-data.js"></script>
<script src="../js/afaq-full-sync.js"></script>
<script src="../js/afaq-unified-counters.js"></script>
<script>
let student = AfaqFullSync.resyncCurrentStudent();
if(!student){location.href="student-login.html";}

function safe(v){return v && String(v).trim() ? String(v).trim() : "-";}
function render(){
  const subjects = Array.isArray(student.subjects) ? student.subjects.join("، ") : "-";
  profileBox.innerHTML = `
    <div class="profile-item"><b>اسم الطالب الثلاثي</b><span>${safe(student.name || student.studentName || student.fullName)}</span></div>
    <div class="profile-item"><b>كود الطالب</b><span>${safe(student.code || student.studentId || student.studentCode)}</span></div>
    <div class="profile-item"><b>الصف</b><span>${safe(student.grade)}</span></div>
    <div class="profile-item"><b>اسم ولي الأمر الثلاثي</b><span>${safe(student.parentName || student.guardianName)}</span></div>
    <div class="profile-item"><b>حالة الاشتراك</b><span>${safe(student.subscriptionStatus)}</span></div>
    <div class="profile-item"><b>المبلغ</b><span>${safe(student.amount)}</span></div>
    <div class="profile-item"><b>المواد المسجل بها</b><span>${safe(subjects)}</span></div>
    <div class="profile-item"><b>المستوى</b><span>${safe(student.level || "مبتدئ")}</span></div>
  `;
}
render();
</script>
</body>
</html>
