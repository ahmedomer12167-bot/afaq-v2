<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسائل الطالب - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}
.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}
.header{display:flex;justify-content:space-between;align-items:center;gap:15px}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn,.send-btn,.delete-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}
.send-btn{background:linear-gradient(135deg,#16a34a,#22c55e);width:100%}
.delete-btn{background:linear-gradient(135deg,#dc2626,#ef4444);padding:8px 12px}
input,select,textarea{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin:8px 0 14px;font-size:15px}
textarea{min-height:120px;resize:vertical}
.message{padding:16px;border-radius:18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);margin-top:12px}
.message-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
.badge{display:inline-block;padding:5px 10px;border-radius:10px;background:#7c3aed;font-size:13px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
@media(max-width:900px){.grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<main class="page">

<header class="header">
<div>
<h1>💬 رسائلي</h1>
<p>مراسلة المدرس ومتابعة الردود الخاصة بمادة الأحياء.</p>
</div>
<div class="actions">
<button class="btn" onclick="location.href='student-subject-page.html'">📚 صفحة المادة</button>
<button class="btn" onclick="location.href='student-dashboard.html'">🏠 لوحة الطالب</button>
<button class="btn" onclick="history.back()">← رجوع</button>
</div>
</header>

<section class="box">
<h2>إرسال رسالة جديدة</h2>

<div class="grid">
<select id="receiver">
<option>مدرس المادة</option>
<option>إدارة المنصة</option>
</select>

<input id="subject" placeholder="عنوان الرسالة">
</div>

<textarea id="messageText" placeholder="اكتب رسالتك هنا..."></textarea>

<button class="send-btn" onclick="sendMessage()">إرسال الرسالة</button>
</section>

<section class="box">
<h2>صندوق الرسائل</h2>
<input id="searchInput" placeholder="🔍 ابحث في الرسائل..." oninput="renderMessages()">
<div id="messagesList"></div>
</section>

</main>

<script>
let messages = JSON.parse(localStorage.getItem("afaq_student_messages")) || [
{receiver:"مدرس المادة",subject:"استفسار عن الواجب",text:"أستاذ، هل يمكن توضيح السؤال الثاني؟",date:"اليوم",status:"مرسلة"},
{receiver:"مدرس المادة",subject:"رد المدرس",text:"نعم، المطلوب هو شرح الفكرة الأساسية فقط.",date:"اليوم",status:"واردة"}
];

function saveMessages(){
localStorage.setItem("afaq_student_messages",JSON.stringify(messages));
}

function sendMessage(){
const receiver=document.getElementById("receiver").value;
const subject=document.getElementById("subject").value.trim();
const text=document.getElementById("messageText").value.trim();

if(!subject || !text){
alert("يرجى كتابة عنوان الرسالة ونصها");
return;
}

messages.unshift({
receiver,
subject,
text,
date:new Date().toLocaleString("ar"),
status:"مرسلة"
});

saveMessages();
renderMessages();

document.getElementById("subject").value="";
document.getElementById("messageText").value="";

alert("تم إرسال الرسالة");
}

function deleteMessage(index){
if(confirm("هل تريد حذف هذه الرسالة؟")){
messages.splice(index,1);
saveMessages();
renderMessages();
}
}

function renderMessages(){
const list=document.getElementById("messagesList");
const search=document.getElementById("searchInput").value.trim();

let filtered=messages.filter(m=>
m.receiver.includes(search) ||
m.subject.includes(search) ||
m.text.includes(search) ||
m.status.includes(search)
);

if(filtered.length===0){
list.innerHTML="<p>لا توجد رسائل حالياً</p>";
return;
}

list.innerHTML=filtered.map((m,i)=>`
<div class="message">
<div class="message-head">
<div>
<span class="badge">${m.status}</span>
<strong>${m.subject}</strong>
</div>
<button class="delete-btn" onclick="deleteMessage(${i})">حذف</button>
</div>
<p><strong>إلى/من:</strong> ${m.receiver}</p>
<p>${m.text}</p>
<small>${m.date}</small>
</div>
`).join("");
}

saveMessages();
renderMessages();
</script>
</body>
</html>
