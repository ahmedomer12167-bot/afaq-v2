<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 الرسائل - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-room.css">
</head>
<body>

<main class="room">
<section class="topbar"><div class="title"><h1>💬 الرسائل</h1><p>غرفة مستقلة للرسائل.</p></div><a class="btn back" href="student-dashboard.html">رجوع للوحة</a></section>
<section class="content">
<div class="panel"><h2>رسالة جديدة</h2><input id="to" placeholder="إلى"><input id="subject" placeholder="العنوان"><textarea id="msgText" placeholder="نص الرسالة"></textarea><button class="btn" onclick="sendMsg()">إرسال</button></div>
<div class="panel"><h2>الرسائل</h2><div id="box" class="cards"></div></div>
</section></main>
<script src="../js/afaq-data.js"></script>
<script>
function sendMsg(){const arr=AfaqData.list("messages");arr.unshift({id:"msg-"+Date.now(),to:to.value,subject:subject.value,message:msgText.value,createdAt:new Date().toLocaleString("ar")});AfaqData.save("messages",arr);to.value=subject.value=msgText.value="";render();}
function render(){const arr=window.AfaqData?AfaqData.list("messages"):[];box.innerHTML=arr.length?arr.map(m=>`<div class="card"><h3>${m.subject||"رسالة"}</h3><p>${m.message||""}</p><small>${m.createdAt||""}</small></div>`).join(""):'<div class="card"><h3>لا توجد رسائل</h3></div>'}render();
</script>
</body>
</html>
