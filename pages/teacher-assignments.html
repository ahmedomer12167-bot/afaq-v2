<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>واجبات المدرس</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-badges.css"><link rel="stylesheet" href="../css/afaq-teacher-sync.css"></head><body><main class="afaq-mobile"><section class="afaq-top"><h1>📋 واجبات المدرس</h1><a class="afaq-btn gray" href="teacher-dashboard.html">رجوع</a></section><section class="sync-card"><input id="title" placeholder="عنوان الواجب"><div id="questions"></div><button class="afaq-btn" onclick="addQ()">إضافة سؤال</button><button class="afaq-btn" onclick="publish()">نشر الواجب</button></section><section class="sync-card"><h2>واجباتي</h2><div id="box"></div></section></main><script src="../js/afaq-data.js"></script><script src="../js/afaq-teacher-sync.js"></script><script src="../js/afaq-unified-counters.js"></script><script src="../js/afaq-badges.js"></script><script>let qs=[];if(!AfaqTeacherSync.currentTeacher())location.href='teacher-login.html';function addQ(){qs.push({type:'choice',text:'',choices:['','',''],answer:'',degree:1});renderQ()}function renderQ(){questions.innerHTML=qs.map((q,i)=>`<div class='question-box'><select onchange="qs[${i}].type=this.value"><option value='choice'>اختيارات</option><option value='truefalse'>صح وخطأ</option><option value='blank'>فراغات</option><option value='essay'>مقالي</option><option value='image'>مسائل بصورة</option></select><input placeholder='نص السؤال' oninput="qs[${i}].text=this.value"><input placeholder='الاختيار 1' oninput="qs[${i}].choices[0]=this.value"><input placeholder='الاختيار 2' oninput="qs[${i}].choices[1]=this.value"><input placeholder='الاختيار 3' oninput="qs[${i}].choices[2]=this.value"><input placeholder='الإجابة الصحيحة' oninput="qs[${i}].answer=this.value"><input type='number' placeholder='الدرجة' oninput="qs[${i}].degree=this.value"></div>`).join('')}function publish(){try{AfaqTeacherSync.addAssignment({title:title.value,total:qs.reduce((s,q)=>s+Number(q.degree||0),0),questions:qs});title.value='';qs=[];renderQ();render();alert('تم نشر الواجب للطلاب')}catch(e){alert(e.message)}}function render(){const t=AfaqTeacherSync.currentTeacher();const list=AfaqTeacherSync.read('afaq_assignments').filter(x=>x.teacherCode===AfaqTeacherSync.teacherCode(t));box.innerHTML=list.length?list.map(x=>`<div class='sync-card'><h3>${x.title}</h3><p>عدد الأسئلة: ${(x.questions||[]).length}</p></div>`).join(''):'<p>لا توجد اختبارات</p>'}addQ();render();</script></body></html>
