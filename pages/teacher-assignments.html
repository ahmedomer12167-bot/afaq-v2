<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>اختبارات المدرس</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-sync-final.css"></head><body><main class="afaq-mobile">
<section class="afaq-top"><h1>📋 إنشاء واجب مبسط</h1><p>أضف أسئلة عديدة وحدد الدرجة النهائية. الموضوعي يصحح تلقائياً، والمقالي/المسائل يدوياً.</p><a class="afaq-btn gray" href="teacher-dashboard.html">رجوع</a></section>
<section class="afaq-sync-card"><input id="examTitle" placeholder="عنوان الواجب"><input id="finalDegree" type="number" placeholder="الدرجة النهائية للواجب"><div id="questionsBox"></div><button class="afaq-btn" onclick="addQuestion()">إضافة سؤال</button><button class="afaq-btn" onclick="publishAssignment()">نشر الواجب للطلاب</button></section>
<section class="afaq-sync-card"><h2>التسليمات التي تحتاج تصحيح يدوي</h2><div id="manualBox"></div></section>
<section class="afaq-sync-card"><h2>واجباتي المنشورة</h2><div id="examsBox"></div></section>
</main><script src="../js/afaq-data.js"></script><script src="../js/afaq-real-sync.js"></script><script src="../js/afaq-unified-counters.js"></script><script>
let questions=[]; if(!AfaqRealSync.currentTeacher())location.href='teacher-login.html';
function addQuestion(){questions.push({type:'choice',text:'',choices:['','',''],answer:'',degree:1});renderQuestions()}
function renderQuestions(){questionsBox.innerHTML=questions.map((q,i)=>`<div class="question-box"><h3>سؤال ${i+1}</h3><select onchange="questions[${i}].type=this.value"><option value="choice">اختيارات</option><option value="truefalse">صح وخطأ</option><option value="blank">فراغات</option><option value="essay">مقالي</option><option value="image">مسائل / صورة</option></select><input placeholder="نص السؤال" oninput="questions[${i}].text=this.value"><input placeholder="اختيار 1" oninput="questions[${i}].choices[0]=this.value"><input placeholder="اختيار 2" oninput="questions[${i}].choices[1]=this.value"><input placeholder="اختيار 3" oninput="questions[${i}].choices[2]=this.value"><input placeholder="الإجابة الصحيحة للموضوعي" oninput="questions[${i}].answer=this.value"><input type="number" placeholder="درجة السؤال" oninput="questions[${i}].degree=this.value"><button class="afaq-btn red" onclick="questions.splice(${i},1);renderQuestions()">حذف السؤال</button></div>`).join('')}
function publishAssignment(){try{AfaqRealSync.addAssignment(examTitle.value,finalDegree.value,questions);examTitle.value='';finalDegree.value='';questions=[];renderQuestions();render();alert('تم نشر الواجب ومزامنته للطلاب')}catch(e){alert(e.message)}}
function grade(id){let v=prompt('أدخل درجة التصحيح اليدوي للمقالي/المسائل'); if(v===null)return; try{AfaqRealSync.gradeManual('assignment',id,v);render();alert('تم حفظ التصحيح وتجميع الدرجة للطالب')}catch(e){alert(e.message)}}
function render(){const t=AfaqRealSync.currentTeacher(); const exams=AfaqRealSync.list('assignments').filter(x=>x.teacherCode===AfaqRealSync.teacherCode(t));examsBox.innerHTML=exams.length?exams.map(x=>`<div class="afaq-sync-card"><h3>${x.title}</h3><p>المادة: ${x.subject}</p><p>الدرجة النهائية: ${x.finalDegree}</p><p>عدد الأسئلة: ${(x.questions||[]).length}</p></div>`).join(''):'<p>لا توجد اختبارات</p>'; const subs=AfaqRealSync.teacherSubmissions('assignment').filter(x=>x.needsManual&&x.status!=='مصحح');manualBox.innerHTML=subs.length?subs.map(s=>`<div class="afaq-sync-card"><h3>${s.studentName}</h3><p>${s.title}</p><p>الدرجة التلقائية: ${s.autoScore}/${s.autoTotal}</p><p>درجة الأسئلة اليدوية: ${s.manualTotal}</p><button class="afaq-btn" onclick="grade('${s.id}')">تصحيح يدوي</button></div>`).join(''):'<p>لا توجد تسليمات تحتاج تصحيح</p>'} addQuestion();render();
</script></body></html>
