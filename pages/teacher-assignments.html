<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>واجبات المدرس المتقدمة</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-purple-mobile.css">
<link rel="stylesheet" href="../css/afaq-badges.css">
<style>
.question-card{
  padding:16px;
  border-radius:22px;
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.16);
  margin-bottom:14px;
}
.hidden{display:none}
.option-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:650px){.option-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<main class="afaq-mobile">

<section class="afaq-top">
  <h1>📋 واجبات المدرس</h1>
  <div style="margin-top:14px">
    <a class="afaq-btn gray" href="teacher-dashboard.html">رجوع للوحة المدرس</a>
  </div>
</section>

<section class="panel">
  <h2>بيانات الواجب</h2>
  <input id="assignmentTitle" placeholder="عنوان الواجب">
  <textarea id="assignmentDescription" placeholder="تعليمات الواجب"></textarea>
  <input id="dueDate" type="date">
  <select id="assignmentStatus">
    <option>منشور</option>
    <option>مخفي</option>
  </select>
</section>

<section class="panel" style="margin-top:15px">
  <h2>إضافة سؤال للواجب</h2>

  <select id="questionType" onchange="toggleQuestionFields()">
    <option value="mcq">اختيارات</option>
    <option value="tf">صح وخطأ</option>
    <option value="blank">فراغات</option>
    <option value="essay">سؤال مقالي / تعاريف / شرح</option>
    <option value="problem">مسائل - يرفق الطالب صورة الحل</option>
  </select>

  <input id="questionText" placeholder="نص السؤال">
  <input id="questionDegree" type="number" placeholder="درجة السؤال">

  <div id="mcqFields">
    <p>اكتب كل اختيار في خانة مستقلة، بدون فواصل.</p>
    <div class="option-grid">
      <input id="option1" placeholder="الاختيار الأول">
      <input id="option2" placeholder="الاختيار الثاني">
      <input id="option3" placeholder="الاختيار الثالث">
    </div>
    <select id="mcqCorrect">
      <option value="1">الإجابة الصحيحة: الاختيار الأول</option>
      <option value="2">الإجابة الصحيحة: الاختيار الثاني</option>
      <option value="3">الإجابة الصحيحة: الاختيار الثالث</option>
    </select>
  </div>

  <div id="tfFields" class="hidden">
    <select id="tfCorrect">
      <option value="صح">الإجابة الصحيحة: صح</option>
      <option value="خطأ">الإجابة الصحيحة: خطأ</option>
    </select>
  </div>

  <div id="blankFields" class="hidden">
    <input id="blankAnswer" placeholder="الإجابة الصحيحة للفراغ">
  </div>

  <div id="manualFields" class="hidden">
    <p>هذا السؤال يصحح يدوياً من المدرس بعد إرسال الطالب.</p>
  </div>

  <button class="afaq-btn" onclick="addQuestion()">إضافة السؤال</button>
</section>

<section class="panel" style="margin-top:15px">
  <h2>أسئلة الواجب</h2>
  <div id="questionsBox"></div>
  <button class="afaq-btn" onclick="saveAssignment()">💾 حفظ الواجب كاملاً</button>
</section>

<section class="panel" style="margin-top:15px">
  <h2>الواجبات المحفوظة</h2>
  <div id="assignmentsBox" class="cards"></div>
</section>

<section class="panel" style="margin-top:15px">
  <h2>تصحيح الواجبات المقالية والمسائل</h2>
  <div id="manualBox" class="cards"></div>
</section>

</main>

<script src="../js/afaq-data.js"></script>
<script src="../js/afaq-teacher-auth.js"></script>
<script src="../js/afaq-auto-stats.js"></script>
<script src="../js/afaq-badges.js"></script>

<script>
let questions = [];
const teacher = window.AfaqTeacherAuth && AfaqTeacherAuth.requireTeacher ? AfaqTeacherAuth.requireTeacher() : null;

function read(key){
  try{return JSON.parse(localStorage.getItem(key)) || []}catch(e){return []}
}
function write(key,value){
  localStorage.setItem(key, JSON.stringify(value));
  window.dispatchEvent(new Event("afaqDataUpdated"));
}
function currentTeacher(){
  if(window.AfaqTeacherAuth && AfaqTeacherAuth.currentTeacher) return AfaqTeacherAuth.currentTeacher();
  try{return JSON.parse(localStorage.getItem("afaq_current_teacher")) || {}}catch(e){return {}}
}

function toggleQuestionFields(){
  const type = questionType.value;
  mcqFields.classList.toggle("hidden", type !== "mcq");
  tfFields.classList.toggle("hidden", type !== "tf");
  blankFields.classList.toggle("hidden", type !== "blank");
  manualFields.classList.toggle("hidden", !(type === "essay" || type === "problem"));
}

function addQuestion(){
  const type = questionType.value;
  const text = questionText.value.trim();
  const degree = Number(questionDegree.value || 0);

  if(!text || !degree){
    alert("يرجى إدخال نص السؤال والدرجة");
    return;
  }

  let q = {
    id: "q-" + Date.now(),
    type,
    text,
    degree,
    manual: type === "essay" || type === "problem"
  };

  if(type === "mcq"){
    if(!option1.value.trim() || !option2.value.trim() || !option3.value.trim()){
      alert("يرجى ملء الاختيارات الثلاثة");
      return;
    }
    q.options = [option1.value.trim(), option2.value.trim(), option3.value.trim()];
    q.correct = q.options[Number(mcqCorrect.value) - 1];
  }

  if(type === "tf") q.correct = tfCorrect.value;
  if(type === "blank") q.correct = blankAnswer.value.trim();

  questions.push(q);

  questionText.value = "";
  questionDegree.value = "";
  option1.value = "";
  option2.value = "";
  option3.value = "";
  blankAnswer.value = "";

  renderQuestions();
}

function typeName(type){
  return {
    mcq:"اختيارات",
    tf:"صح وخطأ",
    blank:"فراغات",
    essay:"مقالي / تعاريف / شرح",
    problem:"مسائل بصورة"
  }[type] || type;
}

function removeQuestion(id){
  questions = questions.filter(q => q.id !== id);
  renderQuestions();
}

function renderQuestions(){
  if(!questions.length){
    questionsBox.innerHTML = "<p>لا توجد أسئلة بعد.</p>";
    return;
  }

  questionsBox.innerHTML = questions.map((q,index)=>`
    <div class="question-card">
      <h3>س${index+1}: ${typeName(q.type)}</h3>
      <p>${q.text}</p>
      <p>الدرجة: <b>${q.degree}</b></p>
      ${q.options ? `<p>الاختيارات: ${q.options.join(" | ")}</p>` : ""}
      ${q.correct ? `<p>الإجابة الصحيحة: <b>${q.correct}</b></p>` : "<p>تصحيح يدوي</p>"}
      <button class="afaq-btn red" onclick="removeQuestion('${q.id}')">حذف السؤال</button>
    </div>
  `).join("");
}

function saveAssignment(){
  const title = assignmentTitle.value.trim();
  if(!title || !questions.length){
    alert("أدخل عنوان الواجب وأضف سؤالاً واحداً على الأقل");
    return;
  }

  const t = currentTeacher();
  const total = questions.reduce((sum,q)=>sum + Number(q.degree || 0),0);

  const assignment = {
    id: "assignment-" + Date.now(),
    title,
    description: assignmentDescription.value.trim(),
    dueDate: dueDate.value || "غير محدد",
    status: assignmentStatus.value,
    questions,
    total,
    teacherCode: t.teacherCode || t.code || "",
    teacherName: t.fullName || t.name || "",
    subject: t.subject || "",
    subjectCode: t.subjectCode || "",
    grade: t.grade || "",
    createdAt: new Date().toLocaleString("ar")
  };

  const assignments = read("afaq_assignments");
  assignments.unshift(assignment);
  write("afaq_assignments", assignments);

  if(window.AfaqData && AfaqData.addNotification){
    AfaqData.addNotification("student","", "واجب جديد", "تم نشر واجب: " + title, "واجب", assignment.subject);
  }

  assignmentTitle.value = "";
  assignmentDescription.value = "";
  dueDate.value = "";
  questions = [];
  renderQuestions();
  renderAssignments();
  alert("تم حفظ الواجب بنجاح");
}

function deleteAssignment(id){
  if(!confirm("حذف الواجب؟")) return;
  write("afaq_assignments", read("afaq_assignments").filter(a => a.id !== id));
  renderAssignments();
}

function renderAssignments(){
  const t = currentTeacher();
  const assignments = read("afaq_assignments").filter(a =>
    !t.teacherCode || a.teacherCode === t.teacherCode || a.subjectCode === t.subjectCode
  );

  assignmentsBox.innerHTML = assignments.length ? assignments.map(a=>`
    <div class="card">
      <h3>${a.title}</h3>
      <p>${a.description || ""}</p>
      <p>عدد الأسئلة: ${a.questions ? a.questions.length : 0}</p>
      <p>الدرجة الكلية: ${a.total}</p>
      <p>تاريخ التسليم: ${a.dueDate || "غير محدد"}</p>
      <span class="badge">${a.status}</span>
      <button class="afaq-btn red" onclick="deleteAssignment('${a.id}')">حذف</button>
    </div>
  `).join("") : "<div class='card'><h3>لا توجد واجبات</h3></div>";
}

function renderManualSubmissions(){
  const t = currentTeacher();
  const submissions = read("afaq_assignment_submissions").filter(s =>
    s.needsManual &&
    (!t.teacherCode || s.teacherCode === t.teacherCode || s.subjectCode === t.subjectCode)
  );

  manualBox.innerHTML = submissions.length ? submissions.map(s=>`
    <div class="card">
      <h3>${s.assignmentTitle}</h3>
      <p>الطالب: ${s.studentName || s.studentId}</p>
      <p>الدرجة التلقائية: ${s.autoScore} / ${s.total}</p>
      <input id="manual-${s.id}" type="number" placeholder="الدرجة اليدوية">
      <button class="afaq-btn" onclick="saveManualGrade('${s.id}')">حفظ الدرجة النهائية</button>
      ${s.problemImage ? `<button class="afaq-btn gray" onclick="window.open('${s.problemImage}','_blank')">فتح صورة الحل</button>` : ""}
    </div>
  `).join("") : "<div class='card'><h3>لا توجد واجبات تحتاج تصحيح يدوي</h3></div>";
}

function saveManualGrade(id){
  const input = document.getElementById("manual-" + id);
  const manual = Number(input.value || 0);
  const submissions = read("afaq_assignment_submissions");
  const sub = submissions.find(s => s.id === id);
  if(!sub) return;

  sub.manualScore = manual;
  sub.finalScore = Number(sub.autoScore || 0) + manual;
  sub.needsManual = false;
  sub.status = "تم التصحيح";

  write("afaq_assignment_submissions", submissions);

  const results = read("afaq_results");
  results.unshift({
    id: "result-" + Date.now(),
    studentId: sub.studentId,
    studentName: sub.studentName,
    title: sub.assignmentTitle,
    score: sub.finalScore,
    total: sub.total,
    subject: sub.subject,
    teacherCode: sub.teacherCode,
    subjectCode: sub.subjectCode,
    type: "واجب",
    createdAt: new Date().toLocaleString("ar")
  });
  write("afaq_results", results);

  alert("تم حفظ درجة الواجب النهائية وإضافتها إلى نتائج الطالب");
  renderManualSubmissions();
}

toggleQuestionFields();
renderQuestions();
renderAssignments();
renderManualSubmissions();
</script>
</body>
</html>
