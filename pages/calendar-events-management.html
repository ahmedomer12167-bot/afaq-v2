<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التقويم والأحداث - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:25px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn,.save-btn,.delete-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.delete-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:16px}input,select,textarea{width:100%;padding:14px;border:none;border-radius:14px;outline:none;font-size:15px}textarea{min-height:120px;resize:vertical;grid-column:1/-1}.events-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px}.event-card{padding:18px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);transition:.3s}.event-card:hover{transform:translateY(-5px);box-shadow:0 0 24px rgba(168,85,247,.3);border-color:#a855f7}.event-top{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}.badge{display:inline-block;padding:5px 10px;border-radius:999px;background:rgba(124,58,237,.75);font-size:12px}.event-card h3{margin-bottom:8px;color:#fff}.event-card p{line-height:1.7;color:#ddd;margin-bottom:8px}.empty{text-align:center;color:#ddd;padding:18px}.table{width:100%;border-collapse:collapse;margin-top:15px}.table th,.table td{padding:13px;text-align:center;border-bottom:1px solid rgba(255,255,255,.12)}.table th{color:#c084fc}@media(max-width:900px){.header{flex-direction:column;align-items:flex-start}.form-grid,.events-grid{grid-template-columns:1fr}textarea{grid-column:auto}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div>
<h1>📅 التقويم والأحداث</h1>
<p>إضافة الاختبارات القادمة، الواجبات، المحاضرات، والأحداث المهمة.</p>
</div>
<div class="actions">
<button class="btn" onclick="location.href='admin-dashboard.html'">🏠 لوحة المدير</button>
<button class="btn" onclick="history.back()">← رجوع</button>
</div>
</header>

<section class="box">
<h2>إضافة حدث جديد</h2>
<div class="form-grid">
<input id="eventTitle" type="text" placeholder="عنوان الحدث">
<select id="eventType">
<option value="إعلان مهم">إعلان مهم</option>
<option value="اختبار">اختبار</option>
<option value="واجب">واجب</option>
<option value="محاضرة">محاضرة</option>
<option value="مراجعة عامة">مراجعة عامة</option>
<option value="عطلة رسمية">عطلة رسمية</option>
<option value="بدء الكورس">بدء الكورس</option>
<option value="امتحان نهائي">امتحان نهائي</option>
</select>
<select id="targetGroup">
<option value="الجميع">الجميع</option>
<option value="الطلاب">الطلاب</option>
<option value="المدرسون">المدرسون</option>
<option value="أولياء الأمور">أولياء الأمور</option>
<option value="الأول متوسط">الأول متوسط</option>
<option value="الثاني متوسط">الثاني متوسط</option>
<option value="الثالث متوسط">الثالث متوسط</option>
<option value="الرابع الإعدادي">الرابع الإعدادي</option>
<option value="الخامس الإعدادي">الخامس الإعدادي</option>
<option value="السادس الإعدادي">السادس الإعدادي</option>
</select>
<input id="eventDate" type="date">
<input id="eventTime" type="time">
<select id="reminderTime">
<option value="لا يوجد">بدون تذكير</option>
<option value="قبل ساعة">قبل ساعة</option>
<option value="قبل يوم">قبل يوم</option>
<option value="قبل 3 أيام">قبل 3 أيام</option>
<option value="قبل أسبوع">قبل أسبوع</option>
</select>
<textarea id="eventDescription" placeholder="وصف الحدث أو تفاصيله"></textarea>
</div>
<button class="save-btn" onclick="addEvent()" style="margin-top:15px">➕ إضافة الحدث</button>
</section>

<section class="box">
<h2>الأحداث القادمة</h2>
<div id="eventsList" class="events-grid"></div>
</section>

<section class="box">
<h2>جدول مختصر</h2>
<table class="table">
<thead><tr><th>العنوان</th><th>النوع</th><th>الفئة</th><th>التاريخ</th><th>الوقت</th><th>حذف</th></tr></thead>
<tbody id="eventsTable"></tbody>
</table>
</section>
</main>

<script>
let events = JSON.parse(localStorage.getItem('afaq_calendar_events')) || [];

function saveEvents(){
localStorage.setItem('afaq_calendar_events', JSON.stringify(events));
}

function addEvent(){
const title=document.getElementById('eventTitle').value.trim();
const type=document.getElementById('eventType').value;
const target=document.getElementById('targetGroup').value;
const date=document.getElementById('eventDate').value;
const time=document.getElementById('eventTime').value;
const reminder=document.getElementById('reminderTime').value;
const description=document.getElementById('eventDescription').value.trim();
if(!title || !date){alert('يرجى إدخال عنوان الحدث والتاريخ');return;}
events.unshift({title,type,target,date,time,reminder,description,createdAt:new Date().toISOString()});
saveEvents();
clearForm();
renderEvents();
alert('تمت إضافة الحدث بنجاح');
}

function clearForm(){
document.getElementById('eventTitle').value='';
document.getElementById('eventDate').value='';
document.getElementById('eventTime').value='';
document.getElementById('eventDescription').value='';
document.getElementById('eventType').value='إعلان مهم';
document.getElementById('targetGroup').value='الجميع';
document.getElementById('reminderTime').value='لا يوجد';
}

function deleteEvent(index){
if(confirm('هل تريد حذف هذا الحدث؟')){events.splice(index,1);saveEvents();renderEvents();}
}

function renderEvents(){
const list=document.getElementById('eventsList');
const table=document.getElementById('eventsTable');
if(events.length===0){
list.innerHTML='<div class="empty">لا توجد أحداث حالياً</div>';
table.innerHTML='<tr><td colspan="6">لا توجد أحداث حالياً</td></tr>';
return;
}
list.innerHTML=events.map((e,i)=>`
<div class="event-card">
<div class="event-top"><span class="badge">${e.type}</span><button class="delete-btn" onclick="deleteEvent(${i})">حذف</button></div>
<h3>${e.title}</h3>
<p>${e.description || 'لا يوجد وصف'}</p>
<p>📌 الفئة: ${e.target}</p>
<p>📅 التاريخ: ${e.date} ${e.time ? ' - '+e.time : ''}</p>
<p>🔔 التذكير: ${e.reminder}</p>
</div>`).join('');
table.innerHTML=events.map((e,i)=>`
<tr>
<td>${e.title}</td><td>${e.type}</td><td>${e.target}</td><td>${e.date}</td><td>${e.time || 'غير محدد'}</td><td><button class="delete-btn" onclick="deleteEvent(${i})">حذف</button></td>
</tr>`).join('');
}

renderEvents();
</script>
</body>
</html>
