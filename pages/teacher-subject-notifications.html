<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إشعارات المادة - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn,.save-btn,.danger-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.save-btn{background:linear-gradient(135deg,#16a34a,#22c55e)}.danger-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}input,select,textarea{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin:8px 0 14px;font-size:15px}textarea{min-height:100px;resize:vertical}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}.notice-card{padding:18px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);margin-top:14px}.notice-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.badge{display:inline-block;padding:5px 10px;border-radius:10px;background:#7c3aed;font-size:13px}.small{color:#d6d6d6;font-size:13px}@media(max-width:900px){.grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div><h1>🔔 إشعارات المادة</h1><p>إرسال إشعارات خاصة بطلاب المادة ومتابعتها.</p></div>
<div class="actions"><button class="btn" onclick="location.href='teacher-subject-page.html'">🏠 صفحة المادة</button><button class="btn" onclick="history.back()">← رجوع</button></div>
</header>
<section class="box">
<h2>إرسال إشعار جديد</h2>
<div class="grid">
<select id="target"><option>جميع طلاب المادة</option><option>طالب محدد</option></select>
<input id="studentName" placeholder="اسم الطالب عند اختيار طالب محدد">
<input id="title" placeholder="عنوان الإشعار">
<select id="priority"><option>عادي</option><option>مهم</option><option>عاجل</option></select>
</div>
<textarea id="message" placeholder="اكتب نص الإشعار هنا"></textarea>
<button class="save-btn" onclick="addNotification()">📢 إرسال الإشعار</button>
</section>
<section class="box">
<h2>الإشعارات المرسلة</h2>
<input id="search" placeholder="🔍 بحث في الإشعارات" oninput="renderNotifications()">
<div id="notificationsList"></div>
</section>
</main>
<script>
let notifications=JSON.parse(localStorage.getItem('afaq_teacher_subject_notifications'))||[];
function saveAll(){localStorage.setItem('afaq_teacher_subject_notifications',JSON.stringify(notifications));}
function addNotification(){const target=document.getElementById('target').value;const student=document.getElementById('studentName').value.trim();const title=document.getElementById('title').value.trim();const priority=document.getElementById('priority').value;const message=document.getElementById('message').value.trim();if(!title||!message){alert('يرجى إدخال عنوان ونص الإشعار');return;}if(target==='طالب محدد'&&!student){alert('يرجى كتابة اسم الطالب');return;}notifications.unshift({target,student,title,priority,message,date:new Date().toLocaleString('ar')});saveAll();document.getElementById('studentName').value='';document.getElementById('title').value='';document.getElementById('message').value='';renderNotifications();alert('تم إرسال الإشعار بنجاح');}
function renderNotifications(){const list=document.getElementById('notificationsList');const s=document.getElementById('search').value.trim();const filtered=notifications.filter(n=>n.title.includes(s)||n.message.includes(s)||n.target.includes(s)||(n.student||'').includes(s));if(filtered.length===0){list.innerHTML='<p>لا توجد إشعارات حالياً</p>';return;}list.innerHTML=filtered.map((n,i)=>`<div class="notice-card"><div class="notice-head"><div><h3>${n.title}</h3><span class="badge">${n.priority}</span> <span class="badge">${n.target}</span></div><button class="danger-btn" onclick="deleteNotification(${i})">حذف</button></div>${n.student?`<p>الطالب: ${n.student}</p>`:''}<p>${n.message}</p><p class="small">${n.date}</p></div>`).join('');}
function deleteNotification(i){if(confirm('هل تريد حذف هذا الإشعار؟')){notifications.splice(i,1);saveAll();renderNotifications();}}
renderNotifications();
</script>
</body>
</html>
