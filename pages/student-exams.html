<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>📝 اختبارات المادة</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-student-complete.css"></head><body><main class="afaq-mobile"><section class="afaq-top"><h1>📝 اختبارات المادة</h1><div style="margin-top:14px"><a class="afaq-btn gray" href="student-subject-room.html">رجوع للمادة</a></div></section><section class="cardx"><div id="box"></div></section></main><script src="../js/afaq-data.js"></script><script src="../js/afaq-complete-sync.js"></script><script>const st=AfaqSync.currentStudent(); if(!st)location.href='student-login.html'; const sub=localStorage.getItem('afaq_current_subject')||''; function render(){const list=AfaqSync.records('exams',sub); box.innerHTML=list.length?list.map(x=>`<div class='cardx'><h3>${x.title||'اختبار'}</h3><p>المادة: ${x.subject||sub}</p><span class='pill'>${x.status||'منشور'}</span></div>`).join(''):`<div class="cardx"><h3>لا توجد اختبارات حالياً</h3></div>`} render();</script></body></html>
