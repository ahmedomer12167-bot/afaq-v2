<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبارات الطالب - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn,.start-btn,.submit-btn,.danger-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.start-btn{background:linear-gradient(135deg,#16a34a,#22c55e)}.submit-btn{background:linear-gradient(135deg,#2563eb,#4f46e5);width:100%;margin-top:15px}.danger-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}input,select,textarea{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin:8px 0 14px;font-size:15px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}.stat{padding:18px;border-radius:18px;background:rgba(255,255,255,.07);text-align:center}.stat strong{display:block;font-size:26px;margin-top:8px}.exam-card,.question-card{padding:18px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);margin-top:14px}.exam-head,.question-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.badge{display:inline-block;padding:5px 10px;border-radius:10px;background:#7c3aed;font-size:13px}.choice{display:block;padding:12px;border-radius:12px;background:rgba(255,255,255,.08);margin:8px 0;cursor:pointer}.choice input{width:auto;margin-left:8px}.hidden{display:none}.result-box{padding:18px;border-radius:18px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.35);margin-top:15px}.warn{padding:14px;border-radius:14px;background:rgba(250,204,21,.12);border:1px solid rgba(250,204,21,.25);margin-top:12px}@media(max-width:900px){.stats{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div><h1>📝 اختبارات الطالب</h1><p>عرض الاختبارات المنشورة وحلها ومعرفة النتيجة بعد التسليم.</p></div>
<div class="actions"><button class="btn" onclick="location.href='student-subject-page.html'">🏠 صفحة المادة</button><button class="btn" onclick="history.back()">← رجوع</button></div>
</header>
<section class="box">
<div class="stats">
<div class="stat">الاختبارات المتاحة<strong id="availableCount">0</strong></div>
<div class="stat">الاختبارات المنجزة<strong id="doneCount">0</strong></div>
<div class="stat">أعلى درجة<strong id="bestScore">0</strong></div>
<div class="stat">المتوسط<strong id="avgScore">0</strong></div>
</div>
</section>
<section class="box" id="examsSection">
<h2>الاختبارات المتاحة</h2>
<input id="searchExam" placeholder="🔍 ابحث عن اختبار..." oninput="renderExams()">
<div id="examsList"></div>
</section>
<section class="box hidden" id="examPlayer">
<h2 id="playerTitle">حل الاختبار</h2>
<p id="playerMeta"></p>
<div id="questionsBox"></div>
<button class="submit-btn" onclick="submitExam()">تسليم الاختبار</button>
<button class="danger-btn" style="margin-top:10px" onclick="closeExam()">إغلاق الاختبار</button>
<div id="resultBox"></div>
</section>
</main>
<script>
const demoExams=[
{title:'اختبار الجهاز العصبي',subject:'الأحياء',duration:20,status:'منشور',total:20,questions:[
{type:'mcq',text:'ما الوحدة الأساسية في الجهاز العصبي؟',degree:5,answer:'العصبون',options:['العصبون','الخلية العضلية','كرية الدم','الصفائح']},
{type:'truefalse',text:'المخ جزء من الجهاز العصبي المركزي.',degree:5,answer:'صح',options:['صح','خطأ']},
{type:'blank',text:'ينتقل السيال العصبي عبر ______.',degree:5,answer:'الأعصاب'},
{type:'essay',text:'اشرح باختصار وظيفة المخيخ.',degree:5,answer:'تنسيق الحركة والتوازن'}]},
{title:'اختبار الخلية',subject:'الأحياء',duration:15,status:'منشور',total:15,questions:[
{type:'mcq',text:'أين توجد المادة الوراثية غالباً؟',degree:5,answer:'النواة',options:['النواة','الجدار الخلوي','الغشاء','السيتوبلازم']},
{type:'truefalse',text:'الميتوكوندريا مسؤولة عن إنتاج الطاقة.',degree:5,answer:'صح',options:['صح','خطأ']},
{type:'blank',text:'الغشاء البلازمي يحيط بـ ______.',degree:5,answer:'الخلية'}]}
];
let exams=JSON.parse(localStorage.getItem('afaq_teacher_exams'))||demoExams;
let submissions=JSON.parse(localStorage.getItem('afaq_student_exam_submissions'))||[];
let activeExam=null;
function saveSubs(){localStorage.setItem('afaq_student_exam_submissions',JSON.stringify(submissions));}
function isDone(title){return submissions.some(s=>s.title===title);}
function renderStats(){const done=submissions.length;availableCount.textContent=exams.filter(e=>e.status==='منشور').length;doneCount.textContent=done;let scores=submissions.map(s=>s.percent);bestScore.textContent=scores.length?Math.max(...scores)+'%':'0';avgScore.textContent=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)+'%':'0';}
function renderExams(){const list=document.getElementById('examsList');const s=document.getElementById('searchExam').value.trim();const visible=exams.filter(e=>(e.status||'منشور')==='منشور'&&(e.title.includes(s)||e.subject.includes(s)));if(!visible.length){list.innerHTML='<p>لا توجد اختبارات منشورة حالياً</p>';return;}list.innerHTML=visible.map((e,i)=>{const done=isDone(e.title);return `<div class="exam-card"><div class="exam-head"><div><h3>${e.title}</h3><span class="badge">${e.subject}</span></div><span class="badge">${done?'تم الحل':'متاح'}</span></div><p>المدة: ${e.duration} دقيقة</p><p>عدد الأسئلة: ${e.questions.length}</p><p>الدرجة الكلية: ${e.total}</p>${done?'<p class="warn">تم حل هذا الاختبار سابقاً، يمكنك فتحه للمراجعة.</p>':''}<button class="start-btn" onclick="startExam(${exams.indexOf(e)})">${done?'مراجعة الاختبار':'بدء الاختبار'}</button></div>`}).join('');}
function startExam(index){activeExam=exams[index];playerTitle.textContent=activeExam.title;playerMeta.textContent=`المادة: ${activeExam.subject} | المدة: ${activeExam.duration} دقيقة | الدرجة: ${activeExam.total}`;resultBox.innerHTML='';questionsBox.innerHTML=activeExam.questions.map((q,i)=>{let field='';if(q.type==='mcq'||q.type==='truefalse'){field=(q.options||['صح','خطأ']).map(o=>`<label class="choice"><input type="radio" name="q${i}" value="${o}">${o}</label>`).join('');}else{field=`<input id="ans${i}" placeholder="اكتب إجابتك هنا">`;}return `<div class="question-card"><div class="question-head"><strong>س${i+1}</strong><span class="badge">${q.degree} درجة</span></div><p>${q.text}</p>${field}</div>`}).join('');examPlayer.classList.remove('hidden');examPlayer.scrollIntoView({behavior:'smooth'});}
function getAnswer(i,q){if(q.type==='mcq'||q.type==='truefalse'){const checked=document.querySelector(`input[name="q${i}"]:checked`);return checked?checked.value:'';}return (document.getElementById('ans'+i)?.value||'').trim();}
function submitExam(){if(!activeExam)return;let autoScore=0;let essayCount=0;let answers=[];activeExam.questions.forEach((q,i)=>{const ans=getAnswer(i,q);let correct=false;if(q.type==='essay'){essayCount++;}else{correct=ans.trim()===String(q.answer).trim();if(correct)autoScore+=Number(q.degree);}answers.push({question:q.text,answer:ans,correct});});const percent=Math.round((autoScore/activeExam.total)*100);submissions.unshift({title:activeExam.title,subject:activeExam.subject,score:autoScore,total:activeExam.total,percent,answers,date:new Date().toLocaleString('ar')});saveSubs();resultBox.innerHTML=`<div class="result-box"><h3>تم تسليم الاختبار</h3><p>درجتك التلقائية: ${autoScore} من ${activeExam.total}</p><p>النسبة: ${percent}%</p>${essayCount?'<p>توجد أسئلة مقالية تحتاج تصحيح المدرس يدوياً.</p>':''}</div>`;renderStats();renderExams();}
function closeExam(){examPlayer.classList.add('hidden');activeExam=null;}
renderStats();renderExams();
</script>
</body>
</html>
