<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>اختبارات المادة</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-sync-final.css"></head><body><main class="afaq-mobile"><section class="afaq-top"><h1>📝 اختبارات المادة</h1><a class="afaq-btn gray" href="student-subject-room.html">رجوع</a></section><section id="box"></section></main><script src="../js/afaq-data.js"></script><script src="../js/afaq-real-sync.js"></script><script>
const sub=localStorage.getItem('afaq_current_subject')||''; if(!AfaqRealSync.currentStudent())location.href='student-login.html';
function solve(id){const item=AfaqRealSync.list('exams').find(x=>x.id===id); let ans={}; (item.questions||[]).forEach((q,i)=>{ if(q.type==='choice') ans[i]=prompt((q.text||'سؤال')+'\\n1) '+(q.choices&&q.choices[0]||'')+'\\n2) '+(q.choices&&q.choices[1]||'')+'\\n3) '+(q.choices&&q.choices[2]||''))||''; else ans[i]=prompt(q.text||'اكتب الإجابة')||'' }); try{AfaqRealSync.submitWork('exam',id,ans);render();alert('تم تسليم الاختبار. الموضوعي صحح تلقائياً، والمقالي ينتظر المدرس.')}catch(e){alert(e.message)}}
function render(){const list=AfaqRealSync.studentItems('exams',sub); box.innerHTML=list.length?list.map(x=>{const done=AfaqRealSync.list('examSubmissions').find(s=>s.itemId===x.id&&s.studentId===AfaqRealSync.studentId(AfaqRealSync.currentStudent()));return `<div class="afaq-sync-card"><h3>${x.title}</h3><p>المادة: ${x.subject}</p><p>الدرجة النهائية: ${x.finalDegree}</p><p>عدد الأسئلة: ${(x.questions||[]).length}</p>${done?`<span class="pill">${done.status} - درجتك ${done.totalScore}/${done.finalDegree}</span>`:`<button class="afaq-btn" onclick="solve('${x.id}')">حل الاختبار</button>`}</div>`}).join(''):'<div class="afaq-sync-card"><h3>لا توجد اختبارات لهذه المادة</h3></div>'}render();
</script></body></html>
