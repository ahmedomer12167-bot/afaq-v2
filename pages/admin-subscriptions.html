<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلبات الاشتراك - المدير</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-purple-mobile.css">
<link rel="stylesheet" href="../css/afaq-badges.css">
<link rel="stylesheet" href="../css/afaq-subscription.css">
</head>
<body>
<main class="afaq-mobile">

<section class="afaq-top">
<h1>💳 طلبات الاشتراك</h1>
<div style="margin-top:14px">
<a class="afaq-btn gray" href="admin-dashboard.html">رجوع للمدير</a>
</div>
</section>

<section class="panel">
<h2>إعدادات رقم الماستر</h2>
<input id="masterNumber" placeholder="رقم الماستر الذي يظهر للطالب">
<button class="afaq-btn" onclick="saveMaster()">حفظ رقم الماستر</button>
</section>

<section class="panel" style="margin-top:15px">
<h2>طلبات الطلاب</h2>
<select id="statusFilter" onchange="renderRequests()">
  <option value="">كل الطلبات</option>
  <option>قيد المراجعة</option>
  <option>مقبول</option>
  <option>مرفوض</option>
</select>
<input id="searchBox" placeholder="بحث باسم الطالب أو ولي الأمر أو الصف" oninput="renderRequests()">
<div id="requestsBox"></div>
</section>

</main>

<script src="../js/afaq-data.js"></script>
<script src="../js/afaq-unified-counters.js"></script>
<script src="../js/afaq-badges.js"></script>
<script src="../js/afaq-subscription.js"></script>
<script>
function init(){
  masterNumber.value = AfaqSubscription.getMasterNumber();
  renderRequests();
}

function saveMaster(){
  AfaqSubscription.setMasterNumber(masterNumber.value);
  alert("تم حفظ رقم الماستر وسيظهر للطالب في استمارة الاشتراك");
}

function renderRequests(){
  const q = String(searchBox.value || "").trim();
  const status = statusFilter.value;
  let list = AfaqSubscription.requests();

  if(status) list = list.filter(r => r.status === status);
  if(q){
    list = list.filter(r =>
      String(r.studentName || "").includes(q) ||
      String(r.parentName || "").includes(q) ||
      String(r.grade || "").includes(q)
    );
  }

  requestsBox.innerHTML = list.length ? list.map(r=>`
    <div class="req-card">
      <h3>${r.studentName}</h3>
      <p>اسم ولي الأمر الثلاثي: ${r.parentName}</p>
      <p>الصف: ${r.grade}</p>
      <p>المبلغ المرسل: ${r.amount}</p>
      <p>رقم الماستر الظاهر للطالب: ${r.masterNumber}</p>
      <p>تاريخ الطلب: ${r.createdAt}</p>
      <span class="status-pill">${r.status}</span>

      ${r.status === "قيد المراجعة" ? `
        <div class="sub-box" style="margin-top:12px">
          <input id="code-${r.id}" placeholder="أدخل كود خاص للطالب">
          <input id="note-${r.id}" placeholder="ملاحظة الرفض اختيارية">
          <button class="afaq-btn" onclick="approve('${r.id}')">موافقة وتفعيل الطالب</button>
          <button class="afaq-btn red" onclick="rejectReq('${r.id}')">رفض الطلب</button>
        </div>
      ` : ""}

      ${r.studentCode ? `<p>كود الطالب: <b>${r.studentCode}</b></p>` : ""}
      ${r.adminNote ? `<p>ملاحظة المدير: ${r.adminNote}</p>` : ""}
    </div>
  `).join("") : "<div class='req-card'><h3>لا توجد طلبات</h3></div>";
}

function approve(id){
  try{
    const code = document.getElementById("code-" + id).value;
    AfaqSubscription.approveRequest(id, code);
    renderRequests();
    alert("تمت الموافقة وتفعيل الطالب. يستطيع الآن الدخول بالكود.");
  }catch(e){
    alert(e.message);
  }
}

function rejectReq(id){
  try{
    const note = document.getElementById("note-" + id).value;
    AfaqSubscription.rejectRequest(id, note);
    renderRequests();
    alert("تم رفض الطلب");
  }catch(e){
    alert(e.message);
  }
}

init();
</script>
</body>
</html>
