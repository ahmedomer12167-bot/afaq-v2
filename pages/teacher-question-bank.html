<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بنك الأسئلة - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn,.save-btn,.danger-btn,.mini-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.save-btn{background:linear-gradient(135deg,#16a34a,#22c55e)}.danger-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}input,select,textarea{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin:8px 0 14px;font-size:15px}textarea{min-height:95px;resize:vertical}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.question-card{padding:18px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);margin-top:14px}.question-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.badge{display:inline-block;padding:5px 10px;border-radius:10px;background:#7c3aed;font-size:13px}.options-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}@media(max-width:900px){.grid,.options-grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div><h1>🧠 بنك الأسئلة</h1><p>إضافة وحفظ الأسئلة لاستخدامها لاحقاً في الاختبارات والواجبات.</p></div>
<div class="actions"><button class="btn" onclick="location.href='teacher-dashboard.html'">🏠 لوحة المدرس</button><button class="btn" onclick="history.back()">← رجوع</button></div>
</header>
<section class="box">
<h2>إضافة سؤال جديد</h2>
<div class="grid">
<input id="questionSubject" placeholder="المادة" value="الأحياء">
<input id="questionChapter" placeholder="الفصل / الموضوع">
<select id="questionType" onchange="toggleOptions()"><option value="mcq">اختيار من متعدد</option><option value="truefalse">صح أو خطأ</option><option value="blank">املأ الفراغ</option><option value="essay">مقالي</option></select>
<input id="questionDegree" type="number" placeholder="درجة السؤال">
<input id="questionAnswer" placeholder="الإجابة الصحيحة / نموذج الإجابة">
<select id="questionLevel"><option>سهل</option><option>متوسط</option><option>صعب</option></select>
</div>
<textarea id="questionText" placeholder="نص السؤال"></textarea>
<div id="mcqOptions" class="options-grid">
<input id="opt1" placeholder="الخيار الأول">
<input id="opt2" placeholder="الخيار الثاني">
<input id="opt3" placeholder="الخيار الثالث">
<input id="opt4" placeholder="الخيار الرابع">
</div>
<button class="save-btn" onclick="addQuestion()">➕ حفظ السؤال في البنك</button>
</section>
<section class="box">
<h2>البحث في بنك الأسئلة</h2>
<div class="grid">
<input id="searchInput" placeholder="🔍 ابحث بنص السؤال أو الفصل أو المادة" oninput="renderQuestions()">
<select id="filterType" onchange="renderQuestions()"><option value="">كل الأنواع</option><option value="mcq">اختيار من متعدد</option><option value="truefalse">صح أو خطأ</option><option value="blank">املأ الفراغ</option><option value="essay">مقالي</option></select>
<select id="filterLevel" onchange="renderQuestions()"><option value="">كل المستويات</option><option>سهل</option><option>متوسط</option><option>صعب</option></select>
</div>
</section>
<section class="box">
<div class="question-head"><h2>قائمة الأسئلة</h2><button class="danger-btn" onclick="clearQuestions()">تفريغ البنك</button></div>
<div id="questionsList"></div>
</section>
</main>
<script>
let bank=JSON.parse(localStorage.getItem('afaq_teacher_question_bank'))||[];
function save(){localStorage.setItem('afaq_teacher_question_bank',JSON.stringify(bank));}
function typeName(t){return t==='mcq'?'اختيار من متعدد':t==='truefalse'?'صح أو خطأ':t==='blank'?'املأ الفراغ':'مقالي';}
function toggleOptions(){document.getElementById('mcqOptions').style.display=document.getElementById('questionType').value==='mcq'?'grid':'none';}
function addQuestion(){const subject=questionSubject.value.trim();const chapter=questionChapter.value.trim();const type=questionType.value;const degree=questionDegree.value.trim();const answer=questionAnswer.value.trim();const level=questionLevel.value;const text=questionText.value.trim();if(!subject||!chapter||!degree||!text){alert('يرجى ملء المادة والفصل ونص السؤال والدرجة');return;}let options=[];if(type==='mcq'){options=[opt1.value.trim(),opt2.value.trim(),opt3.value.trim(),opt4.value.trim()].filter(Boolean);if(options.length<2){alert('أدخل خيارين على الأقل');return;}}bank.unshift({subject,chapter,type,degree:Number(degree),answer,level,text,options,createdAt:new Date().toLocaleString('ar')});save();['questionChapter','questionDegree','questionAnswer','questionText','opt1','opt2','opt3','opt4'].forEach(id=>document.getElementById(id).value='');renderQuestions();alert('تم حفظ السؤال');}
function renderQuestions(){const q=searchInput.value.trim();const type=filterType.value;const level=filterLevel.value;const filtered=bank.filter(x=>(!q||x.text.includes(q)||x.chapter.includes(q)||x.subject.includes(q))&&(!type||x.type===type)&&(!level||x.level===level));const list=questionsList;if(filtered.length===0){list.innerHTML='<p>لا توجد أسئلة حالياً</p>';return;}list.innerHTML=filtered.map((x,i)=>`<div class="question-card"><div class="question-head"><div><strong>${typeName(x.type)}</strong> <span class="badge">${x.level}</span></div><button class="danger-btn" onclick="deleteQuestion(${bank.indexOf(x)})">حذف</button></div><p>${x.text}</p><p>المادة: ${x.subject} | الفصل: ${x.chapter} | الدرجة: ${x.degree}</p>${x.options&&x.options.length?`<p>الخيارات: ${x.options.join(' - ')}</p>`:''}<p>الإجابة: ${x.answer||'غير محددة'}</p><small>${x.createdAt}</small></div>`).join('');}
function deleteQuestion(i){if(confirm('حذف هذا السؤال؟')){bank.splice(i,1);save();renderQuestions();}}
function clearQuestions(){if(confirm('هل تريد تفريغ بنك الأسئلة بالكامل؟')){bank=[];save();renderQuestions();}}
toggleOptions();renderQuestions();
</script>
</body>
</html>
