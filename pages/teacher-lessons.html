<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدروس والملفات - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn,.save-btn,.delete-btn,.edit-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.delete-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}.edit-btn{background:linear-gradient(135deg,#2563eb,#4f46e5)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-top:15px}input,select,textarea{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin-bottom:12px}textarea{height:120px;resize:none}.lesson-card{padding:18px;border-radius:18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);margin-top:12px}.lesson-head{display:flex;justify-content:space-between;align-items:center;gap:10px}.badge{padding:5px 10px;border-radius:10px;background:#7c3aed;font-size:12px}.file-note{font-size:13px;color:#ddd;line-height:1.8;margin-top:6px}@media(max-width:900px){.grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div><h1>📖 الدروس والملفات</h1><p>إدارة دروس المادة والملفات التعليمية.</p></div>
<div class="actions"><button class="btn" onclick="location.href='teacher-subject-page.html'">🏠 صفحة المادة</button><button class="btn" onclick="history.back()">← رجوع</button></div>
</header>
<section class="box">
<h2>➕ إضافة درس جديد</h2>
<div class="grid">
<input id="lessonTitle" type="text" placeholder="عنوان الدرس">
<select id="lessonType"><option value="">نوع المحتوى</option><option>PDF</option><option>فيديو</option><option>صورة</option><option>ملف</option><option>شرح نصي</option></select>
<select id="lessonStatus"><option>منشور</option><option>مخفي</option></select>
<input id="videoLink" type="text" placeholder="رابط فيديو اختياري">
</div>
<textarea id="lessonDesc" placeholder="وصف مختصر للدرس"></textarea>
<input id="lessonFile" type="file">
<p class="file-note">ملاحظة: اختيار الملف من الجهاز جاهز في الواجهة، وسيتم ربط التخزين الحقيقي لاحقاً عند اعتماد قاعدة البيانات.</p>
<button class="save-btn" onclick="addLesson()">حفظ الدرس</button>
</section>
<section class="box">
<h2>🔍 البحث في الدروس</h2>
<input id="searchLesson" type="text" placeholder="ابحث بعنوان الدرس أو نوع المحتوى..." oninput="renderLessons()">
</section>
<section class="box">
<h2>📚 قائمة الدروس</h2>
<div id="lessonsList"></div>
</section>
</main>
<script>
let lessons=JSON.parse(localStorage.getItem('afaq_teacher_lessons'))||[];
function saveLessons(){localStorage.setItem('afaq_teacher_lessons',JSON.stringify(lessons));}
function addLesson(){
const title=document.getElementById('lessonTitle').value.trim();
const type=document.getElementById('lessonType').value;
const status=document.getElementById('lessonStatus').value;
const video=document.getElementById('videoLink').value.trim();
const desc=document.getElementById('lessonDesc').value.trim();
const file=document.getElementById('lessonFile').files[0];
if(!title||!type){alert('يرجى إدخال عنوان الدرس ونوع المحتوى');return;}
lessons.unshift({title,type,status,video,desc,fileName:file?file.name:'لا يوجد ملف',date:new Date().toLocaleString('ar-IQ')});
saveLessons();renderLessons();
document.getElementById('lessonTitle').value='';document.getElementById('lessonType').value='';document.getElementById('lessonStatus').value='منشور';document.getElementById('videoLink').value='';document.getElementById('lessonDesc').value='';document.getElementById('lessonFile').value='';
}
function deleteLesson(i){if(confirm('هل تريد حذف هذا الدرس؟')){lessons.splice(i,1);saveLessons();renderLessons();}}
function editLesson(i){const n=prompt('اكتب العنوان الجديد',lessons[i].title);if(n){lessons[i].title=n;saveLessons();renderLessons();}}
function renderLessons(){
const list=document.getElementById('lessonsList');const q=document.getElementById('searchLesson').value.trim();
const data=lessons.filter(l=>l.title.includes(q)||l.type.includes(q));
if(data.length===0){list.innerHTML='<p>لا توجد دروس حالياً</p>';return;}
list.innerHTML=data.map((l,i)=>`<div class="lesson-card"><div class="lesson-head"><div><h3>${l.title}</h3><span class="badge">${l.type}</span> <span class="badge">${l.status}</span></div><div><button class="edit-btn" onclick="editLesson(${i})">تعديل</button> <button class="delete-btn" onclick="deleteLesson(${i})">حذف</button></div></div><p>${l.desc||'لا يوجد وصف'}</p><p>📎 الملف: ${l.fileName}</p><p>🎥 الفيديو: ${l.video||'لا يوجد'}</p><small>${l.date}</small></div>`).join('');
}
renderLessons();
</script>
</body>
</html>
