<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>دروس المدرس</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-badges.css"><link rel="stylesheet" href="../css/afaq-teacher-sync.css"></head><body><main class="afaq-mobile"><section class="afaq-top"><h1>📖 دروس وملفات المدرس</h1><a class="afaq-btn gray" href="teacher-dashboard.html">رجوع</a></section><section class="sync-card"><input id="title" placeholder="عنوان الدرس"><input id="link" placeholder="رابط Google Drive أو الملف"><button class="afaq-btn" onclick="add()">نشر الدرس</button></section><section class="sync-card"><h2>دروسي</h2><div id="box"></div></section></main><script src="../js/afaq-data.js"></script><script src="../js/afaq-teacher-sync.js"></script><script src="../js/afaq-unified-counters.js"></script><script src="../js/afaq-badges.js"></script><script>if(!AfaqTeacherSync.currentTeacher())location.href='teacher-login.html';function add(){try{AfaqTeacherSync.addLesson({title:title.value,link:link.value});title.value='';link.value='';render();alert('تم نشر الدرس ومزامنته للطلاب')}catch(e){alert(e.message)}}function render(){const t=AfaqTeacherSync.currentTeacher();const list=AfaqTeacherSync.read('afaq_lessons').filter(x=>x.teacherCode===AfaqTeacherSync.teacherCode(t));box.innerHTML=list.length?list.map(x=>`<div class='sync-card'><h3>${x.title}</h3><p>المادة: ${x.subject}</p><p>${x.link||''}</p></div>`).join(''):'<p>لا توجد دروس</p>'}render();</script></body></html>
