<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>لوحة المتفوقين</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-room.css"></head><body><main class="room"><section class="topbar"><div class="title"><h1>🏆 لوحة المتفوقين</h1><p>تُحسب من النتائج الموحدة.</p></div><a class="btn back" href="student-dashboard.html">رجوع</a></section><section class="panel"><div id="box" class="cards"></div></section></main><script src="../js/afaq-data.js"></script><script>
function render(){const res=AfaqData.list("results");const map={};res.forEach(r=>{const id=r.studentId||r.code||r.studentName;if(!id)return;map[id]=map[id]||{name:r.studentName||id,total:0,count:0};map[id].total+=Number(r.score||0);map[id].count++;});const arr=Object.values(map).map(x=>({...x,avg:Math.round(x.total/x.count)})).sort((a,b)=>b.avg-a.avg);box.innerHTML=arr.length?arr.map((x,i)=>`<div class="card"><h3>${i+1}. ${x.name}</h3><p>المعدل: ${x.avg}</p><span class="badge">${i==0?'أسطورة':i==1?'خبير':'متفوق'}</span></div>`).join(""):"<div class='card'><h3>لا توجد نتائج لحساب المتفوقين</h3></div>"}render();
</script></body></html>
