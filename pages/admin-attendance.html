<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحضور والغياب - المدير</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-purple-mobile.css">
<link rel="stylesheet" href="../css/afaq-badges.css">
</head>
<body>
<main class="afaq-mobile">

<section class="afaq-top">
<h1>✅ مركز الحضور والغياب</h1>
<div style="margin-top:14px">
<a class="afaq-btn gray" href="admin-dashboard.html">رجوع للمدير</a>
</div>
</section>

<section class="afaq-stats">
<div class="afaq-stat"><div class="icon">✅</div><h3>حضور</h3><strong id="presentCount">0</strong></div>
<div class="afaq-stat"><div class="icon">❌</div><h3>غياب</h3><strong id="absentCount">0</strong></div>
<div class="afaq-stat"><div class="icon">📚</div><h3>طلبات مفتوحة</h3><strong id="sessionsCount">0</strong></div>
<div class="afaq-stat"><div class="icon">📊</div><h3>السجلات</h3><strong id="recordsCount">0</strong></div>
</section>

<section class="panel">
<h2>كل سجلات الحضور</h2>
<div id="recordsBox" class="cards"></div>
</section>

</main>

<script src="../js/afaq-data.js"></script>
<script src="../js/afaq-auto-stats.js"></script>
<script src="../js/afaq-badges.js"></script>

<script>
function read(key){try{return JSON.parse(localStorage.getItem(key))||[]}catch(e){return[]}}
function render(){
 const records = read("afaq_attendance");
 const sessions = read("afaq_attendance_sessions");
 const present = records.filter(r=>String(r.status).includes("حاضر")).length;
 const absent = records.filter(r=>String(r.status).includes("غائب")).length;

 presentCount.textContent = present;
 absentCount.textContent = absent;
 sessionsCount.textContent = sessions.filter(s=>s.status!=="مغلق").length;
 recordsCount.textContent = records.length;

 recordsBox.innerHTML = records.length ? records.map(r=>`
 <div class="card">
 <h3>${r.studentName || r.studentId}</h3>
 <p>الدرس: ${r.lessonTitle || "-"}</p>
 <p>المادة: ${r.subject || "-"}</p>
 <p>المدرس: ${r.teacherName || r.teacherCode || "-"}</p>
 <span class="badge">${r.status}</span>
 <p><small>${r.createdAt || ""}</small></p>
 </div>`).join("") : "<div class='card'><h3>لا توجد سجلات حضور</h3></div>";
}
render();
</script>
</body>
</html>
