<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>🔔 الإشعارات</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-student-complete.css"></head><body><main class="afaq-mobile"><section class="afaq-top"><h1>🔔 الإشعارات</h1><div style="margin-top:14px"><a class="afaq-btn gray" href="student-dashboard.html">رجوع</a><button class="afaq-btn red" onclick="clearAll()">حذف الإشعارات وتصفير العداد</button></div></section><section class="cardx"><div id="box"></div></section></main><script src="../js/afaq-data.js"></script><script src="../js/afaq-complete-sync.js"></script><script>const st=AfaqSync.currentStudent(); if(!st)location.href='student-login.html'; const sub=localStorage.getItem('afaq_current_subject')||''; function clearAll(){AfaqSync.clearNotifications(sub||null); render(); alert('تم حذف الإشعارات وتصفير العداد')} function render(){const list=AfaqSync.myNotifications(sub||null); box.innerHTML=list.length?list.map(n=>`<div class="cardx"><h3>${n.title||'إشعار'}</h3><p>${n.body||n.message||''}</p><p>المادة: ${n.subject||'-'}</p><span class="pill">${n.read?'مقروء':'جديد'}</span></div>`).join(''):'<div class="cardx"><h3>لا توجد إشعارات</h3></div>'} render();</script></body></html>
