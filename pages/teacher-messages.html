<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسائل المدرس - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}
.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}
.header{display:flex;justify-content:space-between;align-items:center;gap:15px}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn,.save-btn,.danger-btn,.mini-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}
.save-btn{background:linear-gradient(135deg,#16a34a,#22c55e)}
.danger-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}
.archive-btn{background:linear-gradient(135deg,#f59e0b,#f97316)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
input,select,textarea{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin:8px 0 14px;font-size:15px}
textarea{min-height:120px;resize:vertical}
.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}
.tab{border:none;border-radius:14px;padding:11px 15px;color:white;cursor:pointer;background:rgba(255,255,255,.12)}
.tab.active{background:linear-gradient(135deg,#7c3aed,#a855f7)}
.message-card{padding:18px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);margin-top:12px}
.message-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
.badge{display:inline-block;padding:5px 10px;border-radius:10px;background:#7c3aed;font-size:13px;margin-inline-start:6px}
.meta{color:#d6d6d6;font-size:14px;line-height:1.8}
.empty{padding:18px;border-radius:16px;background:rgba(255,255,255,.06);text-align:center;color:#ddd}
@media(max-width:900px){.grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}.message-head{flex-direction:column}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div>
<h1>💬 الرسائل العامة</h1>
<p>إرسال واستقبال رسائل المدرس مع المدير والطلاب وأولياء الأمور.</p>
</div>
<div class="actions">
<button class="btn" onclick="location.href='teacher-dashboard.html'">🏠 لوحة المدرس</button>
<button class="btn" onclick="history.back()">← رجوع</button>
</div>
</header>

<section class="box">
<h2>إرسال رسالة جديدة</h2>
<div class="grid">
<select id="receiverType">
<option>المدير</option>
<option>طالب</option>
<option>ولي أمر</option>
<option>جميع طلاب المادة</option>
</select>
<input id="receiverName" placeholder="اسم المستلم">
<input id="messageSubject" placeholder="عنوان الرسالة">
</div>
<textarea id="messageBody" placeholder="اكتب نص الرسالة هنا"></textarea>
<button class="save-btn" onclick="sendMessage()">📨 إرسال الرسالة</button>
</section>

<section class="box">
<h2>صندوق الرسائل</h2>
<div class="tabs">
<button class="tab active" onclick="setTab('inbox',this)">الوارد</button>
<button class="tab" onclick="setTab('sent',this)">الصادر</button>
<button class="tab" onclick="setTab('archive',this)">الأرشيف</button>
</div>
<input id="searchBox" placeholder="🔍 بحث في الرسائل..." oninput="renderMessages()">
<div id="messagesList"></div>
</section>
</main>

<script>
let teacherMessages = JSON.parse(localStorage.getItem("afaq_teacher_messages")) || [
{box:"inbox", from:"المدير", to:"الأستاذ", receiverType:"مدير", subject:"رسالة ترحيب", body:"مرحباً بك في لوحة المدرس.", date:new Date().toLocaleString("ar")}
];
let currentTab = "inbox";

function saveMessages(){
localStorage.setItem("afaq_teacher_messages", JSON.stringify(teacherMessages));
}

function setTab(tab, btn){
currentTab = tab;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
btn.classList.add("active");
renderMessages();
}

function sendMessage(){
const receiverType = document.getElementById("receiverType").value;
const receiverName = document.getElementById("receiverName").value.trim();
const subject = document.getElementById("messageSubject").value.trim();
const body = document.getElementById("messageBody").value.trim();

if(!subject || !body){
alert("يرجى إدخال عنوان الرسالة ونص الرسالة");
return;
}

teacherMessages.unshift({
box:"sent",
from:"الأستاذ",
to: receiverName || receiverType,
receiverType,
subject,
body,
date:new Date().toLocaleString("ar")
});

saveMessages();

document.getElementById("receiverName").value="";
document.getElementById("messageSubject").value="";
document.getElementById("messageBody").value="";

currentTab="sent";
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab")[1].classList.add("active");
renderMessages();
alert("تم إرسال الرسالة بنجاح");
}

function archiveMessage(index){
teacherMessages[index].box = "archive";
saveMessages();
renderMessages();
}

function deleteMessage(index){
if(confirm("هل تريد حذف هذه الرسالة؟")){
teacherMessages.splice(index,1);
saveMessages();
renderMessages();
}
}

function renderMessages(){
const list = document.getElementById("messagesList");
const q = document.getElementById("searchBox").value.trim();
const filtered = teacherMessages
.map((m,i)=>({...m, realIndex:i}))
.filter(m => m.box === currentTab)
.filter(m => !q || m.subject.includes(q) || m.body.includes(q) || m.from.includes(q) || m.to.includes(q));

if(filtered.length === 0){
list.innerHTML = `<div class="empty">لا توجد رسائل في هذا القسم حالياً</div>`;
return;
}

list.innerHTML = filtered.map(m=>`
<div class="message-card">
<div class="message-head">
<div>
<h3>${m.subject}</h3>
<div class="meta">
<span class="badge">${m.receiverType || "رسالة"}</span>
من: ${m.from} — إلى: ${m.to}<br>
التاريخ: ${m.date}
</div>
</div>
<div class="actions">
${m.box !== "archive" ? `<button class="mini-btn archive-btn" onclick="archiveMessage(${m.realIndex})">أرشفة</button>` : ""}
<button class="mini-btn danger-btn" onclick="deleteMessage(${m.realIndex})">حذف</button>
</div>
</div>
<p>${m.body}</p>
</div>
`).join("");
}

renderMessages();
</script>
</body>
</html>
