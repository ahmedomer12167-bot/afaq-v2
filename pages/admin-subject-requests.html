<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلبات دخول المادة</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-purple-mobile.css">
<link rel="stylesheet" href="../css/afaq-badges.css">
<link rel="stylesheet" href="../css/afaq-subject-join.css">
</head>
<body>
<main class="afaq-mobile">

<section class="afaq-top">
<h1>📚 طلبات دخول المادة</h1>
<p>هنا تظهر طلبات الطلاب لدخول المادة بعد إدخال كود المادة.</p>
<div style="margin-top:14px">
<a class="afaq-btn gray" href="admin-dashboard.html">رجوع للمدير</a>
<button class="afaq-btn" onclick="renderRequests()">تحديث</button>
</div>
</section>

<section class="panel">
<h2>طلبات الطلاب</h2>
<select id="statusFilter" onchange="renderRequests()">
  <option value="">كل الطلبات</option>
  <option>قيد المراجعة</option>
  <option>مقبول</option>
  <option>مرفوض</option>
</select>
<input id="searchBox" placeholder="بحث باسم الطالب أو ولي الأمر أو الصف" oninput="renderRequests()">
<div id="requestsBox"></div>
</section>

</main>

<script src="../js/afaq-data.js"></script>
<script src="../js/afaq-unified-counters.js"></script>
<script src="../js/afaq-badges.js"></script>
<script src="../js/afaq-full-sync.js"></script>
<script>


function renderRequests(){
  const q = String(searchBox.value || "").trim();
  const status = statusFilter.value;
  let list = AfaqFullSync.requests();

  if(status) list = list.filter(r => r.status === status);
  if(q){
    list = list.filter(r =>
      String(r.studentName || "").includes(q) ||
      String(r.parentName || "").includes(q) ||
      String(r.grade || "").includes(q) ||
      String(r.subject || "").includes(q)
    );
  }

  requestsBox.innerHTML = list.length ? list.map(r=>`
    <div class="request-card">
      <h3>${r.studentName}</h3>
      <p>اسم ولي الأمر: ${r.parentName || "-"}</p>
      <p>الصف: ${r.grade || "-"}</p>
      <p>المادة: ${r.subject || "-"}</p>
      <p>كود الطالب: ${r.studentCode || r.studentId || "-"}</p>
      <p>رقم الهاتف: ${r.phone || "-"}</p>
      <p>المبلغ/الاشتراك: ${r.amount || "-"}</p>
      <p>تاريخ الطلب: ${r.createdAt || "-"}</p>
      <span class="status-pill">${r.status}</span>

      ${r.status === "قيد المراجعة" ? `
        <div style="margin-top:12px">
          <input id="note-${r.id}" placeholder="ملاحظة الرفض اختيارية">
          <button class="afaq-btn" onclick="approve('${r.id}')">قبول الطالب</button>
          <button class="afaq-btn red" onclick="rejectReq('${r.id}')">رفض الطالب</button>
        </div>
      ` : ""}

      ${r.note ? `<p>ملاحظة: ${r.note}</p>` : ""}
    </div>
  `).join("") : "<div class='request-card'><h3>لا توجد طلبات</h3></div>";
}

function approve(id){
  try{
    AfaqFullSync.approveRequest(id);
    renderRequests();
    alert("تم قبول الطالب في المادة ومزامنة البيانات في جميع اللوحات.");
  }catch(e){
    alert(e.message);
  }
}

function rejectReq(id){
  try{
    const note = document.getElementById("note-" + id).value;
    AfaqFullSync.rejectRequest(id, note);
    renderRequests();
    alert("تم رفض الطلب.");
  }catch(e){
    alert(e.message);
  }
}

renderRequests();
</script>
</body>
</html>
