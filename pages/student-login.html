<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>دخول الطالب</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-room.css"></head><body>
<main class="room"><section class="panel" style="max-width:520px;margin:auto"><h1>🎓 دخول الطالب</h1><input id="code" placeholder="كود الطالب"><button class="btn ok" onclick="login()">دخول</button><a class="btn back" href="student-subscription-request.html">طلب اشتراك جديد</a><p id="msg"></p></section></main>
<script src="../js/afaq-data.js"></script>
<script>
function login(){const st=AfaqData.findStudent(code.value);if(!st){msg.textContent="الكود غير صحيح";return;}if(!AfaqData.hasActiveSubscription(st)){msg.textContent="اشتراكك غير مفعل";return;}AfaqData.setCurrentStudent(st);location.href="student-dashboard.html";}
</script>
</body></html>
