<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول الطالب - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{width:100%;max-width:560px;padding:32px;border-radius:28px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);box-shadow:0 0 35px rgba(124,58,237,.25)}
.back-link{display:inline-block;margin-bottom:18px;color:#ddd;text-decoration:none;font-weight:bold}.login-icon{width:88px;height:88px;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-size:44px;background:linear-gradient(135deg,#7c3aed,#a855f7)}
h1{text-align:center;margin-bottom:8px}p{text-align:center;color:#d6d6d6;line-height:1.7}
label{display:block;margin-top:16px;margin-bottom:8px;font-weight:bold}
input,select{width:100%;padding:15px;border:none;border-radius:14px;outline:none;font-size:16px}
.hint{font-size:13px;color:#d6d6d6;margin-top:7px;line-height:1.6;text-align:right}
button{width:100%;border:none;padding:15px;border-radius:14px;margin-top:20px;cursor:pointer;color:white;font-weight:bold;font-size:16px;background:linear-gradient(135deg,#16a34a,#22c55e)}
.msg{margin-top:14px;padding:12px;border-radius:14px;display:none;line-height:1.8}
.error{background:rgba(220,38,38,.18);border:1px solid rgba(220,38,38,.35)}
.success{background:rgba(22,163,74,.18);border:1px solid rgba(22,163,74,.35)}
</style>
</head>
<body>
<section class="login-page">
<div class="login-box">
<a href="../index.html" class="back-link">← الرجوع للرئيسية</a>
<div class="login-icon">🎓</div>
<h1>تسجيل دخول الطالب</h1>
<p>أدخل المرحلة والكود نفسه الموجود في إدارة الطلاب.</p>

<label>المرحلة الدراسية</label>
<select id="studentGradeInput">
<option value="">اختر المرحلة</option>
<option>الأول متوسط</option>
<option>الثاني متوسط</option>
<option>الثالث متوسط</option>
<option>الرابع العلمي</option>
<option>الخامس العلمي</option>
<option>السادس العلمي</option>
</select>
<div class="hint">اختر نفس المرحلة التي أضافها المدير للطالب.</div>

<label>كود الطالب</label>
<input id="studentCodeInput" type="text" placeholder="مثال: 11 أو STD-2026-001">
<div class="hint">اكتب الكود كما هو تماماً في إدارة الطلاب. إذا كان الكود 11 فاكتب 11 فقط.</div>

<button type="button" onclick="loginStudent()">دخول الطالب</button>
<div id="errorBox" class="msg error"></div>
<div id="successBox" class="msg success"></div>
</div>
</section>

<script src="../js/afaq-data.js"></script>
<script>
function show(id,msg){document.getElementById("errorBox").style.display="none";document.getElementById("successBox").style.display="none";const box=document.getElementById(id);box.style.display="block";box.innerHTML=msg;}
function loginStudent(){
const grade=document.getElementById("studentGradeInput").value.trim();
const code=document.getElementById("studentCodeInput").value.trim();
if(!grade||!code){show("errorBox","يرجى اختيار المرحلة وإدخال كود الطالب.");return;}
const student=AfaqData.findStudentByCodeAndGrade(code,grade);
if(!student){
const count=AfaqData.allStudents().length;
show("errorBox","لم يتم العثور على طالب بهذا الكود.<br>تأكد من المرحلة والكود.<br>عدد الطلاب المحفوظين حالياً: "+count);
return;
}
AfaqData.setCurrentStudent(student);
show("successBox","تم العثور على الطالب: <b>"+student.name+"</b><br>جاري فتح لوحة الطالب...");
setTimeout(()=>{window.location.href="student-dashboard.html";},600);
}
</script>
</body>
</html>
