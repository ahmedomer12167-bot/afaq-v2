<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل دخول الطالب - آفاق التعليمية</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>

<section class="login-page">
  <div class="login-box">
    <a href="../index.html" class="back-link">← الرجوع للرئيسية</a>

    <div class="login-icon">🎓</div>
    <h1>تسجيل دخول الطالب</h1>
    <p>أدخل بياناتك للوصول إلى لوحة الطالب</p>

    <form>
      <label>الاسم الثلاثي</label>
      <input type="text" placeholder="مثال: أحمد محمد علي" />

      <label>الصف</label>
      <select>
        <option>الأول متوسط</option>
        <option>الثاني متوسط</option>
        <option>الثالث متوسط</option>
        <option>الرابع الإعدادي</option>
        <option>الخامس الإعدادي</option>
        <option>السادس الإعدادي</option>
      </select>

      <label>الكود العام للطالب</label>
      <input type="password" placeholder="أدخل كود الطالب" />

      <button type="button">دخول الطالب</button>
    </form>
  </div>
</section>

<script src="../js/app.js"></script>
</body>
</html>
