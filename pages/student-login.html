<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول الطالب - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
</head>
<body>

<section class="login-page">
<div class="login-box">

<a href="../index.html" class="back-link">← الرجوع للرئيسية</a>

<div class="login-icon">🎓</div>

<h1>تسجيل دخول الطالب</h1>

<p>أدخل كود الطالب الذي تم تفعيله من إدارة الطلاب</p>

<form>
<label>كود الطالب</label>
<input id="studentCodeInput" type="text" placeholder="مثال: STD-2026-001">

<button type="button" onclick="loginStudent()">دخول الطالب</button>
</form>

</div>
</section>

<script src="../js/afaq-data.js"></script>
<script>
function loginStudent(){
  const code = document.getElementById("studentCodeInput").value.trim();

  if(!code){
    alert("يرجى إدخال كود الطالب");
    return;
  }

  const student = AfaqData.getStudentByCode(code);

  if(!student){
    alert("لم يتم العثور على طالب بهذا الكود. تأكد أن المدير أضاف الطالب في إدارة الطلاب.");
    return;
  }

  AfaqData.setCurrentStudent(student);
  window.location.href = "student-dashboard.html";
}
</script>

</body>
</html>
