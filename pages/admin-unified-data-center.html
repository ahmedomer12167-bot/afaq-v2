<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>مركز البيانات</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-room.css"></head><body><main class="room"><section class="topbar"><div class="title"><h1>🧩 مركز البيانات الموحدة</h1><p>المدير يرى كل البيانات الموحدة في مكان واحد.</p></div><a class="btn back" href="admin-dashboard.html">لوحة المدير</a></section><section class="panel"><div id="box" class="cards"></div></section></main><script src="../js/afaq-data.js"></script><script>
function render(){const items=[["الطلاب",AfaqData.allStudents().length],["طلبات الاشتراك",AfaqData.list("subscriptionRequests").length],["طلبات المواد",AfaqData.list("subjectRequests").length],["الدروس",AfaqData.list("lessons").length],["الاختبارات",AfaqData.list("exams").length],["الواجبات",AfaqData.list("assignments").length],["الحضور",AfaqData.list("attendance").length],["النتائج",AfaqData.list("results").length],["الرسائل",AfaqData.list("messages").length],["الإشعارات",AfaqData.list("notifications").length]];box.innerHTML=items.map(i=>`<div class="card"><h3>${i[0]}</h3><p>${i[1]}</p></div>`).join("")}render();
</script></body></html>
