<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>الإشعارات الموحدة</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-room.css"></head><body>
<main class="room"><section class="topbar"><div class="title"><h1>🔔 الإشعارات الموحدة</h1><p>إشعارات الاشتراكات والمواد والقبول والرفض.</p></div><a class="btn back" href="admin-dashboard.html">رجوع</a></section><section class="panel"><select id="role" onchange="render()"><option value="admin">المدير</option><option value="student">الطالب</option><option value="teacher">المدرس</option></select><input id="targetId" placeholder="الكود اختياري"><div id="box" class="cards"></div></section></main>
<script src="../js/afaq-data.js"></script>
<script>
function render(){let arr=AfaqData.list("notifications").filter(n=>n.toRole===role.value);if(targetId.value.trim())arr=arr.filter(n=>n.toId===targetId.value.trim());box.innerHTML=arr.length?arr.map(n=>`<div class="card"><h3>${n.title}</h3><p>${n.message}</p><span class="badge">${n.type}</span></div>`).join(""):"<div class='card'><h3>لا توجد إشعارات</h3></div>"}render();
</script>
</body></html>
