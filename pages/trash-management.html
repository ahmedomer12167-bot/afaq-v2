<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سلة المحذوفات - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:25px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.danger{background:linear-gradient(135deg,#dc2626,#ef4444)}.success{background:linear-gradient(135deg,#16a34a,#22c55e)}.tabs{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px}.tab{padding:13px;border:none;border-radius:14px;cursor:pointer;color:white;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.12);font-weight:bold}.tab.active{background:linear-gradient(135deg,#7c3aed,#a855f7)}.trash-item{padding:16px;border-radius:16px;background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.10);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:15px}.trash-item h3{margin-bottom:6px;color:#fff}.trash-item p{color:#d6d6d6;line-height:1.7}.item-actions{display:flex;gap:8px;flex-wrap:wrap}.empty-state{text-align:center;padding:35px;color:#ddd}.add-demo{margin-top:15px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.add-demo input,.add-demo select{padding:13px;border:none;border-radius:14px;outline:none}.small{font-size:13px;color:#cfcfcf}@media(max-width:900px){.header{flex-direction:column;align-items:flex-start}.tabs,.add-demo{grid-template-columns:1fr}.trash-item{flex-direction:column;align-items:flex-start}.item-actions{width:100%}.item-actions button{flex:1}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div>
<h1>🗑️ سلة المحذوفات</h1>
<p>استعادة العناصر المحذوفة أو حذفها نهائياً من المنصة.</p>
</div>
<div class="actions">
<button class="btn" onclick="location.href='admin-dashboard.html'">🏠 لوحة المدير</button>
<button class="btn" onclick="history.back()">← رجوع</button>
<button class="btn danger" onclick="clearTrash()">🧹 تفريغ السلة</button>
</div>
</header>
<section class="box">
<h2>الأقسام</h2>
<div class="tabs">
<button class="tab active" onclick="setCategory('all',this)">الكل</button>
<button class="tab" onclick="setCategory('students',this)">الطلاب</button>
<button class="tab" onclick="setCategory('teachers',this)">المدرسون</button>
<button class="tab" onclick="setCategory('subjects',this)">المواد</button>
<button class="tab" onclick="setCategory('notifications',this)">الإشعارات</button>
<button class="tab" onclick="setCategory('messages',this)">الرسائل</button>
</div>
<p class="small">حالياً تعمل السلة محلياً باستخدام LocalStorage، ولاحقاً سنربطها بـ Firebase لتصبح مشتركة بين الأجهزة.</p>
</section>
<section class="box">
<h2>إضافة عنصر تجريبي للسلة</h2>
<div class="add-demo">
<select id="demoType">
<option value="students">طالب</option>
<option value="teachers">مدرس</option>
<option value="subjects">مادة</option>
<option value="notifications">إشعار</option>
<option value="messages">رسالة</option>
<option value="events">حدث</option>
</select>
<input id="demoTitle" type="text" placeholder="اسم العنصر المحذوف">
<button class="btn" onclick="addDemoTrash()">إضافة للسلة</button>
</div>
</section>
<section class="box">
<h2>العناصر المحذوفة</h2>
<div id="trashList"></div>
</section>
</main>
<script>
let trash=JSON.parse(localStorage.getItem('afaq_trash'))||[];
let currentCategory='all';
function saveTrash(){localStorage.setItem('afaq_trash',JSON.stringify(trash));}
function setCategory(category,btn){currentCategory=category;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderTrash();}
function categoryName(type){const names={students:'طالب',teachers:'مدرس',subjects:'مادة',notifications:'إشعار',messages:'رسالة',events:'حدث'};return names[type]||type;}
function renderTrash(){const list=document.getElementById('trashList');const data=currentCategory==='all'?trash:trash.filter(item=>item.type===currentCategory);if(data.length===0){list.innerHTML='<div class="empty-state">لا توجد عناصر محذوفة في هذا القسم حالياً</div>';return;}list.innerHTML=data.map((item)=>{const realIndex=trash.findIndex(t=>t.id===item.id);return `<div class="trash-item"><div><h3>${item.title}</h3><p>النوع: ${categoryName(item.type)}</p><p class="small">تاريخ الحذف: ${item.deletedAt}</p></div><div class="item-actions"><button class="btn success" onclick="restoreItem(${realIndex})">♻️ استعادة</button><button class="btn danger" onclick="deleteForever(${realIndex})">حذف نهائي</button></div></div>`}).join('');}
function addDemoTrash(){const type=document.getElementById('demoType').value;const title=document.getElementById('demoTitle').value.trim();if(!title){alert('اكتب اسم العنصر أولاً');return;}trash.unshift({id:Date.now(),type,title,deletedAt:new Date().toLocaleString('ar-IQ')});saveTrash();document.getElementById('demoTitle').value='';renderTrash();}
function restoreItem(index){if(index<0)return;if(confirm('هل تريد استعادة هذا العنصر؟')){trash.splice(index,1);saveTrash();renderTrash();alert('تمت الاستعادة بنجاح');}}
function deleteForever(index){if(index<0)return;if(confirm('سيتم حذف العنصر نهائياً. هل أنت متأكد؟')){trash.splice(index,1);saveTrash();renderTrash();}}
function clearTrash(){if(confirm('سيتم تفريغ سلة المحذوفات بالكامل. هل أنت متأكد؟')){trash=[];saveTrash();renderTrash();}}
renderTrash();
</script>
</body>
</html>
