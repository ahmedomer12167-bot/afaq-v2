<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موادي - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.subject{padding:26px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);cursor:pointer;transition:.3s}.subject:hover{transform:translateY(-8px);box-shadow:0 0 30px rgba(168,85,247,.35);border-color:#a855f7}.subject span{font-size:38px;display:block;margin-bottom:14px}.subject h3{font-size:22px;margin-bottom:8px}.subject p{color:#d6d6d6;line-height:1.7}input{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin-top:10px}@media(max-width:900px){.grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div><h1>📚 موادي</h1><p>المواد المسجل بها الطالب.</p></div>
<div><button class="btn" onclick="location.href='student-dashboard.html'">🏠 لوحة الطالب</button><button class="btn" onclick="history.back()">← رجوع</button></div>
</header>
<section class="box">
<input id="search" placeholder="🔍 ابحث عن مادة..." oninput="filterSubjects()">
</section>
<section class="grid" id="subjectsGrid"></section>
</main>
<script>
const subjects=[
{icon:'🧬',name:'الأحياء',teacher:'الأستاذ أحمد عمر'},
{icon:'⚗️',name:'الكيمياء',teacher:'مدرس المادة'},
{icon:'⚡',name:'الفيزياء',teacher:'مدرس المادة'},
{icon:'📐',name:'الرياضيات',teacher:'مدرس المادة'},
{icon:'🇬🇧',name:'الإنكليزي',teacher:'مدرس المادة'},
{icon:'📖',name:'العربي',teacher:'مدرس المادة'}
];
function render(list=subjects){
const grid=document.getElementById('subjectsGrid');
grid.innerHTML=list.map(s=>`<div class="subject" onclick="location.href='student-subject-page.html'"><span>${s.icon}</span><h3>${s.name}</h3><p>${s.teacher}</p><p>اضغط للدخول إلى صفحة المادة.</p></div>`).join('');
}
function filterSubjects(){const v=document.getElementById('search').value.trim();render(subjects.filter(s=>s.name.includes(v)||s.teacher.includes(v)));}
render();
</script>
</body>
</html>
