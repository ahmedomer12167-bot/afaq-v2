<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موادي</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-room.css">
</head>
<body>
<main class="room">
<section class="topbar">
<div class="title">
<h1>📚 موادي</h1>
<p>لا يمكنك دخول أي مادة إلا بعد موافقة المدرس.</p>
</div>
<a class="btn back" href="student-dashboard.html">لوحة الطالب</a>
</section>

<section class="panel">
<h2>المواد الموافق عليها</h2>
<div id="approvedSubjects" class="cards"></div>
</section>

<section class="panel">
<h2>طلب دخول مادة</h2>
<select id="subjectSelect">
<option>الأحياء</option>
<option>الكيمياء</option>
<option>الفيزياء</option>
<option>الرياضيات</option>
<option>الإنكليزي</option>
<option>العربي</option>
<option>الإسلامية</option>
</select>
<textarea id="requestNote" placeholder="ملاحظة للمدرس"></textarea>
<button class="btn" onclick="sendSubjectRequest()">إرسال الطلب</button>
</section>

<section class="panel">
<h2>طلباتي</h2>
<div id="myRequests" class="cards"></div>
</section>
</main>

<script src="../js/afaq-data.js"></script>
<script>
function currentStudent(){
 const st = AfaqData.getCurrentStudent();
 if(!st){
   alert("سجل الدخول أولاً");
   location.href = "student-login.html";
 }
 return st;
}
function sendSubjectRequest(){
 const st = currentStudent();
 const subject = subjectSelect.value;
 const reqs = AfaqData.list("subjectRequests");
 const old = reqs.find(r=>r.studentId===st.studentId && r.subject===subject && r.status==="قيد المراجعة");
 if(old){alert("لديك طلب سابق قيد المراجعة لهذه المادة");return;}
 AfaqData.add("subjectRequests",{
   studentId:st.studentId,
   code:st.code,
   studentName:st.name,
   grade:st.grade,
   subject,
   note:requestNote.value.trim(),
   status:"قيد المراجعة"
 });
 requestNote.value = "";
 render();
 alert("تم إرسال طلب دخول المادة إلى المدرس.");
}
function openSubject(subject){
 const st = currentStudent();
 if(!AfaqData.canEnterSubject(st,subject)){
   alert("لا يمكنك دخول هذه المادة قبل موافقة المدرس.");
   return;
 }
 AfaqData.setCurrentSubject(subject);
 location.href = "student-subject-page.html";
}
function render(){
 const st = currentStudent();
 const subjects = st.subjects || [];
 approvedSubjects.innerHTML = subjects.length ? subjects.map(s=>`
 <div class="card"><h3>${s}</h3><p>تمت موافقة المدرس.</p><button class="btn" onclick="openSubject('${s}')">دخول المادة</button></div>
 `).join("") : '<div class="card"><h3>لا توجد مواد مفعلة</h3><p>أرسل طلب دخول مادة إلى المدرس.</p></div>';
 const reqs = AfaqData.list("subjectRequests").filter(r=>r.studentId===st.studentId || r.code===st.code);
 myRequests.innerHTML = reqs.length ? reqs.map(r=>`<div class="card"><h3>${r.subject}</h3><p>${r.note || ""}</p><span class="badge">${r.status}</span></div>`).join("") : '<div class="card"><h3>لا توجد طلبات</h3></div>';
}
render();
</script>
</body>
</html>
