<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موادي</title>
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-purple-mobile.css">
<link rel="stylesheet" href="../css/afaq-badges.css">
<link rel="stylesheet" href="../css/afaq-student-clean.css">
</head>
<body>
<main class="afaq-mobile">

<section class="afaq-top">
<h1>📚 موادي</h1>
<p>هذه المواد التي تمت الموافقة على دخولك إليها.</p>
<div style="margin-top:14px">
<a class="afaq-btn gray" href="student-dashboard.html">رجوع للوحة الطالب</a>
</div>
</section>

<section class="student-clean-grid" id="subjectsBox"></section>

</main>
<script src="../js/afaq-data.js"></script>
<script src="../js/afaq-full-sync.js"></script>
<script src="../js/afaq-unified-counters.js"></script>
<script>
let student = AfaqFullSync.resyncCurrentStudent();
if(!student){location.href="student-login.html";}
function render(){
  student = AfaqFullSync.resyncCurrentStudent() || student;
  const subjects = Array.isArray(student.subjects) ? student.subjects : [];
  const all = AfaqFullSync.subjects();

  subjectsBox.innerHTML = subjects.length ? subjects.map(name=>{
    const sub = all.find(s => AfaqFullSync.normalizeSubject(s.name || s.subject) === AfaqFullSync.normalizeSubject(name)) || {};
    return `
      <div class="student-clean-card">
        <h3>📚 ${name}</h3>
        <p>المدرس: ${sub.teacherName || "-"}</p>
        <p>كود المادة: <b>${sub.subjectCode || "-"}</b></p>
        <button class="afaq-btn" onclick="openRoom('${name}')">فتح المادة</button>
      </div>
    `;
  }).join("") : `
    <div class="student-clean-card">
      <h3>لا توجد مواد مسجل بها</h3>
      <p>يجب طلب دخول المادة والموافقة من المدرس أولاً.</p>
    </div>
  `;
}
function openRoom(name){
  localStorage.setItem("afaq_current_subject", name);
  location.href = "student-subject-room.html";
}
render();
</script>
</body>
</html>
