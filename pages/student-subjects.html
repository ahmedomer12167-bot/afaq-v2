<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>موادي</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-room.css"></head><body>
<main class="room"><section class="topbar"><div class="title"><h1>📚 موادي</h1><p>الطالب لا يدخل المادة إلا بعد موافقة المدرس.</p></div><a class="btn back" href="student-dashboard.html">لوحة الطالب</a></section>
<section class="panel"><h2>المواد المتاحة من المدير</h2><div id="available" class="cards"></div></section>
<section class="panel"><h2>المواد المفعلة لي</h2><div id="approved" class="cards"></div></section>
<section class="panel"><h2>طلباتي</h2><div id="requests" class="cards"></div></section></main>
<script src="../js/afaq-data.js"></script>
<script>
const st=AfaqData.getCurrentStudent();if(!st){location.href="student-login.html"}
function requestSubject(name,teacherCode){const old=AfaqData.list("subjectRequests").find(r=>r.studentId===st.studentId&&r.subject===name&&r.status==="قيد المراجعة");if(old){alert("لديك طلب قيد المراجعة");return;}AfaqData.add("subjectRequests",{studentId:st.studentId,code:st.code,studentName:st.name,grade:st.grade,subject:name,teacherCode,status:"قيد المراجعة"});AfaqData.addNotification("teacher",teacherCode,"طلب انضمام جديد",st.name+" طلب الانضمام إلى "+name,"مادة");render();alert("تم إرسال الطلب للمدرس");}
function openSub(name){if(!AfaqData.canEnterSubject(st,name)){alert("لم تتم الموافقة بعد");return;}AfaqData.setCurrentSubject(name);location.href="student-subject-page.html";}
function render(){const subs=AfaqData.subjects().filter(s=>!s.grade||s.grade===st.grade);available.innerHTML=subs.length?subs.map(s=>`<div class="card"><h3>${s.name}</h3><p>المدرس: ${s.teacherName||s.teacherCode}</p><button class="btn ok" onclick="requestSubject('${s.name}','${s.teacherCode}')">طلب الانضمام</button></div>`).join(""):"<div class='card'><h3>لا توجد مواد أضافها المدير</h3></div>";approved.innerHTML=(st.subjects||[]).length?st.subjects.map(s=>`<div class="card"><h3>${s}</h3><button class="btn" onclick="openSub('${s}')">دخول المادة</button></div>`).join(""):"<div class='card'><h3>لا توجد مواد مفعلة</h3></div>";const req=AfaqData.list("subjectRequests").filter(r=>r.studentId===st.studentId);requests.innerHTML=req.length?req.map(r=>`<div class="card"><h3>${r.subject}</h3><span class="badge">${r.status}</span></div>`).join(""):"<div class='card'><h3>لا توجد طلبات</h3></div>"}render();
</script>
</body></html>
