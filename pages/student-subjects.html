<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<title>موادي - الطالب</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/afaq-room.css">

</head>
<body>
<main class="room">
<section class="topbar">
<div class="title"><h1>📚 موادي</h1><p>لا يمكنك دخول المادة إلا بعد موافقة المدرس على طلب الانضمام.</p></div>
<a class="btn back" href="student-dashboard.html">لوحة الطالب</a>
</section>

<section class="panel">
<h2>المواد الموافق عليها</h2>
<div id="approvedSubjects" class="cards"></div>
</section>

<section class="panel">
<h2>طلب الانضمام إلى مادة</h2>
<select id="subjectSelect">
<option>الأحياء</option>
<option>الكيمياء</option>
<option>الفيزياء</option>
<option>الرياضيات</option>
<option>الإنكليزي</option>
<option>العربي</option>
<option>الإسلامية</option>
</select>
<textarea id="requestNote" placeholder="اكتب ملاحظة للمدرس إن وجدت"></textarea>
<button class="btn" onclick="sendSubjectRequest()">إرسال الطلب إلى المدرس</button>
</section>

<section class="panel">
<h2>طلباتي</h2>
<div id="myRequests" class="cards"></div>
</section>
</main>

<script src="../js/afaq-data.js"></script>
<script>
function read(k){try{return JSON.parse(localStorage.getItem(k))||[]}catch(e){return []}}
function write(k,v){localStorage.setItem(k,JSON.stringify(v))}
function student(){
 return window.AfaqData ? AfaqData.getCurrentStudent() : JSON.parse(localStorage.getItem("afaq_current_student")||"null");
}
function sendSubjectRequest(){
 const st=student();
 if(!st){alert("سجل الدخول أولاً");location.href="student-login.html";return;}
 const subject=subjectSelect.value;
 const reqs=read("afaq_subject_requests");
 const old=reqs.find(r=>r.studentId===st.studentId && r.subject===subject && r.status==="قيد المراجعة");
 if(old){alert("لديك طلب سابق قيد المراجعة لهذه المادة");return;}
 reqs.unshift({
  id:"subj-"+Date.now(),
  studentId:st.studentId,
  code:st.code,
  studentName:st.name,
  grade:st.grade,
  subject,
  note:requestNote.value.trim(),
  status:"قيد المراجعة",
  createdAt:new Date().toLocaleString("ar")
 });
 write("afaq_subject_requests",reqs);
 requestNote.value="";
 render();
 alert("تم إرسال طلب الانضمام إلى المدرس");
}
function openSubject(subject){
 localStorage.setItem("afaq_current_subject",subject);
 location.href="student-subject-page.html";
}
function render(){
 const st=student();
 if(!st){approvedSubjects.innerHTML='<div class="card"><h3>سجل الدخول أولاً</h3></div>';return;}
 const subjects=st.subjects||[];
 approvedSubjects.innerHTML = subjects.length ? subjects.map(s=>`
 <div class="card"><h3>${s}</h3><p>تمت الموافقة على دخولك هذه المادة.</p><button class="btn" onclick="openSubject('${s}')">دخول المادة</button></div>
 `).join("") : '<div class="card"><h3>لا توجد مواد مفعلة</h3><p>أرسل طلب انضمام إلى المدرس.</p></div>';
 const reqs=read("afaq_subject_requests").filter(r=>r.studentId===st.studentId || r.code===st.code);
 myRequests.innerHTML = reqs.length ? reqs.map(r=>`<div class="card"><h3>${r.subject}</h3><p>${r.note||""}</p><span class="badge">${r.status}</span></div>`).join("") : '<div class="card"><h3>لا توجد طلبات</h3></div>';
}
render();
</script>
</body>
</html>
