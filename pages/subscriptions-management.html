<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة الاشتراكات - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.management-page{min-height:100vh;padding:24px}.page-header{display:flex;justify-content:space-between;align-items:center;gap:15px;padding:18px 22px;border-radius:22px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);margin-bottom:24px}.page-header p{color:#d8d8d8;margin-top:6px}.header-actions{display:flex;gap:10px;flex-wrap:wrap}.action-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:#fff;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.danger-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}.success-btn{background:linear-gradient(135deg,#059669,#10b981)}.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:15px}.form-grid input,.form-grid select,.search-input{width:100%;padding:14px;border:none;border-radius:14px;outline:none;font-size:15px}.subscriptions-table{width:100%;border-collapse:collapse;margin-top:15px}.subscriptions-table th,.subscriptions-table td{padding:14px;text-align:center;border-bottom:1px solid rgba(255,255,255,.12)}.subscriptions-table th{color:#c084fc}.status-pending{color:#facc15;font-weight:bold}.status-approved{color:#22c55e;font-weight:bold}.status-rejected{color:#ef4444;font-weight:bold}.mini-btn{border:none;padding:8px 10px;border-radius:10px;cursor:pointer;color:#fff;font-weight:bold;margin:2px;background:linear-gradient(135deg,#7c3aed,#9333ea)}.delete-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}.approve-btn{background:linear-gradient(135deg,#059669,#10b981)}.reject-btn{background:linear-gradient(135deg,#ca8a04,#eab308)}@media(max-width:900px){.page-header{flex-direction:column;align-items:flex-start}.form-grid{grid-template-columns:1fr}.subscriptions-table{font-size:13px}}
</style>
</head>
<body>
<main class="management-page">
<header class="page-header">
<div>
<h1>إدارة الاشتراكات</h1>
<p>مراجعة طلبات الاشتراك، قبولها، رفضها، وتحديد مدة الاشتراك.</p>
</div>
<div class="header-actions">
<button class="action-btn" onclick="location.href='admin-dashboard.html'">🏠 لوحة المدير</button>
<button class="action-btn" onclick="history.back()">← رجوع</button>
<button class="action-btn danger-btn" onclick="clearSubscriptions()">تفريغ الطلبات</button>
</div>
</header>
<section class="box">
<input class="search-input" id="subscriptionSearch" type="text" placeholder="🔍 ابحث باسم الطالب أو الصف أو المادة أو الهاتف..." oninput="filterSubscriptions()">
</section>
<section class="box">
<h2>إضافة طلب اشتراك تجريبي</h2>
<div class="form-grid">
<input id="studentName" type="text" placeholder="اسم الطالب الثلاثي">
<select id="studentGrade"><option value="">اختر الصف</option><option>الأول متوسط</option><option>الثاني متوسط</option><option>الثالث متوسط</option><option>الرابع الإعدادي</option><option>الخامس الإعدادي</option><option>السادس الإعدادي</option></select>
<select id="subjectName"><option value="">اختر المادة</option><option>الأحياء</option><option>الفيزياء</option><option>الكيمياء</option><option>الرياضيات</option><option>الاجتماعيات</option><option>العربي</option><option>الإنكليزي</option><option>الإسلامية</option></select>
<input id="studentPhone" type="text" placeholder="رقم الهاتف">
<input id="amount" type="text" placeholder="المبلغ المرسل">
<input id="paymentRef" type="text" placeholder="رقم العملية / ملاحظة الدفع">
<select id="duration"><option value="شهر">شهر</option><option>شهرين</option><option>3 أشهر</option><option>6 أشهر</option><option>سنة</option></select>
<input id="startDate" type="date">
<input id="endDate" type="date">
</div>
<button class="action-btn" style="margin-top:15px" onclick="addSubscription()">➕ إضافة الطلب</button>
</section>
<section class="box">
<h2>طلبات الاشتراك</h2>
<table class="subscriptions-table">
<thead><tr><th>الطالب</th><th>الصف</th><th>المادة</th><th>الهاتف</th><th>المبلغ</th><th>المدة</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
<tbody id="subscriptionsBody"><tr><td colspan="8">لا توجد طلبات حالياً</td></tr></tbody>
</table>
</section>
</main>
<script>
let subscriptions=JSON.parse(localStorage.getItem('afaq_subscriptions'))||[];
function saveSubscriptions(){localStorage.setItem('afaq_subscriptions',JSON.stringify(subscriptions));}
function renderSubscriptions(list=subscriptions){const body=document.getElementById('subscriptionsBody');if(list.length===0){body.innerHTML='<tr><td colspan="8">لا توجد طلبات حالياً</td></tr>';return;}body.innerHTML='';list.forEach((s,index)=>{let cls=s.status==='مقبول'?'status-approved':s.status==='مرفوض'?'status-rejected':'status-pending';body.innerHTML+=`<tr><td>${s.studentName}</td><td>${s.grade}</td><td>${s.subject}</td><td>${s.phone}</td><td>${s.amount}</td><td>${s.duration}</td><td class="${cls}">${s.status}</td><td><button class="mini-btn approve-btn" onclick="approveSubscription(${index})">قبول</button><button class="mini-btn reject-btn" onclick="rejectSubscription(${index})">رفض</button><button class="mini-btn delete-btn" onclick="deleteSubscription(${index})">حذف</button></td></tr>`;});}
function addSubscription(){const studentName=document.getElementById('studentName').value.trim();const grade=document.getElementById('studentGrade').value;const subject=document.getElementById('subjectName').value;const phone=document.getElementById('studentPhone').value.trim();const amount=document.getElementById('amount').value.trim();const paymentRef=document.getElementById('paymentRef').value.trim();const duration=document.getElementById('duration').value;const startDate=document.getElementById('startDate').value;const endDate=document.getElementById('endDate').value;if(!studentName||!grade||!subject||!phone||!amount){alert('يرجى إدخال اسم الطالب والصف والمادة والهاتف والمبلغ');return;}subscriptions.unshift({studentName,grade,subject,phone,amount,paymentRef,duration,startDate,endDate,status:'بانتظار الموافقة',createdAt:new Date().toLocaleString('ar-IQ')});saveSubscriptions();renderSubscriptions();document.querySelectorAll('input').forEach(i=>i.value='');document.getElementById('studentGrade').value='';document.getElementById('subjectName').value='';}
function approveSubscription(index){subscriptions[index].status='مقبول';saveSubscriptions();renderSubscriptions();}
function rejectSubscription(index){subscriptions[index].status='مرفوض';saveSubscriptions();renderSubscriptions();}
function deleteSubscription(index){if(confirm('هل تريد حذف طلب الاشتراك؟')){subscriptions.splice(index,1);saveSubscriptions();renderSubscriptions();}}
function clearSubscriptions(){if(confirm('سيتم حذف جميع طلبات الاشتراك')){subscriptions=[];saveSubscriptions();renderSubscriptions();}}
function filterSubscriptions(){const v=document.getElementById('subscriptionSearch').value.trim();const filtered=subscriptions.filter(s=>s.studentName.includes(v)||s.grade.includes(v)||s.subject.includes(v)||s.phone.includes(v));renderSubscriptions(filtered);}
renderSubscriptions();
</script>
</body>
</html>
