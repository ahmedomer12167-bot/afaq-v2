<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة الاشتراكات - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.management-page{min-height:100vh;padding:24px}.page-header{display:flex;justify-content:space-between;align-items:center;gap:15px;padding:18px 22px;border-radius:22px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);margin-bottom:24px}.page-header p{color:#ddd;margin-top:6px}.header-actions{display:flex;gap:10px;flex-wrap:wrap}.action-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.danger-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:15px}.form-grid input,.form-grid select,.search-input{width:100%;padding:14px;border:none;border-radius:14px;outline:none;font-size:15px}.subs-table{width:100%;border-collapse:collapse;margin-top:15px}.subs-table th,.subs-table td{padding:14px;text-align:center;border-bottom:1px solid rgba(255,255,255,.12)}.subs-table th{color:#c084fc}.status-pending{color:#facc15;font-weight:bold}.status-approved{color:#22c55e;font-weight:bold}.status-rejected{color:#ef4444;font-weight:bold}.mini-btn{border:none;padding:8px 10px;border-radius:10px;cursor:pointer;color:white;font-weight:bold;margin:2px;background:linear-gradient(135deg,#7c3aed,#9333ea)}.approve{background:linear-gradient(135deg,#059669,#10b981)}.reject,.delete{background:linear-gradient(135deg,#dc2626,#ef4444)}@media(max-width:900px){.page-header{flex-direction:column;align-items:flex-start}.form-grid{grid-template-columns:1fr}.subs-table{font-size:13px}}
</style>
</head>
<body>
<main class="management-page">
<header class="page-header">
<div><h1>إدارة الاشتراكات</h1><p>مراجعة طلبات اشتراك الطلاب، قبولها، رفضها، وتحديد مدة الاشتراك.</p></div>
<div class="header-actions"><button class="action-btn" onclick="location.href='admin-dashboard.html'">🏠 لوحة المدير</button><button class="action-btn" onclick="history.back()">← رجوع</button><button class="action-btn danger-btn" onclick="clearRequests()">تفريغ الطلبات</button></div>
</header>
<section class="box"><input class="search-input" id="subSearch" type="text" placeholder="🔍 ابحث باسم الطالب أو الصف أو المادة..." oninput="filterRequests()"></section>
<section class="box">
<h2>إضافة طلب اشتراك تجريبي</h2>
<div class="form-grid">
<input id="studentName" type="text" placeholder="اسم الطالب الثلاثي">
<select id="studentGrade"><option value="">اختر الصف</option><option>الأول متوسط</option><option>الثاني متوسط</option><option>الثالث متوسط</option><option>الرابع الإعدادي</option><option>الخامس الإعدادي</option><option>السادس الإعدادي</option></select>
<select id="subjectName"><option value="">اختر المادة</option><option>الأحياء</option><option>الفيزياء</option><option>الكيمياء</option><option>الرياضيات</option><option>الاجتماعيات</option><option>العربي</option><option>الإنكليزي</option><option>الإسلامية</option></select>
<input id="phone" type="text" placeholder="رقم الهاتف">
<input id="amount" type="text" placeholder="المبلغ المرسل">
<input id="paymentNumber" type="text" placeholder="رقم العملية / الملاحظة">
<select id="duration"><option value="شهر">شهر</option><option>شهرين</option><option>3 أشهر</option><option>6 أشهر</option><option>سنة</option></select>
<input id="startDate" type="date">
<input id="endDate" type="date">
</div>
<button class="action-btn" style="margin-top:15px" onclick="addRequest()">➕ إضافة الطلب</button>
</section>
<section class="box">
<h2>طلبات الاشتراك</h2>
<table class="subs-table"><thead><tr><th>الطالب</th><th>الصف</th><th>المادة</th><th>الهاتف</th><th>المبلغ</th><th>المدة</th><th>الحالة</th><th>الإجراءات</th></tr></thead><tbody id="subsBody"><tr><td colspan="8">لا توجد طلبات حالياً</td></tr></tbody></table>
</section>
</main>
<script>
let requests=JSON.parse(localStorage.getItem('afaq_subscription_requests'))||[];
function save(){localStorage.setItem('afaq_subscription_requests',JSON.stringify(requests));}
function render(list=requests){const body=document.getElementById('subsBody');if(list.length===0){body.innerHTML='<tr><td colspan="8">لا توجد طلبات حالياً</td></tr>';return;}body.innerHTML='';list.forEach((r,i)=>{let cls=r.status==='مقبول'?'status-approved':r.status==='مرفوض'?'status-rejected':'status-pending';body.innerHTML+=`<tr><td>${r.student}</td><td>${r.grade}</td><td>${r.subject}</td><td>${r.phone}</td><td>${r.amount}</td><td>${r.duration}</td><td class="${cls}">${r.status}</td><td><button class="mini-btn approve" onclick="approveReq(${i})">قبول</button><button class="mini-btn reject" onclick="rejectReq(${i})">رفض</button><button class="mini-btn delete" onclick="deleteReq(${i})">حذف</button></td></tr>`;});}
function addRequest(){const student=document.getElementById('studentName').value.trim(),grade=document.getElementById('studentGrade').value,subject=document.getElementById('subjectName').value,phone=document.getElementById('phone').value.trim(),amount=document.getElementById('amount').value.trim(),paymentNumber=document.getElementById('paymentNumber').value.trim(),duration=document.getElementById('duration').value,startDate=document.getElementById('startDate').value,endDate=document.getElementById('endDate').value;if(!student||!grade||!subject||!phone||!amount){alert('يرجى ملء الحقول الأساسية');return;}requests.unshift({student,grade,subject,phone,amount,paymentNumber,duration,startDate,endDate,status:'بانتظار الموافقة',createdAt:new Date().toLocaleString('ar-IQ')});save();render();document.querySelectorAll('input').forEach(i=>i.value='');document.getElementById('studentGrade').value='';document.getElementById('subjectName').value='';}
function approveReq(i){requests[i].status='مقبول';save();render();}
function rejectReq(i){requests[i].status='مرفوض';save();render();}
function deleteReq(i){if(confirm('حذف هذا الطلب؟')){requests.splice(i,1);save();render();}}
function clearRequests(){if(confirm('سيتم حذف جميع طلبات الاشتراك')){requests=[];save();render();}}
function filterRequests(){const v=document.getElementById('subSearch').value.trim();render(requests.filter(r=>r.student.includes(v)||r.grade.includes(v)||r.subject.includes(v)||r.phone.includes(v)));}
render();
</script>
</body>
</html>
