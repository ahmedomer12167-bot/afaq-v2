<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج الطالب - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}
.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}
.header{display:flex;justify-content:space-between;align-items:center;gap:15px}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn,.danger-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}
.danger-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:22px}
.card{padding:20px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);text-align:center}
.card span{font-size:34px;display:block;margin-bottom:10px}
.card strong{font-size:28px;display:block;margin-top:8px}
input,select{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin:8px 0 14px;font-size:15px}
.table{width:100%;border-collapse:collapse;margin-top:15px}
.table th,.table td{padding:13px;text-align:center;border-bottom:1px solid rgba(255,255,255,.12)}
.table th{color:#c084fc}
.badge{display:inline-block;padding:6px 10px;border-radius:10px;background:#7c3aed}
.pass{background:#16a34a}
.fail{background:#dc2626}
@media(max-width:900px){.stats{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}.table{font-size:13px}}
</style>
</head>
<body>
<main class="page">

<header class="header">
<div>
<h1>📊 نتائجي</h1>
<p>عرض نتائج الاختبارات والواجبات والنتيجة النهائية في مادة الأحياء.</p>
</div>
<div class="actions">
<button class="btn" onclick="location.href='student-subject-page.html'">📚 صفحة المادة</button>
<button class="btn" onclick="location.href='student-dashboard.html'">🏠 لوحة الطالب</button>
<button class="btn" onclick="history.back()">← رجوع</button>
</div>
</header>

<section class="stats">
<div class="card"><span>📝</span><h3>الاختبارات</h3><strong id="examsCount">0</strong></div>
<div class="card"><span>📋</span><h3>الواجبات</h3><strong id="assignmentsCount">0</strong></div>
<div class="card"><span>⭐</span><h3>المعدل</h3><strong id="averageScore">0%</strong></div>
<div class="card"><span>🎯</span><h3>المستوى</h3><strong id="studentLevel">مبتدئ</strong></div>
</section>

<section class="box">
<h2>بحث وتصفية النتائج</h2>
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:15px">
<input id="searchInput" placeholder="🔍 ابحث بعنوان الاختبار أو الواجب..." oninput="renderResults()">
<select id="typeFilter" onchange="renderResults()">
<option value="all">كل النتائج</option>
<option value="اختبار">الاختبارات</option>
<option value="واجب">الواجبات</option>
<option value="نهائي">النتيجة النهائية</option>
</select>
</div>
</section>

<section class="box">
<h2>قائمة النتائج</h2>
<table class="table">
<thead>
<tr>
<th>النوع</th>
<th>العنوان</th>
<th>الدرجة</th>
<th>من</th>
<th>النسبة</th>
<th>الحالة</th>
<th>ملاحظات</th>
</tr>
</thead>
<tbody id="resultsBody"></tbody>
</table>
</section>

</main>

<script>
let results = JSON.parse(localStorage.getItem("afaq_student_results")) || [
{type:"اختبار",title:"اختبار الفصل الأول",score:45,total:50,note:"أداء ممتاز"},
{type:"واجب",title:"واجب الجهاز العصبي",score:18,total:20,note:"حل مرتب"},
{type:"نهائي",title:"النتيجة النهائية للمادة",score:92,total:100,note:"ممتاز"}
];

function saveResults(){
localStorage.setItem("afaq_student_results",JSON.stringify(results));
}

function getLevel(avg){
if(avg>=90)return "أسطورة";
if(avg>=80)return "خبير";
if(avg>=70)return "متفوق";
if(avg>=60)return "مجتهد";
return "مبتدئ";
}

function renderStats(){
const exams = results.filter(r=>r.type==="اختبار").length;
const assignments = results.filter(r=>r.type==="واجب").length;
const totalScore = results.reduce((s,r)=>s+Number(r.score),0);
const totalFull = results.reduce((s,r)=>s+Number(r.total),0);
const avg = totalFull ? Math.round((totalScore/totalFull)*100) : 0;

document.getElementById("examsCount").textContent = exams;
document.getElementById("assignmentsCount").textContent = assignments;
document.getElementById("averageScore").textContent = avg + "%";
document.getElementById("studentLevel").textContent = getLevel(avg);
}

function renderResults(){
const body = document.getElementById("resultsBody");
const search = document.getElementById("searchInput").value.trim();
const filter = document.getElementById("typeFilter").value;

let filtered = results.filter(r=>{
const matchSearch = r.title.includes(search) || r.type.includes(search);
const matchType = filter==="all" || r.type===filter;
return matchSearch && matchType;
});

if(filtered.length===0){
body.innerHTML = '<tr><td colspan="7">لا توجد نتائج حالياً</td></tr>';
return;
}

body.innerHTML = filtered.map(r=>{
const percent = Math.round((Number(r.score)/Number(r.total))*100);
const passed = percent >= 50;
return `
<tr>
<td><span class="badge">${r.type}</span></td>
<td>${r.title}</td>
<td>${r.score}</td>
<td>${r.total}</td>
<td>${percent}%</td>
<td><span class="badge ${passed?'pass':'fail'}">${passed?'ناجح':'راسب'}</span></td>
<td>${r.note || "لا توجد ملاحظات"}</td>
</tr>
`;
}).join("");
}

saveResults();
renderStats();
renderResults();
</script>
</body>
</html>
