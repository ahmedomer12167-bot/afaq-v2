<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الطلاب المسجلون - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page{min-height:100vh;padding:24px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn,.mini-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.danger{background:linear-gradient(135deg,#dc2626,#ef4444)}input,select{width:100%;padding:14px;border:none;border-radius:14px;outline:none;margin-top:10px;margin-bottom:12px}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.table{width:100%;border-collapse:collapse;margin-top:15px}.table th,.table td{padding:13px;text-align:center;border-bottom:1px solid rgba(255,255,255,.12)}.table th{color:#c084fc}.profile{display:none}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-top:15px}.card{padding:18px;border-radius:18px;background:rgba(255,255,255,.07);text-align:center}.card strong{display:block;font-size:25px;margin-top:8px}@media(max-width:900px){.form-grid,.cards{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}.table{font-size:13px}}
</style>
</head>
<body>
<main class="page">
<header class="header">
<div><h1>👨‍🎓 الطلاب المسجلون</h1><p>إدارة طلاب المادة، البحث، عرض الملف، ومتابعة الحضور والنتائج.</p></div>
<div class="actions">
<button class="btn" onclick="location.href='teacher-subject-page.html'">📚 صفحة المادة</button>
<button class="btn" onclick="location.href='teacher-dashboard.html'">🏠 لوحة المدرس</button>
<button class="btn" onclick="history.back()">← رجوع</button>
</div>
</header>
<section class="box">
<input id="search" type="text" placeholder="🔍 ابحث عن طالب بالاسم أو الصف أو الهاتف..." oninput="filterStudents()">
</section>
<section class="box">
<h2>إضافة طالب مسجل في المادة</h2>
<div class="form-grid">
<input id="name" type="text" placeholder="اسم الطالب الثلاثي">
<select id="grade"><option value="">اختر الصف</option><option>الأول متوسط</option><option>الثاني متوسط</option><option>الثالث متوسط</option><option>الرابع الإعدادي</option><option>الخامس الإعدادي</option><option>السادس الإعدادي</option></select>
<input id="phone" type="text" placeholder="رقم الهاتف">
<input id="parent" type="text" placeholder="اسم ولي الأمر">
<select id="level"><option>مبتدئ</option><option>مقبول</option><option>جيد</option><option>جيد جداً</option><option>ممتاز</option></select>
<input id="subject" type="text" placeholder="المادة" value="الأحياء">
</div>
<button class="btn" onclick="addStudent()">➕ إضافة الطالب</button>
</section>
<section class="box">
<h2>قائمة الطلاب</h2>
<table class="table"><thead><tr><th>الاسم</th><th>الصف</th><th>الهاتف</th><th>المستوى</th><th>الإجراءات</th></tr></thead><tbody id="body"><tr><td colspan="5">لا يوجد طلاب حالياً</td></tr></tbody></table>
</section>
<section class="box profile" id="profile">
<h2>ملف الطالب</h2>
<p id="profileInfo"></p>
<div class="cards">
<div class="card">الحضور <strong id="present">0</strong></div>
<div class="card">الغياب <strong id="absent">0</strong></div>
<div class="card">الاختبارات <strong id="exams">0</strong></div>
<div class="card">المستوى <strong id="plevel">مبتدئ</strong></div>
</div>
</section>
</main>
<script>
let students=JSON.parse(localStorage.getItem('afaq_teacher_students'))||[];
function save(){localStorage.setItem('afaq_teacher_students',JSON.stringify(students));}
function render(list=students){const body=document.getElementById('body');if(!list.length){body.innerHTML='<tr><td colspan="5">لا يوجد طلاب حالياً</td></tr>';return;}body.innerHTML=list.map((s,i)=>`<tr><td>${s.name}</td><td>${s.grade}</td><td>${s.phone}</td><td>${s.level}</td><td><button class="mini-btn" onclick="showProfile(${i})">عرض الملف</button> <button class="mini-btn danger" onclick="deleteStudent(${i})">حذف</button></td></tr>`).join('');}
function addStudent(){const name=document.getElementById('name').value.trim();const grade=document.getElementById('grade').value;const phone=document.getElementById('phone').value.trim();const parent=document.getElementById('parent').value.trim();const level=document.getElementById('level').value;const subject=document.getElementById('subject').value.trim();if(!name||!grade||!phone){alert('يرجى إدخال الاسم والصف والهاتف');return;}students.unshift({name,grade,phone,parent,level,subject,present:0,absent:0,exams:0});save();render();document.getElementById('name').value='';document.getElementById('grade').value='';document.getElementById('phone').value='';document.getElementById('parent').value='';}
function deleteStudent(i){if(confirm('حذف الطالب من قائمة المادة؟')){students.splice(i,1);save();render();}}
function showProfile(i){const s=students[i];document.getElementById('profile').style.display='block';document.getElementById('profileInfo').textContent=`${s.name} - ${s.grade} - ${s.subject} - الهاتف: ${s.phone}`;document.getElementById('present').textContent=s.present;document.getElementById('absent').textContent=s.absent;document.getElementById('exams').textContent=s.exams;document.getElementById('plevel').textContent=s.level;document.getElementById('profile').scrollIntoView({behavior:'smooth'});}
function filterStudents(){const v=document.getElementById('search').value.trim();render(students.filter(s=>s.name.includes(v)||s.grade.includes(v)||s.phone.includes(v)));}
render();
</script>
</body>
</html>
