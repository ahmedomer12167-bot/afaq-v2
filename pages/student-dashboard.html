<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>لوحة الطالب</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-purple-mobile.css"><link rel="stylesheet" href="../css/afaq-badges.css"><link rel="stylesheet" href="../css/afaq-student-complete.css"></head><body><main class="afaq-mobile">
<section class="afaq-top"><h1>🎓 لوحة الطالب</h1><p id="welcomeText"></p><div style="margin-top:14px"><a class="afaq-btn gray" href="../index.html">الرئيسية</a><a class="afaq-btn" href="student-profile.html">الملف الشخصي</a></div></section>
<section class="counter-row"><div class="counter-box"><span>📚 موادي</span><strong id="subjectsCount">0</strong><small>مسجل بها</small></div><div class="counter-box"><span>🔔 الإشعارات</span><strong id="notificationsCount">0</strong><small>جديد</small></div><div class="counter-box"><span>📊 النتائج النهائية</span><strong id="finalResultsCount">0</strong><small>نتائج</small></div><div class="counter-box"><span>✅ الحضور</span><strong id="attendanceRate">0%</strong><small>نسبة</small></div></section>
<section class="student-grid"><div class="cardx" onclick="location.href='student-subjects.html'"><h3>📚 موادي والمواد المتاحة</h3><p>عرض المواد المسجل بها والمواد غير المسجل بها لطلب الدخول.</p><button class="afaq-btn">فتح المواد</button></div><div class="cardx" onclick="location.href='student-notifications.html'"><h3>🔔 الإشعارات</h3><p>كل إشعارات الواجبات والاختبارات والنتائج والحضور.</p><button class="afaq-btn">فتح الإشعارات</button></div></section>
<section class="cardx"><h3>📊 النتائج النهائية للمواد</h3><div id="finalResultsBox"></div></section>
</main><script src="../js/afaq-data.js"></script><script src="../js/afaq-complete-sync.js"></script><script src="../js/afaq-unified-counters.js"></script><script src="../js/afaq-badges.js"></script><script>
const st=AfaqSync.currentStudent(); if(!st)location.href='student-login.html'; const sid=AfaqSync.studentId(st);
function render(){const st=AfaqSync.currentStudent(); welcomeText.textContent='مرحباً '+(st.name||st.studentName||'طالب')+' - '+(st.grade||''); const subs=st.subjects||[]; const nots=AfaqSync.myNotifications(); const finals=AfaqSync.records('results').filter(r=>r.type==='نهائي'||String(r.title||'').includes('نهائي')); const att=AfaqSync.records('attendance'); let p=att.filter(x=>String(x.status||'').includes('حاضر')).length,a=att.filter(x=>String(x.status||'').includes('غائب')).length; subjectsCount.textContent=subs.length; notificationsCount.textContent=nots.filter(n=>!n.read).length||nots.length; finalResultsCount.textContent=finals.length; attendanceRate.textContent=(p+a)?Math.round(p/(p+a)*100)+'%':'0%'; finalResultsBox.innerHTML=finals.length?finals.map(r=>`<div class="cardx"><h3>${st.name||st.studentName}</h3><p>المادة: ${r.subject||'-'}</p><p>النتيجة النهائية: <b>${r.score||0}/${r.total||100}</b></p></div>`).join(''):"<div class='cardx'><h3>لا توجد نتائج نهائية حالياً</h3></div>"} render();
</script></body></html>
