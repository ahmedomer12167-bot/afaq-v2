<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إدارة المواد - آفاق التعليمية</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.management-page{min-height:100vh;padding:24px}.page-header{display:flex;justify-content:space-between;align-items:center;gap:15px;padding:18px 22px;border-radius:22px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);margin-bottom:24px;backdrop-filter:blur(14px)}.page-header h1{font-size:28px}.page-header p{color:#d8d8d8;margin-top:6px}.header-actions{display:flex;gap:10px;flex-wrap:wrap}.action-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.danger-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.search-input,.form-grid input,.form-grid select{width:100%;padding:14px;border:none;border-radius:14px;outline:none;font-size:15px}.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:15px}.subjects-table{width:100%;border-collapse:collapse;margin-top:15px}.subjects-table th,.subjects-table td{padding:14px;text-align:center;border-bottom:1px solid rgba(255,255,255,.12)}.subjects-table th{color:#c084fc}.mini-btn{border:none;padding:8px 10px;border-radius:10px;cursor:pointer;color:white;font-weight:bold;margin:2px;background:linear-gradient(135deg,#7c3aed,#9333ea)}.delete-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}.status-active{color:#22c55e;font-weight:bold}.status-hidden{color:#facc15;font-weight:bold}.note{line-height:1.8;color:#ddd;margin-top:8px}@media(max-width:900px){.page-header{flex-direction:column;align-items:flex-start}.form-grid{grid-template-columns:1fr}.subjects-table{font-size:13px}}
</style>
</head>
<body>
<main class="management-page">
<header class="page-header">
<div><h1>إدارة المواد</h1><p>إضافة المواد وربطها بالصف والمدرس وكود المادة.</p></div>
<div class="header-actions">
<button class="action-btn" onclick="location.href='admin-dashboard.html'">🏠 لوحة المدير</button>
<button class="action-btn" onclick="history.back()">← رجوع</button>
<button class="action-btn danger-btn" onclick="clearSubjects()">تفريغ المواد</button>
</div>
</header>
<section class="box">
<input class="search-input" type="text" id="subjectSearch" placeholder="🔍 ابحث عن مادة أو صف أو مدرس أو كود..." oninput="filterSubjects()">
</section>
<section class="box">
<h2>إضافة مادة</h2>
<p class="note">اختر المادة والصف والمدرس المسؤول، ثم أضف كود المادة الذي سيستخدمه الطالب لإرسال طلب الانضمام.</p>
<div class="form-grid">
<select id="subjectName"><option value="">اختر المادة</option><option>الأحياء</option><option>الفيزياء</option><option>الكيمياء</option><option>الرياضيات</option><option>الاجتماعيات</option><option>العربي</option><option>الإنكليزي</option><option>الإسلامية</option></select>
<select id="subjectGrade"><option value="">اختر الصف</option><option>الأول متوسط</option><option>الثاني متوسط</option><option>الثالث متوسط</option><option>الرابع الإعدادي</option><option>الخامس الإعدادي</option><option>السادس الإعدادي</option></select>
<input id="subjectTeacher" type="text" placeholder="اسم المدرس المسؤول">
<input id="subjectCode" type="text" placeholder="كود المادة مثال BIO-3">
<select id="subjectStatus"><option>مفعلة</option><option>مخفية</option></select>
<input id="subjectNote" type="text" placeholder="ملاحظة اختيارية">
</div>
<button class="action-btn" style="margin-top:15px" onclick="addSubject()">➕ إضافة المادة</button>
</section>
<section class="box">
<h2>قائمة المواد</h2>
<table class="subjects-table">
<thead><tr><th>المادة</th><th>الصف</th><th>المدرس</th><th>كود المادة</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
<tbody id="subjectsBody"><tr><td colspan="6">لا توجد مواد حالياً</td></tr></tbody>
</table>
</section>
</main>
<script>
let subjects = JSON.parse(localStorage.getItem("afaq_subjects")) || [];
function saveSubjects(){localStorage.setItem("afaq_subjects",JSON.stringify(subjects));}
function renderSubjects(list=subjects){const body=document.getElementById("subjectsBody");if(list.length===0){body.innerHTML='<tr><td colspan="6">لا توجد مواد حالياً</td></tr>';return;}body.innerHTML="";list.forEach((s,index)=>{body.innerHTML+=`<tr><td>${s.name}</td><td>${s.grade}</td><td>${s.teacher}</td><td>${s.code}</td><td class="${s.status==='مفعلة'?'status-active':'status-hidden'}">${s.status}</td><td><button class="mini-btn" onclick="toggleSubject(${index})">تفعيل/إخفاء</button><button class="mini-btn delete-btn" onclick="deleteSubject(${index})">حذف</button></td></tr>`;});}
function addSubject(){const name=document.getElementById("subjectName").value;const grade=document.getElementById("subjectGrade").value;const teacher=document.getElementById("subjectTeacher").value.trim();const code=document.getElementById("subjectCode").value.trim();const status=document.getElementById("subjectStatus").value;const note=document.getElementById("subjectNote").value.trim();if(!name||!grade||!teacher||!code){alert("يرجى ملء المادة والصف والمدرس وكود المادة");return;}subjects.unshift({name,grade,teacher,code,status,note,createdAt:new Date().toISOString()});saveSubjects();renderSubjects();document.getElementById("subjectName").value="";document.getElementById("subjectGrade").value="";document.getElementById("subjectTeacher").value="";document.getElementById("subjectCode").value="";document.getElementById("subjectStatus").value="مفعلة";document.getElementById("subjectNote").value="";}
function deleteSubject(index){if(confirm("هل تريد حذف هذه المادة؟")){subjects.splice(index,1);saveSubjects();renderSubjects();}}
function toggleSubject(index){subjects[index].status=subjects[index].status==='مفعلة'?'مخفية':'مفعلة';saveSubjects();renderSubjects();}
function clearSubjects(){if(confirm("سيتم حذف جميع المواد. هل أنت متأكد؟")){subjects=[];saveSubjects();renderSubjects();}}
function filterSubjects(){const value=document.getElementById("subjectSearch").value.trim();const filtered=subjects.filter(s=>s.name.includes(value)||s.grade.includes(value)||s.teacher.includes(value)||s.code.includes(value));renderSubjects(filtered);}
renderSubjects();
</script>
</body>
</html>
