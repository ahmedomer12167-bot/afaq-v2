<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>إدارة المواد</title><link rel="stylesheet" href="../css/main.css"><link rel="stylesheet" href="../css/afaq-room.css"></head><body>
<main class="room"><section class="topbar"><div class="title"><h1>📚 إدارة المواد وربطها بالمدرس</h1><p>المدير هو من يضيف المادة ويربطها بالمدرس.</p></div><a class="btn back" href="admin-dashboard.html">لوحة المدير</a></section>
<section class="panel"><h2>إضافة مادة</h2><input id="subjectName" placeholder="اسم المادة"><select id="grade"><option>السادس العلمي</option><option>الخامس العلمي</option><option>الرابع العلمي</option><option>الثالث متوسط</option></select><input id="teacherCode" placeholder="كود المدرس"><input id="teacherName" placeholder="اسم المدرس"><button class="btn ok" onclick="saveSubject()">حفظ المادة</button></section>
<section class="panel"><h2>المواد</h2><div id="box" class="cards"></div></section></main>
<script src="../js/afaq-data.js"></script>
<script>
function saveSubject(){if(!subjectName.value||!teacherCode.value){alert("أدخل المادة وكود المدرس");return;}AfaqData.upsertSubject({name:subjectName.value,grade:grade.value,teacherCode:teacherCode.value,teacherName:teacherName.value});AfaqData.addNotification("teacher",teacherCode.value,"تم ربط مادة بك","تم ربطك بمادة "+subjectName.value,"مادة");subjectName.value=teacherCode.value=teacherName.value="";render();}
function render(){const arr=AfaqData.subjects();box.innerHTML=arr.length?arr.map(s=>`<div class="card"><h3>${s.name}</h3><p>المرحلة: ${s.grade}</p><p>المدرس: ${s.teacherName||s.teacherCode}</p></div>`).join(""):"<div class='card'><h3>لا توجد مواد</h3></div>"}render();
</script>
</body></html>
