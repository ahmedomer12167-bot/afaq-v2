<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>إدارة الطلاب</title><link rel="stylesheet" href="../css/main.css"><style>
.page{min-height:100vh;padding:24px}.header,.box{padding:22px;border-radius:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.13);margin-bottom:22px}.header{display:flex;justify-content:space-between;align-items:center;gap:15px}.actions{display:flex;gap:10px;flex-wrap:wrap}.btn,.save-btn,.delete-btn,.edit-btn{border:none;padding:12px 16px;border-radius:14px;cursor:pointer;color:white;font-weight:bold;background:linear-gradient(135deg,#7c3aed,#a855f7)}.save-btn{background:linear-gradient(135deg,#16a34a,#22c55e)}.delete-btn{background:linear-gradient(135deg,#dc2626,#ef4444)}.edit-btn{background:linear-gradient(135deg,#2563eb,#3b82f6)}input,select,textarea{width:100%;padding:14px;border:none;border-radius:14px;margin:8px 0 12px;outline:none}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.card{padding:18px;border-radius:18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12)}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px;text-align:center;border-bottom:1px solid rgba(255,255,255,.12)}.badge{padding:6px 10px;border-radius:10px;background:#7c3aed;display:inline-block;margin:3px}.avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid #7c3aed}.small-img{width:48px;height:48px;border-radius:50%;object-fit:cover}@media(max-width:900px){.grid,.cards{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style></head><body>
<main class="page"><header class="header"><div><h1>👨‍🎓 إدارة الطلاب</h1><p>المصدر الأساسي لبيانات الطالب في كل اللوحات.</p></div><div class="actions"><button class="btn" onclick="location.href='admin-dashboard.html'">لوحة المدير</button></div></header>
<section class="box"><h2 id="formTitle">إضافة / تعديل طالب</h2><div class="grid"><div><img id="photoPreview" class="avatar"><input id="studentPhoto" type="file" accept="image/*"></div><div><input id="studentName" placeholder="الاسم الثلاثي"><select id="studentGrade"><option>السادس العلمي</option><option>الخامس العلمي</option><option>الرابع العلمي</option><option>الثالث متوسط</option><option>الثاني متوسط</option><option>الأول متوسط</option></select><input id="studentPhone" placeholder="هاتف الطالب"><input id="studentCode" placeholder="كود الطالب"></div><div><input id="parentName" placeholder="اسم ولي الأمر"><input id="parentPhone" placeholder="هاتف ولي الأمر"><input id="subjects" placeholder="المواد مفصولة بفارزة، مثال: الأحياء,الكيمياء"><select id="subscriptionStatus"><option>مفعل</option><option>غير مفعل</option><option>منتهي</option></select><input id="subscriptionEnd" type="date"></div><div><textarea id="studentNotes" placeholder="ملاحظات"></textarea></div></div><button class="save-btn" onclick="saveStudent()">حفظ الطالب</button><button class="btn" onclick="clearForm()">تفريغ</button></section>
<section class="box"><h2>الطلاب</h2><input id="search" placeholder="بحث" oninput="render()"><table class="table"><thead><tr><th>الصورة</th><th>الاسم</th><th>المرحلة</th><th>الكود</th><th>الاشتراك</th><th>إجراء</th></tr></thead><tbody id="rows"></tbody></table></section></main><script src="../js/afaq-data.js"></script><script>
let photo="",editId=null; photoPreview.src=AfaqData.defaultPhoto();
studentPhoto.onchange=e=>{const f=e.target.files[0]; if(f) AfaqData.compressImage(f,p=>{photo=p;photoPreview.src=p;});};
function clearForm(){editId=null;["studentName","studentPhone","studentCode","parentName","parentPhone","subjects","studentNotes","subscriptionEnd"].forEach(id=>document.getElementById(id).value="");subscriptionStatus.value="مفعل";photo="";photoPreview.src=AfaqData.defaultPhoto();}
function saveStudent(){if(!studentName.value||!studentCode.value){alert("أدخل الاسم والكود");return;} const old=AfaqData.findStudent(studentCode.value)||{}; AfaqData.upsertStudent({studentId:editId||studentCode.value,code:studentCode.value,name:studentName.value,grade:studentGrade.value,phone:studentPhone.value,parentName:parentName.value,parentPhone:parentPhone.value,subjects:subjects.value||old.subjects,subscriptionStatus:subscriptionStatus.value,subscriptionEnd:subscriptionEnd.value||"غير محدد",notes:studentNotes.value,photo:photo||old.photo}); clearForm(); render(); alert("تم الحفظ");}
function edit(code){const s=AfaqData.findStudent(code); if(!s)return; editId=s.studentId; studentName.value=s.name; studentGrade.value=s.grade; studentPhone.value=s.phone; studentCode.value=s.code; parentName.value=s.parentName; parentPhone.value=s.parentPhone; subjects.value=(s.subjects||[]).join(","); subscriptionStatus.value=s.subscriptionStatus; subscriptionEnd.value=s.subscriptionEnd!="غير محدد"?s.subscriptionEnd:""; studentNotes.value=s.notes; photo=s.photo; photoPreview.src=s.photo; scrollTo(0,0);}
function del(code){if(confirm("حذف الطالب؟")){AfaqData.removeStudent(code);render();}}
function render(){const q=search.value||""; const arr=AfaqData.allStudents().filter(s=>s.name.includes(q)||s.code.includes(q)); rows.innerHTML=arr.length?arr.map(s=>`<tr><td><img class="small-img" src="${s.photo}"></td><td>${s.name}</td><td>${s.grade}</td><td>${s.code}</td><td>${s.subscriptionStatus}</td><td><button class="edit-btn" onclick="edit('${s.code}')">تعديل</button> <button class="delete-btn" onclick="del('${s.code}')">حذف</button></td></tr>`).join(""):"<tr><td colspan='6'>لا يوجد</td></tr>";}
render();
</script></body></html>
