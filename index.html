<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آفاق التعليمية</title>
<link rel="stylesheet" href="css/afaq-home-old-style.css">
</head>
<body>

<main class="home-wrap">

<section class="home-hero">
  <div class="hero-icon">📘</div>
  <h1>آفاق التعليمية</h1>
  <p>منصة تعليمية حديثة للدروس والاختبارات الإلكترونية، مصممة لتسهيل متابعة الطالب على المدير والمدرس وولي الأمر.</p>

  <div class="home-actions">
    <a class="home-btn" href="pages/student-login.html">دخول الطالب</a>
    <a class="home-btn" href="pages/teacher-login.html">دخول المدرس</a>
    <a class="home-btn" href="pages/parent-login.html">دخول ولي الأمر</a>
    <a class="home-btn dark" href="pages/admin-login.html">دخول المدير</a>
  </div>
</section>

<section class="home-stats">
  <div class="home-stat">
    <div class="icon">👨‍🎓</div>
    <strong id="homeStudentsCount" data-count="homeStudents">0</strong>
    <span>الطلاب</span>
  </div>

  <div class="home-stat">
    <div class="icon">👨‍🏫</div>
    <strong id="homeTeachersCount" data-count="homeTeachers">0</strong>
    <span>المدرسون</span>
  </div>

  <div class="home-stat">
    <div class="icon">📚</div>
    <strong id="homeSubjectsCount" data-count="homeSubjects">0</strong>
    <span>المواد</span>
  </div>

  <div class="home-stat">
    <div class="icon">💳</div>
    <strong id="homeSubscriptionsCount" data-count="homeSubscriptions">0</strong>
    <span>الاشتراكات</span>
  </div>
</section>

</main>

<script src="js/afaq-data.js"></script>
<script src="js/afaq-unified-counters.js"></script>
</body>
</html>
