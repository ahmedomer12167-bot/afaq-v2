<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>آفاق التعليمية</title>

<link rel="stylesheet" href="css/main.css">
</head>

<body>

<header class="topbar">
    <div class="logo">آفاق التعليمية</div>

    <nav>
        <a href="#">الرئيسية</a>
        <a href="#">عن المنصة</a>
        <a href="#">المواد</a>
        <a href="#">تواصل معنا</a>
    </nav>
</header>

<section class="hero">

    <h1>منصة آفاق التعليمية</h1>

    <p>
        منصة تعليمية متكاملة للدروس والاختبارات والواجبات الإلكترونية
    </p>

    <div class="hero-buttons">
        <button class="primary-btn">
            ابدأ الآن
        </button>

        <button class="secondary-btn">
            تسجيل الدخول
        </button>
    </div>

</section>

<section class="stats">

    <div class="card">
        👨‍🎓
        <h3>الطلاب</h3>
        <span>0</span>
    </div>

    <div class="card">
        👨‍🏫
        <h3>المدرسون</h3>
        <span>0</span>
    </div>

    <div class="card">
        📚
        <h3>المواد</h3>
        <span>8</span>
    </div>

    <div class="card">
        📝
        <h3>الاختبارات</h3>
        <span>0</span>
    </div>

</section>

<section class="account-types">

    <div class="account-card">
        🎓
        <h3>الطالب</h3>
    </div>

    <div class="account-card">
        👨‍🏫
        <h3>المدرس</h3>
    </div>

    <div class="account-card">
        👨‍👩‍👦
        <h3>ولي الأمر</h3>
    </div>

    <div class="account-card">
        ⚙️
        <h3>المدير</h3>
    </div>

</section>

<footer>

    <h3>آفاق التعليمية</h3>

    <p>
        جميع الحقوق محفوظة
    </p>

</footer>

<script src="js/app.js"></script>

</body>
</html>
